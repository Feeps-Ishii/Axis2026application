<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>顧客カルテ詳細 | 花あかりの湯</title>

	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
		rel="stylesheet">

	<style>
		:root {
			--gold: #b8912a;
			--gold-l: #e6c96a;
			--ink: #1a1208;
			--ash: #5c4a36;
			--moss: #4a6741;
			--rust: #9b3a2a;
			--sidebar: #1e1610;
			--sw: 220px;
			--hh: 56px;
			--border: #e8dece;
			--bg: #f2ece4;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: 'Noto Sans JP', sans-serif;
			background: var(--bg);
			color: var(--ink);
			min-height: 100vh;
		}

		.sidebar {
			position: fixed;
			top: 0;
			left: 0;
			width: var(--sw);
			height: 100vh;
			background: var(--sidebar);
			display: flex;
			flex-direction: column;
			z-index: 100;
			border-right: 1px solid rgba(184, 145, 42, .15);
		}

		.sb-brand {
			padding: 22px 20px 18px;
			border-bottom: 1px solid rgba(255, 255, 255, .06);
		}

		.sb-brand .en {
			font-size: 9px;
			color: rgba(255, 255, 255, .3);
			letter-spacing: 3px;
			text-transform: uppercase;
		}

		.sb-brand .ja {
			font-family: 'Noto Serif JP', serif;
			font-size: 16px;
			color: var(--gold-l);
			letter-spacing: 2px;
			margin-top: 4px;
		}

		.sb-badge {
			font-size: 10px;
			background: var(--gold);
			color: var(--ink);
			padding: 2px 6px;
			border-radius: 10px;
			margin-top: 6px;
			display: inline-block;
			font-weight: 700;
		}

		nav {
			flex: 1;
			padding: 16px 0;
			overflow-y: auto;
		}

		.ns {
			font-size: 9px;
			color: rgba(255, 255, 255, .25);
			letter-spacing: 3px;
			padding: 12px 20px 6px;
			text-transform: uppercase;
		}

		nav a {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px 20px;
			color: rgba(255, 255, 255, .55);
			text-decoration: none;
			font-size: 13px;
			transition: all .15s;
			cursor: pointer;
			border-left: 2px solid transparent;
		}

		nav a:hover {
			color: #fff;
			background: rgba(255, 255, 255, .04);
		}

		nav a.active {
			color: var(--gold-l);
			border-left-color: var(--gold);
			background: rgba(184, 145, 42, .08);
		}

		nav a .ic {
			font-size: 15px;
			width: 18px;
			text-align: center;
		}

		.sb-footer {
			padding: 16px 20px;
			border-top: 1px solid rgba(255, 255, 255, .06);
		}

		.sb-user {
			font-size: 12px;
			color: rgba(255, 255, 255, .4);
			margin-bottom: 10px;
		}

		.sb-user strong {
			color: rgba(255, 255, 255, .7);
			display: block;
		}

		.logout-btn {
			width: 100%;
			padding: 8px;
			background: transparent;
			border: 1px solid rgba(255, 255, 255, .12);
			border-radius: 2px;
			color: rgba(255, 255, 255, .4);
			font-size: 11px;
			letter-spacing: 1px;
			cursor: pointer;
			font-family: 'Noto Sans JP', sans-serif;
		}

		.logout-btn:hover {
			border-color: var(--rust);
			color: #e07070;
		}

		.main {
			margin-left: var(--sw);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.topbar {
			height: var(--hh);
			background: #fff;
			border-bottom: 1px solid var(--border);
			display: flex;
			align-items: center;
			padding: 0 28px;
			gap: 16px;
			position: sticky;
			top: 0;
			z-index: 50;
		}

		.topbar-title {
			font-family: 'Noto Serif JP', serif;
			font-size: 16px;
			color: var(--ash);
			flex: 1;
		}

		.topbar-date {
			font-size: 12px;
			color: #999;
		}

		.badge-pill {
			font-size: 11px;
			background: var(--moss);
			color: #fff;
			padding: 3px 10px;
			border-radius: 12px;
		}

		.content {
			padding: 28px;
			flex: 1;
		}

		.page-hd {
			margin-bottom: 24px;
			padding-bottom: 16px;
			border-bottom: 1px solid var(--border);
		}

		.page-hd h2 {
			font-family: 'Noto Serif JP', serif;
			font-size: 20px;
			color: var(--ash);
			font-weight: 400;
			margin-bottom: 4px;
		}

		.sc-id {
			font-size: 10px;
			color: #ccc;
			letter-spacing: 1px;
		}

		.g2 {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
		}

		.card {
			background: #fff;
			border-radius: 4px;
			border: 1px solid var(--border);
			padding: 24px;
			margin-bottom: 20px;
		}

		.card-title {
			font-family: 'Noto Serif JP', serif;
			font-size: 15px;
			color: var(--ash);
			margin-bottom: 16px;
			padding-bottom: 12px;
			border-bottom: 1px solid #f0ebe3;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			font-size: 13px;
		}

		tbody tr {
			border-bottom: 1px solid #f0ebe3;
		}

		tbody td {
			padding: 10px 0;
			color: #3a3028;
			vertical-align: top;
		}

		tbody td:first-child {
			color: #999;
			width: 130px;
			padding-right: 16px;
		}

		.customer-head {
			display: flex;
			gap: 16px;
			align-items: center;
			margin-bottom: 20px;
		}

		.kavatar {
			width: 56px;
			height: 56px;
			background: #f0ebe3;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Noto Serif JP', serif;
			font-size: 20px;
			color: var(--ash);
			flex-shrink: 0;
		}

		.customer-name {
			font-family: 'Noto Serif JP', serif;
			font-size: 18px;
		}

		.customer-sub {
			font-size: 12px;
			color: #999;
			margin-top: 4px;
		}

		.ktags {
			margin-top: 6px;
			display: flex;
			gap: 6px;
			flex-wrap: wrap;
		}

		.tag {
			font-size: 10px;
			padding: 2px 8px;
			border-radius: 10px;
			background: #f0ebe3;
			color: var(--ash);
			border: 1px solid var(--border);
		}

		.tag.al {
			background: #fce8e8;
			color: var(--rust);
			border-color: #f0c0c0;
		}

		.tag.vip {
			background: #fef8e8;
			color: #8a6d00;
			border-color: #e8d880;
		}

		.memo-box {
			background: #faf7f3;
			border: 1px solid var(--border);
			border-radius: 3px;
			padding: 16px;
			font-size: 13px;
			line-height: 1.9;
			color: #3a3028;
			white-space: pre-line;
		}

		.history-card {
			padding: 24px 24px 20px;
		}

		.history-title {
			font-family: 'Noto Serif JP', serif;
			font-size: 15px;
			color: var(--ash);
			margin-bottom: 16px;
			padding-bottom: 14px;
			border-bottom: 1px solid #eadfce;
		}

		.simple-history-table {
			width: 100%;
			border-collapse: collapse;
			font-size: 13px;
		}

		.simple-history-table thead th {
			background: #f4efe7;
			color: var(--ash);
			font-weight: 600;
			text-align: left;
			padding: 11px 14px;
			border-bottom: 1px solid #e2d6c7;
		}

		.simple-history-table tbody tr {
			border-bottom: 1px solid #e8dece;
		}

		.simple-history-table tbody tr:hover {
			background: #faf7f3;
		}

		.simple-history-table tbody td {
			padding: 13px 14px;
			color: #3a3028;
			line-height: 1.7;
			vertical-align: top;
		}

		.simple-history-table tbody td:first-child {
			width: 130px;
			color: #3a3028;
			padding-right: 14px;
			white-space: nowrap;
		}

		.history-empty {
			background: #faf7f3;
			border: 1px solid var(--border);
			border-radius: 3px;
			padding: 16px;
			font-size: 13px;
			color: #777;
		}

		.btn {
			padding: 10px 22px;
			border: none;
			border-radius: 2px;
			font-family: 'Noto Sans JP', sans-serif;
			font-size: 13px;
			font-weight: 500;
			cursor: pointer;
			text-decoration: none;
			display: inline-block;
		}

		.btn-gold {
			background: var(--gold);
			color: var(--ink);
		}

		.btn-red {
			background: var(--rust);
			color: #fff;
		}

		.btn-moss {
			background: var(--moss);
			color: #fff;
		}

		.btn-out {
			background: transparent;
			border: 1px solid #ccc;
			color: var(--ash);
		}

		.btn-row {
			display: flex;
			gap: 10px;
			margin-top: 20px;
			flex-wrap: wrap;
		}

		.cancel-reason {
			display: inline-block;
			color: var(--rust);
			background: #fff6f4;
			border: 1px solid #e4b5ac;
			border-radius: 10px;
			padding: 3px 8px;
			font-size: 11px;
			line-height: 1.6;
		}

		.cancel-empty {
			color: #aaa;
		}

		@media(max-width:900px) {
			.sidebar {
				display: none;
			}

			.main {
				margin-left: 0;
			}

			.topbar {
				padding: 0 16px;
			}

			.content {
				padding: 20px;
			}

			.g2 {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>

	<aside class="sidebar">

		<div class="sb-brand">
			<div class="en">Hana Akari no Yu</div>
			<div class="ja">花あかりの湯</div>
			<span class="sb-badge">管理サイト</span>
		</div>

		<nav>
			<div class="ns">メイン</div>


			<a href="./topmenu.html">
				<span class="ic">🏠</span>
				ダッシュボード
			</a>

			<a href="./list.html">
				<span class="ic">📋</span>
				全予約一覧
			</a>

			<a href="./regist.html">
				<span class="ic">➕</span>
				予約登録
			</a>

			<div class="ns">管理</div>

			<a href="./room.html">
				<span class="ic">🛏</span>
				空室確認
			</a>

			<a href="./record.html" class="active">
				<span class="ic">👤</span>
				顧客カルテ
			</a>


			<a href="./okami_bot.html">
				<span class="ic">🤖</span>
				女将ボット
			</a>

		</nav>

		<div class="sb-footer">
			<div class="sb-user">
				ログイン中<br>
				<strong>staff001</strong>
			</div>

			<a id="logoutLink">
				<button class="logout-btn">
					ログアウト
				</button>
			</a>
		</div>

	</aside>

	<main class="main">

		<div class="topbar">
			<span class="topbar-title">顧客カルテ詳細</span>
			<span class="topbar-date" id="todayDate"></span>
		</div>

		<div class="content">

			<div class="g2" id="detailArea"></div>

		</div>
	</main>

	<script src="./js/db.js"></script>
	<script>
		TeamF.init().then(() => {
			const s = TeamF.requireLogin();
			if (!s) return;

			const E = TeamF.esc;
			document.getElementById("todayDate").textContent = TeamF.fmtJpDate(TeamF.today());

			document.getElementById("logoutLink").addEventListener("click", function (e) {
				e.preventDefault();
				TeamF.logout();
				location.href = "./login.html";
			});

			const id = new URLSearchParams(location.search).get("id");
			const c = TeamF.customer(id);
			if (!c) { location.href = "./record.html"; return; }

			const initial = c.name ? E(c.name.substring(0, 1)) : "客";
			const visit = c.visitCount != null ? c.visitCount : 0;

			let tags = "";
			if (c.visitCount != null && c.visitCount >= 5) tags += '<span class="tag vip">VIP</span>';
			if (c.allergyInfo) tags += '<span class="tag al">' + E(c.allergyInfo) + '</span>';
			if (c.hospitalityNote) tags += '<span class="tag">おもてなし記録あり</span>';

			const vipSub = (c.visitCount != null && c.visitCount >= 5) ? ' VIPゲスト' : '';

			const customerCard =
				'<div class="card">' +
				'<div class="card-title">顧客情報</div>' +
				'<div class="customer-head">' +
				'<div class="kavatar">' + initial + '</div>' +
				'<div>' +
				'<div class="customer-name"><span>' + E(c.name) + '</span> 様</div>' +
				'<div class="customer-sub">来館<span>' + visit + '</span>回' + vipSub + '</div>' +
				'<div class="ktags">' + tags + '</div>' +
				'</div></div>' +
				'<table><tbody>' +
				'<tr><td>電話番号</td><td>' + E(c.phone) + '</td></tr>' +
				'<tr><td>メール</td><td>' + (c.email ? E(c.email) : '登録なし') + '</td></tr>' +
				'<tr><td>ふりがな</td><td>' + (c.nameKana ? E(c.nameKana) : '登録なし') + '</td></tr>' +
				'<tr><td>生年月日</td><td>' + (c.birthDate ? E(c.birthDate) : '登録なし') + '</td></tr>' +
				'<tr><td>来館回数</td><td><span>' + visit + '</span>回</td></tr>' +
				'<tr><td>アレルギー</td><td>' + (c.allergyInfo ? E(c.allergyInfo) : '登録なし') + '</td></tr>' +
				'</tbody></table>' +
				'<div class="btn-row">' +
				'<a class="btn btn-gold" href="./record_edit.html?id=' + c.customerId + '">変更</a>' +
				'<a class="btn btn-red" href="./record_delete.html?id=' + c.customerId + '">削除</a>' +
				'<a class="btn btn-moss" href="./okami_bot.html?customerId=' + c.customerId + '">女将ボット</a>' +
				'<a class="btn btn-out" href="./record.html">戻る</a>' +
				'</div>' +
				'</div>';

			// 予約履歴
			const reservations = TeamF.reservationsOfCustomer(c.customerId)
				.slice()
				.sort((a, b) => String(b.stayDate || "").localeCompare(String(a.stayDate || "")));

			let historyHtml;
			if (!reservations.length) {
				historyHtml = '<div class="history-empty">過去のおもてなし履歴はありません。</div>';
			} else {
				const rows = reservations.map((r) => {
					const canceled = r.status === "キャンセル";
					const cancelCell = canceled
						? '<span class="cancel-reason">' + (r.cancelReason ? E(r.cancelReason) : '登録なし') + '</span>'
						: '<span class="cancel-empty">－</span>';
					return (
						'<tr>' +
						'<td>' + (r.stayDate ? TeamF.fmtDate(r.stayDate) : '未設定') + '</td>' +
						'<td>' + (r.requestNote ? E(r.requestNote) : '登録なし') + '</td>' +
						'<td>' + (r.allergyInfo ? E(r.allergyInfo) : '登録なし') + '</td>' +
						'<td>' + cancelCell + '</td>' +
						'</tr>'
					);
				});
				historyHtml =
					'<table class="simple-history-table">' +
					'<thead><tr>' +
					'<th>宿泊日</th><th>過去のおもてなし内容</th><th>過去のアレルギー情報</th><th>キャンセル理由</th>' +
					'</tr></thead>' +
					'<tbody>' + rows.join("") + '</tbody></table>';
			}

			const rightCol =
				'<div>' +
				'<div class="card">' +
				'<div class="card-title">社内メモ</div>' +
				'<div class="memo-box">' + (c.memo ? E(c.memo) : '登録なし') + '</div>' +
				'</div>' +
				'<div class="card history-card">' +
				'<div class="history-title">過去の予約履歴</div>' +
				historyHtml +
				'</div>' +
				'</div>';

			document.getElementById("detailArea").innerHTML = customerCard + rightCol;
		});
	</script>

</body>

</html>
