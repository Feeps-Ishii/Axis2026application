<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>顧客カルテ変更確認 | 花あかりの湯</title>

	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
		rel="stylesheet">

	<style>
		:root {
			--gold: #b8912a;
			--gold-l: #e6c96a;
			--ink: #1a1208;
			--ash: #5c4a36;
			--moss: #4a6741;
			--rust: #9b3a2a;
			--sidebar: #1e1610;
			--sw: 220px;
			--hh: 56px;
			--border: #e8dece;
			--bg: #f2ece4;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: 'Noto Sans JP', sans-serif;
			background: var(--bg);
			color: var(--ink);
			min-height: 100vh;
		}

		.sidebar {
			position: fixed;
			top: 0;
			left: 0;
			width: var(--sw);
			height: 100vh;
			background: var(--sidebar);
			display: flex;
			flex-direction: column;
			z-index: 100;
			border-right: 1px solid rgba(184, 145, 42, .15);
		}

		.sb-brand {
			padding: 22px 20px 18px;
			border-bottom: 1px solid rgba(255, 255, 255, .06);
		}

		.sb-brand .en {
			font-size: 9px;
			color: rgba(255, 255, 255, .3);
			letter-spacing: 3px;
			text-transform: uppercase;
		}

		.sb-brand .ja {
			font-family: 'Noto Serif JP', serif;
			font-size: 16px;
			color: var(--gold-l);
			letter-spacing: 2px;
			margin-top: 4px;
		}

		.sb-badge {
			font-size: 10px;
			background: var(--gold);
			color: var(--ink);
			padding: 2px 6px;
			border-radius: 10px;
			margin-top: 6px;
			display: inline-block;
			font-weight: 700;
		}

		nav {
			flex: 1;
			padding: 16px 0;
			overflow-y: auto;
		}

		.ns {
			font-size: 9px;
			color: rgba(255, 255, 255, .25);
			letter-spacing: 3px;
			padding: 12px 20px 6px;
			text-transform: uppercase;
		}

		nav a {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px 20px;
			color: rgba(255, 255, 255, .55);
			text-decoration: none;
			font-size: 13px;
			transition: all .15s;
			cursor: pointer;
			border-left: 2px solid transparent;
		}

		nav a:hover {
			color: #fff;
			background: rgba(255, 255, 255, .04);
		}

		nav a.active {
			color: var(--gold-l);
			border-left-color: var(--gold);
			background: rgba(184, 145, 42, .08);
		}

		nav a .ic {
			font-size: 15px;
			width: 18px;
			text-align: center;
		}

		.sb-footer {
			padding: 16px 20px;
			border-top: 1px solid rgba(255, 255, 255, .06);
		}

		.sb-user {
			font-size: 12px;
			color: rgba(255, 255, 255, .4);
			margin-bottom: 10px;
		}

		.sb-user strong {
			color: rgba(255, 255, 255, .7);
			display: block;
		}

		.logout-btn {
			width: 100%;
			padding: 8px;
			background: transparent;
			border: 1px solid rgba(255, 255, 255, .12);
			border-radius: 2px;
			color: rgba(255, 255, 255, .4);
			font-size: 11px;
			letter-spacing: 1px;
			cursor: pointer;
			font-family: 'Noto Sans JP', sans-serif;
		}

		.logout-btn:hover {
			border-color: var(--rust);
			color: #e07070;
		}

		.main {
			margin-left: var(--sw);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.topbar {
			height: var(--hh);
			background: #fff;
			border-bottom: 1px solid var(--border);
			display: flex;
			align-items: center;
			padding: 0 28px;
			gap: 16px;
			position: sticky;
			top: 0;
			z-index: 50;
		}

		.topbar-title {
			font-family: 'Noto Serif JP', serif;
			font-size: 16px;
			color: var(--ash);
			flex: 1;
		}

		.topbar-date {
			font-size: 12px;
			color: #999;
		}

		.content {
			padding: 28px;
			flex: 1;
		}

		.card {
			background: #fff;
			border-radius: 4px;
			border: 1px solid var(--border);
			padding: 24px;
			margin-bottom: 20px;
		}

		.card-title {
			font-family: 'Noto Serif JP', serif;
			font-size: 15px;
			color: var(--ash);
			margin-bottom: 16px;
			padding-bottom: 12px;
			border-bottom: 1px solid #f0ebe3;
		}

		.edit-head {
			display: flex;
			gap: 16px;
			align-items: center;
			margin-bottom: 22px;
		}

		.kavatar {
			width: 56px;
			height: 56px;
			background: #f0ebe3;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Noto Serif JP', serif;
			font-size: 20px;
			color: var(--ash);
			flex-shrink: 0;
		}

		.confirm-list {
			display: grid;
			grid-template-columns: 150px 1fr;
			border-top: 1px solid #f0ebe3;
		}

		.confirm-label,
		.confirm-value {
			padding: 12px 0;
			border-bottom: 1px solid #f0ebe3;
			font-size: 13px;
			line-height: 1.8;
		}

		.confirm-label {
			color: #999;
			padding-right: 16px;
		}

		.confirm-value {
			color: #3a3028;
			white-space: pre-line;
		}

		.memo-box {
			background: #faf7f3;
			border: 1px solid var(--border);
			border-radius: 3px;
			padding: 16px;
			font-size: 13px;
			line-height: 1.9;
			color: #3a3028;
			margin-bottom: 18px;
		}

		.btn {
			padding: 10px 22px;
			border: none;
			border-radius: 2px;
			font-family: 'Noto Sans JP', sans-serif;
			font-size: 13px;
			font-weight: 500;
			cursor: pointer;
			text-decoration: none;
			display: inline-block;
		}

		.btn-gold {
			background: var(--gold);
			color: var(--ink);
		}

		.btn-gold:hover {
			background: var(--gold-l);
		}

		.btn-out {
			background: transparent;
			border: 1px solid #ccc;
			color: var(--ash);
		}

		.btn-out:hover {
			border-color: var(--gold);
			color: var(--gold);
		}

		.btn-row {
			display: flex;
			gap: 10px;
			margin-top: 20px;
			flex-wrap: wrap;
		}

		@media(max-width:900px) {
			.sidebar {
				display: none;
			}

			.main {
				margin-left: 0;
			}

			.topbar {
				padding: 0 16px;
			}

			.content {
				padding: 20px;
			}

			.confirm-list {
				grid-template-columns: 1fr;
			}

			.confirm-label {
				padding-bottom: 2px;
				border-bottom: none;
			}

			.confirm-value {
				padding-top: 0;
			}
		}
	</style>
</head>

<body>

	<aside class="sidebar">

		<div class="sb-brand">
			<div class="en">Hana Akari no Yu</div>
			<div class="ja">花あかりの湯</div>
			<span class="sb-badge">管理サイト</span>
		</div>

		<nav>
			<div class="ns">メイン</div>


			<a href="./topmenu.html">
				<span class="ic">🏠</span>
				ダッシュボード
			</a>

			<a href="./list.html">
				<span class="ic">📋</span>
				全予約一覧
			</a>

			<a href="./regist.html">
				<span class="ic">➕</span>
				予約登録
			</a>

			<div class="ns">管理</div>

			<a href="./room.html">
				<span class="ic">🛏</span>
				空室確認
			</a>

			<a href="./record.html" class="active">
				<span class="ic">👤</span>
				顧客カルテ
			</a>


			<a href="./okami_bot.html">
				<span class="ic">🤖</span>
				女将ボット
			</a>

		</nav>

		<div class="sb-footer">
			<div class="sb-user">
				ログイン中<br>
				<strong>staff001</strong>
			</div>

			<a id="logoutLink">
				<button class="logout-btn">
					ログアウト
				</button>
			</a>
		</div>

	</aside>

	<main class="main">

		<div class="topbar">
			<span class="topbar-title">顧客カルテ変更確認</span>
			<span class="topbar-date" id="todayDate"></span>
		</div>

		<div class="content">

			<div class="card">
				<div class="card-title">変更内容の確認</div>

				<div class="edit-head">
					<div class="kavatar" id="avatar">客</div>

					<div>
						<div style="font-family:'Noto Serif JP',serif;font-size:18px">
							<span id="headName"></span> 様
						</div>
						<div style="font-size:12px;color:#999;margin-top:4px">
							以下の内容で顧客カルテを変更します
						</div>
					</div>
				</div>

				<div class="memo-box">
					内容をご確認のうえ、問題なければ「変更を完了する」を押してください。
				</div>

				<div class="confirm-list" id="confirmList"></div>

				<div class="btn-row">
					<button type="button" class="btn btn-gold" id="completeBtn">
						変更を完了する
					</button>

					<a class="btn btn-out" id="backBtn">
						戻って修正する
					</a>
				</div>
			</div>

		</div>
	</main>

	<script src="./js/db.js"></script>
	<script>
		TeamF.init().then(() => {
			const s = TeamF.requireLogin();
			if (!s) return;

			const E = TeamF.esc;
			document.getElementById("todayDate").textContent = TeamF.fmtJpDate(TeamF.today());

			document.getElementById("logoutLink").addEventListener("click", function (e) {
				e.preventDefault();
				TeamF.logout();
				location.href = "./login.html";
			});

			const pending = TeamF.getPending("record_edit");
			if (!pending || !pending.patch) {
				location.href = "./record.html";
				return;
			}

			const id = pending.id;
			const p = pending.patch;

			document.getElementById("avatar").textContent = p.name ? p.name.substring(0, 1) : "客";
			document.getElementById("headName").textContent = p.name || "";
			document.getElementById("backBtn").href = "./record_edit.html?id=" + id + "&restore=1";

			const visit = p.visitCount != null ? p.visitCount : 0;
			const rows = [
				["お名前", E(p.name)],
				["ふりがな", p.nameKana ? E(p.nameKana) : "登録なし"],
				["電話番号", E(p.phone)],
				["メール", p.email ? E(p.email) : "登録なし"],
				["生年月日", p.birthDate ? E(p.birthDate) : "登録なし"],
				["来館回数", visit + "回"],
				["アレルギー", p.allergyInfo ? E(p.allergyInfo) : "登録なし"],
				["おもてなし内容", p.hospitalityNote ? E(p.hospitalityNote) : "登録なし"],
				["社内メモ", p.memo ? E(p.memo) : "登録なし"]
			];

			document.getElementById("confirmList").innerHTML = rows.map((r) =>
				'<div class="confirm-label">' + r[0] + '</div>' +
				'<div class="confirm-value">' + r[1] + '</div>'
			).join("");

			document.getElementById("completeBtn").addEventListener("click", function () {
				TeamF.updateCustomer(id, p);
				TeamF.clearPending("record_edit");
				location.href = "./record_edit_complete.html?id=" + id;
			});
		});
	</script>

</body>

</html>
