<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title> 花あかりの湯 - 完了</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
		rel="stylesheet">
	<style>
		:root { --gold: #b8912a; --gold-l: #e6c96a; --ink: #1a1208; --ash: #5c4a36; --moss: #4a6741; --rust: #9b3a2a; --sidebar: #1e1610; --sw: 220px; --hh: 56px; --border: #e8dece; --bg: #f2ece4; }
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
		#app { min-height: 100vh; }
		.sidebar { position: fixed; top: 0; left: 0; width: var(--sw); height: 100vh; background: var(--sidebar); display: flex; flex-direction: column; z-index: 100; border-right: 1px solid rgba(184, 145, 42, .15); }
		.sb-brand { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255, 255, 255, .06); }
		.sb-brand .en { font-size: 9px; color: rgba(255, 255, 255, .3); letter-spacing: 3px; text-transform: uppercase; }
		.sb-brand .ja { font-family: 'Noto Serif JP', serif; font-size: 16px; color: var(--gold-l); letter-spacing: 2px; margin-top: 4px; }
		.sb-badge { font-size: 10px; background: var(--gold); color: var(--ink); padding: 2px 6px; border-radius: 10px; margin-top: 6px; display: inline-block; font-weight: 700; }
		nav { flex: 1; padding: 16px 0; overflow-y: auto; }
		.ns { font-size: 9px; color: rgba(255, 255, 255, .25); letter-spacing: 3px; padding: 12px 20px 6px; text-transform: uppercase; }
		nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: rgba(255, 255, 255, .55); text-decoration: none; font-size: 13px; transition: all .15s; cursor: pointer; border-left: 2px solid transparent; }
		nav a:hover { color: #fff; background: rgba(255, 255, 255, .04); }
		nav a.active { color: var(--gold-l); border-left-color: var(--gold); background: rgba(184, 145, 42, .08); }
		nav a .ic { font-size: 15px; width: 18px; text-align: center; }
		.sb-footer { padding: 16px 20px; border-top: 1px solid rgba(255, 255, 255, .06); }
		.sb-user { font-size: 12px; color: rgba(255, 255, 255, .4); margin-bottom: 10px; }
		.sb-user strong { color: rgba(255, 255, 255, .7); display: block; }
		.logout-btn { width: 100%; padding: 8px; background: transparent; border: 1px solid rgba(255, 255, 255, .12); border-radius: 2px; color: rgba(255, 255, 255, .4); font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all .2s; font-family: 'Noto Sans JP', sans-serif; }
		.logout-btn:hover { border-color: var(--rust); color: #e07070; }
		.main { margin-left: var(--sw); min-height: 100vh; display: flex; flex-direction: column; }
		.topbar { height: var(--hh); background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 16px; position: sticky; top: 0; z-index: 50; }
		.topbar-title { font-family: 'Noto Serif JP', serif; font-size: 16px; color: var(--ash); flex: 1; }
		.topbar-date { font-size: 12px; color: #999; }
		.badge-pill { font-size: 11px; background: var(--moss); color: #fff; padding: 3px 10px; border-radius: 12px; }
		.content { padding: 28px; flex: 1; display: flex; align-items: center; justify-content: center; }
		.complete-card { width: 100%; max-width: 760px; background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 52px 36px; text-align: center; }
		.success-mark { width: 58px; height: 58px; margin: 0 auto 22px; border-radius: 50%; background: var(--moss); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; }
		.success-mark.cancel { background: var(--rust); }
		.complete-card h2 { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 500; color: var(--ash); margin-bottom: 20px; }
		.summary-box { display: inline-block; text-align: left; background: #faf7f3; border: 1px solid var(--border); padding: 18px 28px; border-radius: 3px; margin-bottom: 24px; font-size: 13px; line-height: 2; color: #3a3028; }
		.summary-box .lbl { color: #999; display: inline-block; min-width: 92px; }
		.complete-message { font-size: 14px; color: #666; line-height: 2; margin-bottom: 30px; }
		.btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
		.btn { padding: 10px 22px; border: none; border-radius: 2px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; letter-spacing: .5px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
		.btn-gold { background: var(--gold); color: var(--ink); }
		.btn-gold:hover { background: var(--gold-l); }
		.btn-out { background: transparent; border: 1px solid #ccc; color: var(--ash); }
		.btn-out:hover { border-color: var(--gold); color: var(--gold); }
		@media(max-width:900px) { .sidebar { display: none; } .main { margin-left: 0; } .topbar { padding: 0 16px; } .content { padding: 20px; align-items: flex-start; } .complete-card { padding: 40px 20px; } }
	</style>
</head>

<body>

	<div id="app">
		<aside class="sidebar">
			<div class="sb-brand">
				<div class="en">Hana Akari no Yu</div>
				<div class="ja">花あかりの湯</div>
				<span class="sb-badge">管理サイト</span>
			</div>
			<nav>
				<div class="ns">メイン</div>
				<a href="./topmenu.html"><span class="ic">🏠</span>ダッシュボード</a>
				<a href="./list.html"><span class="ic">📋</span>全予約一覧</a>
				<a href="./regist.html"><span class="ic">➕</span>予約登録</a>
				<div class="ns">管理</div>
				<a href="./room.html"><span class="ic">🛏</span>空室確認</a>
				<a href="./record.html"><span class="ic">👤</span>顧客カルテ</a>
				<a href="./okami_bot.html"><span class="ic">🤖</span>女将ボット</a>
			</nav>
			<div class="sb-footer">
				<div class="sb-user">ログイン中<br><strong id="sbUser">staff001</strong></div>
				<a href="#" id="logoutLink"><button class="logout-btn">ログアウト</button></a>
			</div>
		</aside>

		<main class="main">
			<div class="topbar">
				<span class="topbar-title" id="topbarTitle">完了</span>
				<span class="topbar-date">従業員管理画面</span>
				<span class="badge-pill">予約管理</span>
			</div>

			<div class="content">
				<div class="complete-card">
					<div class="success-mark" id="successMark">✓</div>
					<h2 id="heading">完了しました</h2>
					<div class="summary-box" id="summaryBox" style="display:none;"></div>
					<p class="complete-message" id="message"></p>
					<div class="btn-group" id="btnGroup"></div>
				</div>
			</div>
		</main>
	</div>

	<script src="./js/db.js"></script>
	<script>
		function qs(name) { return new URLSearchParams(location.search).get(name); }

		TeamF.init().then(() => {
			const s = TeamF.requireLogin();
			if (!s) return;

			document.getElementById("sbUser").textContent = s.account.loginId;
			document.getElementById("logoutLink").addEventListener("click", (e) => {
				e.preventDefault();
				TeamF.logout();
				location.href = "./login.html";
			});

			const mode = qs("mode") || "regist";
			const id = qs("id");

			let title, heading, message;
			if (mode === "update") {
				title = "予約変更完了"; heading = "予約を変更しました"; message = "予約内容の変更をシステムに反映しました。";
			} else if (mode === "cancel") {
				title = "予約キャンセル完了"; heading = "予約をキャンセルしました"; message = "予約のキャンセル処理が完了しました。";
				document.getElementById("successMark").classList.add("cancel");
			} else {
				title = "予約登録完了"; heading = "予約を登録しました"; message = "顧客カルテと予約データの紐付けが完了しました。";
			}
			document.getElementById("topbarTitle").textContent = title;
			document.getElementById("heading").textContent = heading;
			document.getElementById("message").textContent = message;

			// 予約要約
			const v = id ? TeamF.reservationView(id) : null;
			if (v) {
				const r = v.reservation;
				const name = v.customer ? v.customer.name : '未登録';
				const plan = v.plan ? v.plan.planName : '';
				const box = document.getElementById("summaryBox");
				box.style.display = "inline-block";
				box.innerHTML =
					'<div><span class="lbl">お客様名</span>' + TeamF.esc(name) + ' 様</div>' +
					'<div><span class="lbl">宿泊日</span>' + TeamF.esc(TeamF.fmtJpDate(r.stayDate)) + '</div>' +
					'<div><span class="lbl">プラン</span>' + TeamF.esc(plan) + '</div>' +
					'<div><span class="lbl">お部屋</span>' + TeamF.esc(v.roomLabel || '未割当') + '</div>' +
					'<div><span class="lbl">ステータス</span>' + TeamF.esc(r.status) + '</div>';
			}

			// 導線
			const grp = document.getElementById("btnGroup");
			let html = '';
			if (mode === "update" && id) {
				html += '<a href="./detail.html?id=' + id + '" class="btn btn-gold">予約詳細へ戻る</a>';
			} else {
				html += '<a href="./list.html" class="btn btn-gold">全予約一覧へ戻る</a>';
			}
			html += '<a href="./topmenu.html" class="btn btn-out">ダッシュボードへ</a>';
			grp.innerHTML = html;
		});
	</script>

</body>

</html>
