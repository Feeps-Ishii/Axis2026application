<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>顧客カルテ変更 | 花あかりの湯</title>

	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
		rel="stylesheet">

	<style>
		:root {
			--gold: #b8912a;
			--gold-l: #e6c96a;
			--ink: #1a1208;
			--ash: #5c4a36;
			--moss: #4a6741;
			--rust: #9b3a2a;
			--sidebar: #1e1610;
			--sw: 220px;
			--hh: 56px;
			--border: #e8dece;
			--bg: #f2ece4;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: 'Noto Sans JP', sans-serif;
			background: var(--bg);
			color: var(--ink);
			min-height: 100vh;
		}

		.sidebar {
			position: fixed;
			top: 0;
			left: 0;
			width: var(--sw);
			height: 100vh;
			background: var(--sidebar);
			display: flex;
			flex-direction: column;
			z-index: 100;
			border-right: 1px solid rgba(184, 145, 42, .15);
		}

		.sb-brand {
			padding: 22px 20px 18px;
			border-bottom: 1px solid rgba(255, 255, 255, .06);
		}

		.sb-brand .en {
			font-size: 9px;
			color: rgba(255, 255, 255, .3);
			letter-spacing: 3px;
			text-transform: uppercase;
		}

		.sb-brand .ja {
			font-family: 'Noto Serif JP', serif;
			font-size: 16px;
			color: var(--gold-l);
			letter-spacing: 2px;
			margin-top: 4px;
		}

		.sb-badge {
			font-size: 10px;
			background: var(--gold);
			color: var(--ink);
			padding: 2px 6px;
			border-radius: 10px;
			margin-top: 6px;
			display: inline-block;
			font-weight: 700;
		}

		nav {
			flex: 1;
			padding: 16px 0;
			overflow-y: auto;
		}

		.ns {
			font-size: 9px;
			color: rgba(255, 255, 255, .25);
			letter-spacing: 3px;
			padding: 12px 20px 6px;
			text-transform: uppercase;
		}

		nav a {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px 20px;
			color: rgba(255, 255, 255, .55);
			text-decoration: none;
			font-size: 13px;
			transition: all .15s;
			cursor: pointer;
			border-left: 2px solid transparent;
		}

		nav a:hover {
			color: #fff;
			background: rgba(255, 255, 255, .04);
		}

		nav a.active {
			color: var(--gold-l);
			border-left-color: var(--gold);
			background: rgba(184, 145, 42, .08);
		}

		nav a .ic {
			font-size: 15px;
			width: 18px;
			text-align: center;
		}

		.sb-footer {
			padding: 16px 20px;
			border-top: 1px solid rgba(255, 255, 255, .06);
		}

		.sb-user {
			font-size: 12px;
			color: rgba(255, 255, 255, .4);
			margin-bottom: 10px;
		}

		.sb-user strong {
			color: rgba(255, 255, 255, .7);
			display: block;
		}

		.logout-btn {
			width: 100%;
			padding: 8px;
			background: transparent;
			border: 1px solid rgba(255, 255, 255, .12);
			border-radius: 2px;
			color: rgba(255, 255, 255, .4);
			font-size: 11px;
			letter-spacing: 1px;
			cursor: pointer;
			font-family: 'Noto Sans JP', sans-serif;
		}

		.logout-btn:hover {
			border-color: var(--rust);
			color: #e07070;
		}

		.main {
			margin-left: var(--sw);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.topbar {
			height: var(--hh);
			background: #fff;
			border-bottom: 1px solid var(--border);
			display: flex;
			align-items: center;
			padding: 0 28px;
			gap: 16px;
			position: sticky;
			top: 0;
			z-index: 50;
		}

		.topbar-title {
			font-family: 'Noto Serif JP', serif;
			font-size: 16px;
			color: var(--ash);
			flex: 1;
		}

		.topbar-date {
			font-size: 12px;
			color: #999;
		}

		.badge-pill {
			font-size: 11px;
			background: var(--moss);
			color: #fff;
			padding: 3px 10px;
			border-radius: 12px;
		}

		.content {
			padding: 28px;
			flex: 1;
		}

		.page-hd {
			margin-bottom: 24px;
			padding-bottom: 16px;
			border-bottom: 1px solid var(--border);
		}

		.page-hd h2 {
			font-family: 'Noto Serif JP', serif;
			font-size: 20px;
			color: var(--ash);
			font-weight: 400;
			margin-bottom: 4px;
		}

		.sc-id {
			font-size: 10px;
			color: #ccc;
			letter-spacing: 1px;
		}

		.card {
			background: #fff;
			border-radius: 4px;
			border: 1px solid var(--border);
			padding: 24px;
			margin-bottom: 20px;
		}

		.card-title {
			font-family: 'Noto Serif JP', serif;
			font-size: 15px;
			color: var(--ash);
			margin-bottom: 16px;
			padding-bottom: 12px;
			border-bottom: 1px solid #f0ebe3;
		}

		.edit-head {
			display: flex;
			gap: 16px;
			align-items: center;
			margin-bottom: 22px;
		}

		.kavatar {
			width: 56px;
			height: 56px;
			background: #f0ebe3;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Noto Serif JP', serif;
			font-size: 20px;
			color: var(--ash);
			flex-shrink: 0;
		}

		.edit-name {
			font-family: 'Noto Serif JP', serif;
			font-size: 18px;
		}

		.edit-sub {
			font-size: 12px;
			color: #999;
			margin-top: 4px;
		}

		.edit-table {
			width: 100%;
			border-collapse: collapse;
			font-size: 13px;
			border-top: 1px solid #eadfce;
		}

		.edit-table tr {
			border-bottom: 1px solid #eadfce;
		}

		.edit-table th {
			width: 160px;
			background: #f4efe7;
			color: var(--ash);
			font-weight: 600;
			text-align: left;
			padding: 13px 14px;
			vertical-align: top;
		}

		.edit-table td {
			padding: 10px 14px;
			vertical-align: top;
		}

		.edit-table input,
		.edit-table textarea {
			width: 100%;
			border: 1px solid var(--border);
			background: #fff;
			border-radius: 3px;
			padding: 10px 12px;
			font-family: 'Noto Sans JP', sans-serif;
			font-size: 13px;
			color: #3a3028;
		}

		.edit-table input:focus,
		.edit-table textarea:focus {
			outline: none;
			border-color: var(--gold);
			box-shadow: 0 0 0 3px rgba(184, 145, 42, .08);
		}

		.edit-table textarea {
			min-height: 86px;
			resize: vertical;
			line-height: 1.8;
		}

		.btn {
			padding: 10px 22px;
			border: none;
			border-radius: 2px;
			font-family: 'Noto Sans JP', sans-serif;
			font-size: 13px;
			font-weight: 500;
			cursor: pointer;
			text-decoration: none;
			display: inline-block;
		}

		.btn-gold {
			background: var(--gold);
			color: var(--ink);
		}

		.btn-gold:hover {
			background: var(--gold-l);
		}

		.btn-out {
			background: transparent;
			border: 1px solid #ccc;
			color: var(--ash);
		}

		.btn-out:hover {
			border-color: var(--gold);
			color: var(--gold);
		}

		.btn-row {
			display: flex;
			gap: 10px;
			margin-top: 20px;
			flex-wrap: wrap;
		}

		@media(max-width:900px) {
			.sidebar {
				display: none;
			}

			.main {
				margin-left: 0;
			}

			.topbar {
				padding: 0 16px;
			}

			.content {
				padding: 20px;
			}

			.edit-table th,
			.edit-table td {
				display: block;
				width: 100%;
			}

			.edit-table th {
				padding-bottom: 6px;
			}

			.edit-table td {
				padding-top: 0;
			}
		}
	</style>
</head>

<body>

	<aside class="sidebar">

		<div class="sb-brand">
			<div class="en">Hana Akari no Yu</div>
			<div class="ja">花あかりの湯</div>
			<span class="sb-badge">管理サイト</span>
		</div>

		<nav>
			<div class="ns">メイン</div>


			<a href="./topmenu.html">
				<span class="ic">🏠</span>
				ダッシュボード
			</a>

			<a href="./list.html">
				<span class="ic">📋</span>
				全予約一覧
			</a>

			<a href="./regist.html">
				<span class="ic">➕</span>
				予約登録
			</a>

			<div class="ns">管理</div>

			<a href="./room.html">
				<span class="ic">🛏</span>
				空室確認
			</a>

			<a href="./record.html" class="active">
				<span class="ic">👤</span>
				顧客カルテ
			</a>


			<a href="./okami_bot.html">
				<span class="ic">🤖</span>
				女将ボット
			</a>

		</nav>

		<div class="sb-footer">
			<div class="sb-user">
				ログイン中<br>
				<strong>staff001</strong>
			</div>

			<a id="logoutLink">
				<button class="logout-btn">
					ログアウト
				</button>
			</a>
		</div>

	</aside>

	<main class="main">

		<div class="topbar">
			<span class="topbar-title">顧客カルテ変更</span>
			<span class="topbar-date" id="todayDate"></span>
		</div>

		<div class="content">

			<div class="card">
				<div class="card-title">変更内容入力</div>

				<div class="edit-head">
					<div class="kavatar" id="avatar">客</div>

					<div>
						<div class="edit-name">
							<span id="headName"></span> 様
						</div>
						<div class="edit-sub">
							顧客カルテの内容を変更します
						</div>
					</div>
				</div>

				<form id="editForm">

					<table class="edit-table">
						<tbody>
							<tr>
								<th>お名前</th>
								<td><input type="text" name="name" id="f_name" required></td>
							</tr>

							<tr>
								<th>ふりがな</th>
								<td><input type="text" name="nameKana" id="f_nameKana"></td>
							</tr>

							<tr>
								<th>電話番号</th>
								<td><input type="tel" name="phone" id="f_phone" required></td>
							</tr>

							<tr>
								<th>メール</th>
								<td><input type="email" name="email" id="f_email"></td>
							</tr>

							<tr>
								<th>生年月日</th>
								<td><input type="date" name="birthDate" id="f_birthDate"></td>
							</tr>

							<tr>
								<th>来館回数</th>
								<td><input type="number" name="visitCount" id="f_visitCount" min="0"></td>
							</tr>

							<tr>
								<th>アレルギー</th>
								<td><input type="text" name="allergyInfo" id="f_allergyInfo"></td>
							</tr>

							<tr>
								<th>おもてなし内容</th>
								<td><textarea name="hospitalityNote" id="f_hospitalityNote"></textarea></td>
							</tr>

							<tr>
								<th>社内メモ</th>
								<td><textarea name="memo" id="f_memo" maxlength="500"></textarea></td>
							</tr>
						</tbody>
					</table>

					<div class="btn-row">
						<button type="submit" class="btn btn-gold">確認へ進む</button>

						<a class="btn btn-out" id="backLink">戻る</a>
					</div>
				</form>
			</div>

		</div>
	</main>

	<script src="./js/db.js"></script>
	<script>
		TeamF.init().then(() => {
			const s = TeamF.requireLogin();
			if (!s) return;

			const E = TeamF.esc;
			document.getElementById("todayDate").textContent = TeamF.fmtJpDate(TeamF.today());

			document.getElementById("logoutLink").addEventListener("click", function (e) {
				e.preventDefault();
				TeamF.logout();
				location.href = "./login.html";
			});

			const params = new URLSearchParams(location.search);
			const id = params.get("id");
			const restore = params.get("restore") === "1";

			const c = TeamF.customer(id);
			if (!c) { location.href = "./record.html"; return; }

			document.getElementById("avatar").textContent = c.name ? c.name.substring(0, 1) : "客";
			document.getElementById("headName").textContent = c.name || "";
			document.getElementById("backLink").href = "./record_detail.html?id=" + c.customerId;

			// 復元: ?restore=1 で getPending、無ければ customer(id)
			let init = c;
			if (restore) {
				const pending = TeamF.getPending("record_edit");
				if (pending && String(pending.id) === String(c.customerId) && pending.patch) {
					init = Object.assign({}, c, pending.patch);
				}
			}

			document.getElementById("f_name").value = init.name || "";
			document.getElementById("f_nameKana").value = init.nameKana || "";
			document.getElementById("f_phone").value = init.phone || "";
			document.getElementById("f_email").value = init.email || "";
			document.getElementById("f_birthDate").value = init.birthDate || "";
			document.getElementById("f_visitCount").value = init.visitCount != null ? init.visitCount : 0;
			document.getElementById("f_allergyInfo").value = init.allergyInfo || "";
			document.getElementById("f_hospitalityNote").value = init.hospitalityNote || "";
			document.getElementById("f_memo").value = init.memo || "";

			document.getElementById("editForm").addEventListener("submit", function (e) {
				e.preventDefault();
				const vc = document.getElementById("f_visitCount").value;
				const patch = {
					name: document.getElementById("f_name").value.trim(),
					nameKana: document.getElementById("f_nameKana").value.trim(),
					phone: document.getElementById("f_phone").value.trim(),
					email: document.getElementById("f_email").value.trim(),
					birthDate: document.getElementById("f_birthDate").value || null,
					visitCount: vc === "" ? 0 : Number(vc),
					allergyInfo: document.getElementById("f_allergyInfo").value.trim(),
					hospitalityNote: document.getElementById("f_hospitalityNote").value.trim(),
					memo: document.getElementById("f_memo").value.trim()
				};
				TeamF.setPending("record_edit", { id: c.customerId, patch: patch });
				location.href = "./record_edit_confirm.html";
			});
		});
	</script>

</body>

</html>
