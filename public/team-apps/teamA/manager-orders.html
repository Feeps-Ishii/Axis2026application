<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注文管理 | つばさ配送サービス</title>
  <link rel="stylesheet" href="./css/globals.css">
  <link rel="stylesheet" href="./css/order.css">
  <link rel="stylesheet" href="./css/Header.css">
  <link rel="stylesheet" href="./css/ManagerFooter.css">
</head>

<body>
  <div class="orderListPage">
    <div id="appHeader"></div>

    <main class="container">
      <!-- 検索 -->
      <section class="searchFilterBox">
        <div class="searchField">
          <input id="inputWord" placeholder="注文者名または商品名を入力">
        </div>
        <div class="filterSelects">
          <button class="btnSearch" id="btnSearch">検索</button>
          <button class="btnReset" id="btnReset">リセット</button>
        </div>
      </section>

      <!-- タブ -->
      <section class="statusTabs" id="statusTabs"></section>

      <!-- テーブル -->
      <section class="tableWrapper">
        <table class="orderTable">
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>

      <div id="pagination"></div>
      <div id="toastArea"></div>
    </main>

    <div id="managerFooter"></div>
  </div>

  <script src="./js/db.js"></script>
  <script src="./js/ui.js"></script>
  <script>
    const esc = (s) => TeamAUI.esc(s);

    const COLUMNS = [
      ["id", "注文ID"], ["productName", "商品名"], ["quantity", "注文数"],
      ["customerName", "注文者"], ["deliveryDate", "配送日"], ["hasRequest", "個別要望"],
      ["paymentStatus", "支払い状態"], ["driverName", "ドライバー"], ["deliveryStatus", "配送状況"],
      ["approved", "アクション"], ["orderPlaced", "発注"],
    ];
    const TABS = ["すべて", "未承認", "未割当", "代引き", "未発注", "キャンセル済"];

    let inputWord = "";
    let searchWord = "";
    let activeTab = "すべて";
    let currentPage = 1;
    let pageSize = 20;
    let sortKey = null;
    let sortOrder = "asc";

    // 元の Order 型に近い行データを TeamA データ層から構築する
    function buildRows() {
      // 元は1注文=複数明細を行ごとに受け取り groupedOrders でまとめていた。
      // ここでは orderView(items 付き) を直接グループ化済みの形で生成する。
      const views = TeamA.ordersList({ keyword: searchWord });
      return views.map((v) => {
        const pay = TeamA.paymentByOrder(v.orderId);
        const payStatus = pay && (pay.paymentMethod === "cod") ? "代引き" : "支払い済み";
        let deliveryStatus = "未配送";
        if (v.realDeliveryStatus === "delivering") deliveryStatus = "配送中";
        else if (v.realDeliveryStatus === "completed") deliveryStatus = "配送済";
        const note = String(v.requestNote || "").trim();
        const allergies = (v.allergies || []).join("、");
        const dislikes = (v.dislikedFoods || []).join("、");
        const instruction = String(v.deliveryInstruction || "").trim();
        const lines = [];
        if (allergies) lines.push("【アレルギー】\n" + allergies);
        if (dislikes) lines.push("【嫌いな食品】\n" + dislikes);
        if (instruction && instruction !== "なし") lines.push("【配送指示】\n" + instruction);
        if (note) lines.push("【個別要望】\n" + note);
        const tooltip = lines.join("\n\n");
        const hasRequest = lines.length > 0;
        return {
          id: v.orderNo,
          orderId: v.orderId,
          productNames: (v.items || []).map((it) => it.productName),
          quantities: (v.items || []).map((it) => it.quantity),
          productName: (v.items[0] || {}).productName || "",
          quantity: (v.items[0] || {}).quantity || 0,
          customerName: v.customerName,
          deliveryDate: v.deliveryDate,
          hasRequest,
          customTooltip: tooltip,
          paymentStatus: payStatus,
          driverName: v.driverName,
          deliveryStatus,
          approved: v.orderStatus === "approved" || v.orderStatus === "completed",
          orderPlaced: v.orderPlaced === "済" ? "済" : "未",
          canceled: !!v.canceled,
        };
      });
    }

    function counts() {
      // 元のバッジ: 未承認 / 未割当 / 代引き / 未発注
      const rows = buildRowsRaw();
      return {
        "未承認": rows.filter((r) => !r.canceled && !r.approved).length,
        "未割当": rows.filter((r) => !r.canceled && r.driverName === "未割当").length,
        "代引き": rows.filter((r) => !r.canceled && r.paymentStatus === "代引き").length,
        "未発注": rows.filter((r) => !r.canceled && r.orderPlaced === "未").length,
      };
    }
    // フィルタ前の全行（件数用）
    function buildRowsRaw() {
      const views = TeamA.ordersList({});
      return views.map((v) => {
        const pay = TeamA.paymentByOrder(v.orderId);
        return {
          canceled: !!v.canceled,
          approved: v.orderStatus === "approved" || v.orderStatus === "completed",
          driverName: v.driverName,
          paymentStatus: pay && pay.paymentMethod === "cod" ? "代引き" : "支払い済み",
          orderPlaced: v.orderPlaced === "済" ? "済" : "未",
        };
      });
    }

    function applyTab(rows) {
      if (activeTab === "すべて") return rows;
      if (activeTab === "キャンセル済") return rows.filter((r) => r.canceled);
      if (activeTab === "未承認") return rows.filter((r) => !r.canceled && !r.approved);
      if (activeTab === "未割当") return rows.filter((r) => !r.canceled && r.driverName === "未割当");
      if (activeTab === "代引き") return rows.filter((r) => !r.canceled && r.paymentStatus === "代引き");
      if (activeTab === "未発注") return rows.filter((r) => !r.canceled && r.orderPlaced === "未");
      return rows;
    }

    function sortRows(rows) {
      if (!sortKey) return rows;
      return rows.slice().sort((a, b) => {
        if (a.canceled && !b.canceled) return 1;
        if (!a.canceled && b.canceled) return -1;
        if (a.canceled && b.canceled) return 0;
        let aScore = 0, bScore = 0;
        if (sortKey === "hasRequest") { aScore = a.hasRequest ? 2 : 1; bScore = b.hasRequest ? 2 : 1; }
        else if (sortKey === "paymentStatus") { aScore = a.paymentStatus === "支払い済み" ? 2 : 1; bScore = b.paymentStatus === "支払い済み" ? 2 : 1; }
        else if (sortKey === "deliveryStatus") {
          const sc = (s) => s === "未配送" ? 3 : s === "配送中" ? 2 : 1;
          aScore = sc(a.deliveryStatus); bScore = sc(b.deliveryStatus);
        }
        else if (sortKey === "approved") { aScore = !a.approved ? 2 : 1; bScore = !b.approved ? 2 : 1; }
        else if (sortKey === "orderPlaced") { aScore = a.orderPlaced === "済" ? 2 : 1; bScore = b.orderPlaced === "済" ? 2 : 1; }
        else if (sortKey === "productName") {
          const as = (a.productNames || []).join(","), bs = (b.productNames || []).join(",");
          return sortOrder === "asc" ? as.localeCompare(bs) : bs.localeCompare(as);
        }
        else if (sortKey === "quantity") {
          const an = (a.quantities || []).reduce((s, q) => s + q, 0), bn = (b.quantities || []).reduce((s, q) => s + q, 0);
          return sortOrder === "asc" ? an - bn : bn - an;
        }
        else {
          const as = String(a[sortKey] || ""), bs = String(b[sortKey] || "");
          return sortOrder === "asc" ? as.localeCompare(bs) : bs.localeCompare(as);
        }
        if (aScore !== bScore) return sortOrder === "asc" ? bScore - aScore : aScore - bScore;
        return 0;
      });
    }

    function renderTabs() {
      const c = counts();
      const host = document.getElementById("statusTabs");
      const tabHtml = TABS.map((t) => {
        const badge = c[t] > 0 ? ` <span class="badge">${c[t]}</span>` : "";
        return `<button class="tabItem ${t === activeTab ? "activeTab" : ""}" data-tab="${esc(t)}">${esc(t)}${badge}</button>`;
      }).join("");
      const total = window.__lastTotal || 0;
      const from = total > 0 ? (currentPage - 1) * pageSize + 1 : 0;
      const to = Math.min(currentPage * pageSize, total);
      host.innerHTML = tabHtml + `
        <div class="tableControlsInline">
          <div class="pageSizeSelector">
            <span>表示件数: </span>
            <select id="pageSizeSel">
              <option value="20">20件</option>
              <option value="50">50件</option>
              <option value="100">100件</option>
            </select>
          </div>
          <div class="pageSummary">
            全 <strong>${total}</strong> 件中 ${from}〜${to} 件表示
          </div>
        </div>`;
      host.querySelectorAll("[data-tab]").forEach((b) => b.addEventListener("click", () => { activeTab = b.dataset.tab; currentPage = 1; render(); }));
      const sel = document.getElementById("pageSizeSel");
      sel.value = String(pageSize);
      sel.addEventListener("change", (e) => { pageSize = Number(e.target.value); currentPage = 1; render(); });
    }

    function renderHead() {
      document.getElementById("tableHead").innerHTML = COLUMNS.map(([key, label]) => {
        const arrow = sortKey === key ? (sortOrder === "asc" ? " ▲" : " ▼") : "";
        return `<th data-sort="${key}" style="cursor:pointer">${esc(label)}${arrow}</th>`;
      }).join("");
      document.querySelectorAll("#tableHead th").forEach((th) => th.addEventListener("click", () => handleSort(th.dataset.sort)));
    }

    function handleSort(key) {
      if (sortKey === key) {
        if (sortOrder === "asc") sortOrder = "desc";
        else { sortKey = null; sortOrder = "asc"; }
      } else { sortKey = key; sortOrder = "asc"; }
      render();
    }

    function renderBody(rows) {
      const start = (currentPage - 1) * pageSize;
      const paged = rows.slice(start, start + pageSize);
      const body = document.getElementById("tableBody");
      body.innerHTML = paged.map((o) => {
        const canceled = !!o.canceled;
        const reqCell = canceled
          ? `<span class="flagOff">-</span>`
          : (o.customTooltip && o.customTooltip.trim() !== "")
            ? `<span class="${o.customTooltip.includes("【アレルギー】") ? "flagOnAllergy" : "flagOn"} tooltipTrigger" data-tooltip="${esc(o.customTooltip)}">あり</span>`
            : `<span class="flagOff">なし</span>`;
        const payCell = `<td class="${o.paymentStatus === "代引き" ? "paymentDanger" : ""}">${canceled ? "-" : esc(o.paymentStatus)}</td>`;
        const driverCell = `<td class="${!canceled && o.driverName === "未割当" ? "paymentDanger" : ""}">${canceled ? "-" : esc(o.driverName)}</td>`;
        const dsClass = canceled ? "statusCanceled" : o.deliveryStatus === "未配送" ? "statusUndelivered" : o.deliveryStatus === "配送中" ? "statusShipping" : "statusDelivered";
        const actionCell = canceled
          ? `<span class="btnCanceled">キャンセル済</span>`
          : o.approved
            ? `<button class="btnApprove" disabled>承認済</button>`
            : `<a href="./manager-order-detail.html?mode=edit&id=${o.orderId}" class="btnApproveLink">承認</a>`;
        const orderPlacedCell = canceled
          ? "-"
          : o.orderPlaced === "済"
            ? "済"
            : `<select class="inlineOrderSelect ${o.orderPlaced === "未" ? "isDanger" : "isSuccess"}" data-place="${o.orderId}">
                 <option value="未">未</option><option value="済">済</option>
               </select>`;
        return `<tr class="${canceled ? "isCanceled" : ""}">
          <td class="orderIdTd"><a href="./manager-order-detail.html?id=${o.orderId}" class="orderIdLink">${esc(o.id)}</a></td>
          <td class="productNameListTd">${o.productNames.map((n) => `<div class="productListItem">${esc(n)}</div>`).join("")}</td>
          <td class="quantityListTd">${o.quantities.map((q) => `<div class="quantityListItem">${esc(q)}</div>`).join("")}</td>
          <td>${esc(o.customerName)}</td>
          <td>${esc(o.deliveryDate)}</td>
          <td>${reqCell}</td>
          ${payCell}
          ${driverCell}
          <td><span class="adminStatusBadge ${dsClass}">${canceled ? "-" : esc(o.deliveryStatus)}</span></td>
          <td>${actionCell}</td>
          <td>${orderPlacedCell}</td>
        </tr>`;
      }).join("");
      body.querySelectorAll("[data-place]").forEach((sel) => sel.addEventListener("change", (e) => {
        if (e.target.value !== "済") return;
        TeamA.placeOrder(Number(sel.dataset.place), true);
        showToast(`注文ID: ${sel.dataset.place} の発注を「済」に更新しました。`);
        render();
      }));
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / pageSize);
      const host = document.getElementById("pagination");
      if (totalPages <= 1) { host.innerHTML = ""; return; }
      let html = `<div class="paginationButtons">`;
      html += `<button class="pageNavBtn" ${currentPage === 1 ? "disabled" : ""} data-nav="prev">前へ</button>`;
      for (let i = 1; i <= totalPages; i++) html += `<button class="pageNumberBtn ${currentPage === i ? "activePage" : ""}" data-page="${i}">${i}</button>`;
      html += `<button class="pageNavBtn" ${currentPage === totalPages ? "disabled" : ""} data-nav="next">次へ</button></div>`;
      host.innerHTML = html;
      host.querySelectorAll("[data-page]").forEach((b) => b.addEventListener("click", () => { currentPage = Number(b.dataset.page); render(); }));
      const prev = host.querySelector('[data-nav="prev"]'); if (prev) prev.addEventListener("click", () => { currentPage--; render(); });
      const next = host.querySelector('[data-nav="next"]'); if (next) next.addEventListener("click", () => { currentPage++; render(); });
    }

    let toastTimer = null;
    function showToast(msg) {
      const area = document.getElementById("toastArea");
      area.innerHTML = `<div class="toastNotification">${esc(msg)}</div>`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { area.innerHTML = ""; }, 3000);
    }

    function render() {
      let rows = buildRows();
      rows = applyTab(rows);
      rows = sortRows(rows);
      window.__lastTotal = rows.length;
      renderTabs();
      renderHead();
      renderBody(rows);
      renderPagination(rows.length);
    }

    TeamA.init().then(() => {
      if (!TeamA.requireRole(["admin", "staff"], "manager-orders.html")) return;
      TeamAUI.renderHeader("staff", "注文管理");
      TeamAUI.renderManagerFooter();
      const inp = document.getElementById("inputWord");
      inp.addEventListener("input", (e) => inputWord = e.target.value);
      inp.addEventListener("keydown", (e) => { if (e.key === "Enter") { searchWord = inputWord; currentPage = 1; render(); } });
      document.getElementById("btnSearch").addEventListener("click", () => { searchWord = inputWord; currentPage = 1; render(); });
      document.getElementById("btnReset").addEventListener("click", () => { inputWord = ""; searchWord = ""; inp.value = ""; activeTab = "すべて"; currentPage = 1; render(); });
      render();
    });
  </script>
</body>

</html>
