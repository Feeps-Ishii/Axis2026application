<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社員情報削除 | つばさ配送サービス</title>
  <link rel="stylesheet" href="./css/globals.css">
  <link rel="stylesheet" href="./css/Header.css">
  <link rel="stylesheet" href="./css/ManagerFooter.css">
  <link rel="stylesheet" href="./css/employee.css">
  <style>
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-box { background: white; padding: 24px; border-radius: 8px; width: 340px; text-align: center; }
    .modal-box h3 { margin-bottom: 12px; font-size: 18px; }
    .modal-box p { margin-bottom: 20px; color: #4a5568; }
    .modal-actions { display: flex; justify-content: space-around; }
    .btn-cancel { background: #e2e8f0; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    .btn-danger-confirm { background: #e53e3e; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
  </style>
</head>

<body>
  <div class="employeeDeletePage">
    <div id="appHeader"></div>

    <main class="container">
      <section class="pageTitle">
        <div>つばさ配送サービス 業務管理システム</div>
        <div class="orderCount">社員情報削除</div>
      </section>

      <section class="formBox">
        <div class="alertWarningBox">
          【注意】以下の社員データを完全に削除します。この操作は取り消せません。
        </div>

        <div class="formGroup">
          <label>社員ID</label>
          <input type="text" id="emp-id" readonly style="background-color:#edf2f7;">
        </div>

        <div class="formGroup">
          <label>社員名</label>
          <input type="text" id="emp-name" readonly style="background-color:#edf2f7;">
        </div>

        <div class="formGroup">
          <label>役職</label>
          <input type="text" id="emp-role" readonly style="background-color:#edf2f7;">
        </div>

        <div class="formGroup">
          <label>電話番号</label>
          <input type="text" id="emp-phone" readonly style="background-color:#edf2f7;">
        </div>

        <div class="formGroup">
          <label>誕生日</label>
          <input type="text" id="emp-birth" readonly style="background-color:#edf2f7;">
        </div>

        <div class="submitActionBox">
          <a href="./manager-employees.html" class="btnBack">キャンセル</a>
          <button type="button" id="btnConfirm" class="btnDanger">削除する</button>
        </div>
      </section>
    </main>

    <div id="modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
        <h3 style="color:#e53e3e;">最終確認</h3>
        <p>本当にこの社員データを削除してもよろしいですか？</p>
        <div class="modal-actions">
          <button class="btn-cancel" id="btnCancel">やめる</button>
          <button class="btn-danger-confirm" id="btnOk">本当に削除する</button>
        </div>
      </div>
    </div>

    <div id="managerFooter"></div>
  </div>

  <script src="./js/db.js"></script>
  <script src="./js/ui.js"></script>
  <script>
    TeamA.init().then(() => {
      if (!TeamA.requireRole(["admin", "staff"])) return;
      TeamAUI.renderHeader("staff", "社員情報削除");
      TeamAUI.renderManagerFooter();

      const modal = document.getElementById("modal");
      const id = Number(new URLSearchParams(location.search).get("id"));
      const e = TeamA.employeeById(id);
      if (e) {
        document.getElementById("emp-id").value = e.employeeCode || "";
        document.getElementById("emp-name").value = e.employeeName || "";
        document.getElementById("emp-role").value = e.role || "";
        document.getElementById("emp-phone").value = e.phone || "未登録";
        document.getElementById("emp-birth").value = e.birthDate || "未登録";
      }

      document.getElementById("btnConfirm").addEventListener("click", () => {
        modal.style.display = "flex";
      });
      document.getElementById("btnCancel").addEventListener("click", () => {
        modal.style.display = "none";
      });
      document.getElementById("btnOk").addEventListener("click", () => {
        TeamA.deleteEmployee(id);
        modal.style.display = "none";
        location.href = "./manager-employee-complete.html?mode=delete";
      });
    });
  </script>
</body>

</html>
