<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規社員登録 | つばさ配送サービス</title>
  <link rel="stylesheet" href="./css/globals.css">
  <link rel="stylesheet" href="./css/Header.css">
  <link rel="stylesheet" href="./css/ManagerFooter.css">
  <link rel="stylesheet" href="./css/employee.css">
  <style>
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-box { background: white; padding: 24px; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .modal-box h3 { margin-bottom: 12px; font-size: 18px; }
    .modal-box p { margin-bottom: 20px; color: #4a5568; }
    .modal-actions { display: flex; justify-content: space-around; }
    .btn-cancel { background: #e2e8f0; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    .btn-ok { background: #3182ce; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
  </style>
</head>

<body>
  <div class="employeeRegistPage">
    <div id="appHeader"></div>

    <main class="container">
      <section class="pageTitle">
        <div>つばさ配送サービス 業務管理システム</div>
        <div class="orderCount">新規社員登録</div>
      </section>

      <section class="formBox">
        <div class="formGroup">
          <label for="emp-name">社員名</label>
          <input type="text" id="emp-name" placeholder="例: 山田 太郎">
        </div>

        <div class="formGroup">
          <label for="emp-password">パスワード</label>
          <input type="password" id="emp-password" placeholder="半角英数字で入力してください">
        </div>

        <div class="formGroup">
          <label for="emp-role">役職</label>
          <select id="emp-role">
            <option value="">選択してください</option>
            <option value="admin">システム管理者</option>
            <option value="staff">事務スタッフ</option>
            <option value="driver">配送ドライバー</option>
          </select>
        </div>

        <div class="formGroup">
          <label for="emp-phone">電話番号</label>
          <input type="tel" id="emp-phone" placeholder="例: 090-1234-5678">
        </div>

        <div class="formGroup">
          <label for="emp-birth">誕生日</label>
          <input type="date" id="emp-birth">
        </div>

        <div class="submitActionBox">
          <a href="./manager-employees.html" class="btnBack">一覧に戻る</a>
          <button type="button" id="btnConfirm" class="btnSubmit">登録する</button>
        </div>
      </section>
    </main>

    <div id="modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
        <h3>登録確認</h3>
        <p>この内容で登録してもよろしいですか？</p>
        <div class="modal-actions">
          <button class="btn-cancel" id="btnCancel">キャンセル</button>
          <button class="btn-ok" id="btnOk">OK</button>
        </div>
      </div>
    </div>

    <div id="managerFooter"></div>
  </div>

  <script src="./js/db.js"></script>
  <script src="./js/ui.js"></script>
  <script>
    TeamA.init().then(() => {
      if (!TeamA.requireRole(["admin", "staff"])) return;
      TeamAUI.renderHeader("staff", "新規社員登録");
      TeamAUI.renderManagerFooter();

      const modal = document.getElementById("modal");
      function val(id) { return document.getElementById(id).value; }

      document.getElementById("btnConfirm").addEventListener("click", () => {
        if (!val("emp-birth")) { alert("誕生日を設定してください。"); return; }
        modal.style.display = "flex";
      });

      document.getElementById("btnCancel").addEventListener("click", () => {
        modal.style.display = "none";
      });

      document.getElementById("btnOk").addEventListener("click", () => {
        TeamA.createEmployee({
          employeeName: val("emp-name"),
          password: val("emp-password"),
          role: val("emp-role"),
          phone: val("emp-phone"),
          birthDate: val("emp-birth"),
        });
        modal.style.display = "none";
        location.href = "./manager-employee-complete.html?mode=register";
      });
    });
  </script>
</body>

</html>
