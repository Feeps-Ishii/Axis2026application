<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドライバー管理 | つばさ配送サービス</title>
  <link rel="stylesheet" href="./css/globals.css">
  <link rel="stylesheet" href="./css/Header.css">
  <link rel="stylesheet" href="./css/ManagerFooter.css">
  <link rel="stylesheet" href="./css/driver.css">
</head>

<body>
  <div class="driverListPage">
    <div id="appHeader"></div>

    <main class="container">
      <section class="pageTitle">
        <div>つばさ配送サービス 業務管理システム</div>
        <div class="orderCount">ドライバー一覧</div>
      </section>

      <section class="searchFilterBox">
        <div>
          <p id="errorMessage" class="errorMessage" style="display:none;"></p>
        </div>
        <div>
          <a href="./manager-driver-regist.html" class="btnRegisterCustomer">＋ 新規ドライバー登録</a>
        </div>
      </section>

      <section class="tableWrapper">
        <table class="orderTable">
          <thead>
            <tr>
              <th>ドライバーID</th>
              <th>ドライバー名</th>
              <th>連絡先</th>
              <th>車両情報</th>
              <th>冷蔵・冷凍対応</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="driverTbody"></tbody>
        </table>
      </section>
    </main>

    <div id="managerFooter"></div>
  </div>

  <script src="./js/db.js"></script>
  <script src="./js/ui.js"></script>
  <script>
    function formatVehicle(d) {
      const no = (d.vehicleNo || "").trim();
      const info = (d.vehicleInfo || "").trim();
      if (no && info) return `${no} (${info})`;
      if (no) return no;
      if (info) return info;
      return "未登録";
    }

    TeamA.init().then(() => {
      if (!TeamA.requireRole(["admin", "staff"])) return;
      TeamAUI.renderHeader("staff", "ドライバー管理");
      TeamAUI.renderManagerFooter();

      const esc = TeamAUI.esc;
      const drivers = TeamA.driversActive();
      const tbody = document.getElementById("driverTbody");

      if (drivers.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6">登録されているドライバーはありません。</td></tr>`;
        return;
      }

      tbody.innerHTML = drivers.map((d) => `
        <tr>
          <td>${esc(d.driverCode)}</td>
          <td>${esc(d.driverName)}</td>
          <td>${esc(d.phone)}</td>
          <td>${esc(formatVehicle(d))}</td>
          <td>${d.refrigeratedFlag ? "対応可" : "なし"}</td>
          <td>
            <a href="./manager-driver-detail.html?driverId=${d.driverId}" class="btnTableAction btnTableEdit">編集</a>
            <a href="./manager-driver-delete.html?driverId=${d.driverId}" class="btnTableAction btnTableDelete">削除</a>
          </td>
        </tr>`).join("");
    });
  </script>
</body>

</html>
