<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>訪問報告一覧</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body class="staff-list-page care-user-list-page all-report-list-page hidamari-visit-list-page">

	<header class="site-header">

		<div class="header-inner">

			<div class="header-title-area">
				<p class="system-subtitle">ひだまり支援センター</p>
				<h1 class="system-title">事務作業管理システム</h1>
			</div>

			<div class="header-user-area">
				<p class="login-user">
					ようこそ、
					<span class="user-name" id="userName">ゲスト</span>
					さん
				</p>

				<form class="logout-form" onsubmit="return false;">
					<button type="submit" class="logout-button" onclick="TeamG.logout()">
						ログアウト
					</button>
				</form>
			</div>

		</div>

	</header>

	<main class="care-user-list-container compact-care-user-list-container compact-staff-list-container hidamari-visit-list-container">

		<section class="compact-page-top">

			<div class="compact-page-heading">
				<h2 class="page-title">訪問報告一覧</h2>
				<p class="page-description">
					全報告で登録された訪問記録を確認できます。
				</p>
			</div>

			<div class="compact-page-action-area" id="pageActionArea"></div>

		</section>

		<section class="search-section compact-search-section hidamari-visit-search-section" id="searchArea">

			<h3 class="section-title compact-table-header">検索条件</h3>

			<form method="get" class="search-form" id="visitReportSearchForm" onsubmit="return false;">

				<div class="hidamari-visit-search-grid">

					<div class="compact-form-group hidamari-visit-form-group">
						<label for="careUserName" class="compact-form-label hidamari-visit-form-label">
							利用者名
						</label>
						<input type="text"
							id="careUserName"
							name="careUserName"
							class="compact-form-input hidamari-visit-form-input"
							placeholder="利用者名を入力">
					</div>

					<div class="compact-form-group hidamari-visit-form-group">
						<label for="visitDate" class="compact-form-label hidamari-visit-form-label">
							訪問日
						</label>
						<input type="date"
							id="visitDate"
							name="visitDate"
							class="compact-form-input hidamari-visit-form-input">
					</div>

					<div class="compact-form-group hidamari-visit-form-group" id="staffNameGroup" style="display:none;">
						<label for="staffName" class="compact-form-label hidamari-visit-form-label">
							ヘルパー名
						</label>
						<input type="text"
							id="staffName"
							name="staffName"
							class="compact-form-input hidamari-visit-form-input"
							placeholder="ヘルパー名を入力">
					</div>

				</div>

				<div class="button-area compact-button-area">
					<button type="submit" class="primary-button" id="searchButton">
						検索
					</button>

					<button type="button" class="secondary-button" id="clearSearchButton">
						クリア
					</button>
				</div>

			</form>

		</section>

		<section class="care-user-table-section compact-care-user-table-section compact-staff-table-section hidamari-visit-table-section">

			<h3 class="section-title compact-table-header">訪問報告一覧</h3>

			<div class="table-area compact-table-area hidamari-visit-table-area">

				<table class="hidamari-visit-table">

					<colgroup>
						<col class="visit-col-action">
						<col class="visit-col-date">
						<col class="visit-col-user">
						<col class="visit-col-helper">
					</colgroup>

					<thead>
						<tr>
							<th class="visit-col-action">操作</th>
							<th class="visit-col-date">訪問日</th>
							<th class="visit-col-user">利用者名</th>
							<th class="visit-col-helper">担当ヘルパー</th>
						</tr>
					</thead>

					<tbody id="reportTableBody">
					</tbody>

				</table>

			</div>

		</section>

	</main>

	<footer class="footer">
		<small>© 2026 TeamG ひだまり支援センター</small>
	</footer>

	<script src="./js/db.js"></script>
	<script>
		TeamG.init().then(function () {
			const sess = TeamG.requireLogin();
			if (!sess) return;
			if (!TeamG.requireRole(sess, [1, 2])) return;

			document.getElementById("userName").textContent = sess.loginUserName || "ゲスト";

			const actionArea = document.getElementById("pageActionArea");
			let actionHtml = "";
			if (sess.roleType === 1) {
				actionHtml += '<a href="./admin_dashboard.html" class="secondary-button">管理者ダッシュボードへ戻る</a>';
			}
			if (sess.roleType === 2) {
				actionHtml += '<a href="./helper_dashboard.html" class="secondary-button">ヘルパーダッシュボードへ戻る</a>';
				actionHtml += '<a href="./report_register.html" class="primary-button">全報告を登録する</a>';
			}
			actionArea.innerHTML = actionHtml;

			if (sess.roleType === 1) {
				document.getElementById("staffNameGroup").style.display = "";
			}

			const q = new URLSearchParams(location.search);
			const careUserNameEl = document.getElementById("careUserName");
			const visitDateEl = document.getElementById("visitDate");
			const staffNameEl = document.getElementById("staffName");
			careUserNameEl.value = q.get("careUserName") || "";
			visitDateEl.value = q.get("visitDate") || "";
			staffNameEl.value = q.get("staffName") || "";

			function render() {
				const rows = TeamG.searchVisitReports(sess.roleType, sess.staffId, {
					careUserName: careUserNameEl.value.trim() || null,
					visitDate: visitDateEl.value.trim() || null,
					helperName: (sess.roleType === 1 ? (staffNameEl.value.trim() || null) : null),
				});
				const tbody = document.getElementById("reportTableBody");
				if (!rows.length) {
					tbody.innerHTML = '<tr><td colspan="4" class="empty-message">条件に一致する訪問報告は見つかりませんでした。</td></tr>';
					return;
				}
				tbody.innerHTML = rows.map(function (report) {
					return '<tr>' +
						'<td class="visit-col-action"><a href="./visitreport_detail.html?visitRecordId=' + encodeURIComponent(report.visitRecordId) + '" class="hidamari-detail-button">詳細</a></td>' +
						'<td class="visit-col-date">' + TeamG.esc(report.visitDate ? TeamG.fmtDate(report.visitDate) : "") + '</td>' +
						'<td class="visit-col-user">' + TeamG.esc(report.careUserName) + '</td>' +
						'<td class="visit-col-helper">' + TeamG.esc(report.staffName) + '</td>' +
						'</tr>';
				}).join("");
			}

			document.getElementById("searchButton").addEventListener("click", render);
			document.getElementById("clearSearchButton").addEventListener("click", function () {
				careUserNameEl.value = "";
				visitDateEl.value = "";
				staffNameEl.value = "";
				render();
			});

			render();
		});
	</script>

</body>

</html>
