<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ一覧</title>

	<link rel="stylesheet" href="./css/style.css">
</head>

<body class="staff-list-page care-user-list-page hidamari-staff-list-page">

	<header class="site-header">

		<div class="header-inner">

			<div class="header-title-area">
				<p class="system-subtitle">ひだまり支援センター</p>
				<h1 class="system-title">事務作業管理システム</h1>
			</div>

			<div class="header-user-area">
				<p class="login-user">
					ようこそ、
					<span class="user-name" id="userName">ゲスト</span>
					さん
				</p>

				<form class="logout-form" onsubmit="return false;">
					<button type="submit" class="logout-button" onclick="TeamG.logout()">
						ログアウト
					</button>
				</form>
			</div>

		</div>

	</header>

	<main class="care-user-list-container compact-care-user-list-container compact-staff-list-container hidamari-staff-list-container">

		<section class="compact-page-top">

			<div class="page-heading compact-page-heading">
				<h2 class="page-title">スタッフ一覧</h2>
				<p class="page-description">
					管理者・事務員とヘルパーをタブで分けて確認できます。
				</p>
			</div>

			<div class="page-action-area compact-page-action-area">
				<a href="./admin_dashboard.html" class="secondary-button">
					管理者ダッシュボードへ戻る
				</a>
			</div>

		</section>

		<section class="search-section compact-search-section hidamari-staff-search-section" id="searchArea">

			<h3 class="section-title compact-table-header">検索条件</h3>

			<form class="search-form compact-search-form" id="staffSearchForm" onsubmit="return false;">

				<div class="compact-search-grid hidamari-staff-search-grid">

					<div class="compact-form-group hidamari-staff-form-group">
						<label for="staffName" class="compact-form-label hidamari-staff-form-label">
							スタッフ名
						</label>
						<input type="text"
							id="staffName"
							name="staffName"
							class="compact-form-input hidamari-staff-form-input"
							placeholder="スタッフ名を入力">
					</div>

					<div class="compact-form-group hidamari-staff-form-group">
						<label for="isActive" class="compact-form-label hidamari-staff-form-label">
							状態
						</label>
						<select id="isActive"
							name="isActive"
							class="compact-form-input hidamari-staff-form-input">
							<option value="">すべて</option>
							<option value="true">在籍中</option>
							<option value="false">退職</option>
						</select>
					</div>

				</div>

				<div class="button-area compact-search-button-area">

					<button type="submit" class="primary-button" id="searchButton">
						検索
					</button>

					<button type="button" class="secondary-button" id="clearSearchButton">
						クリア
					</button>

				</div>

			</form>

		</section>

		<section class="search-section compact-search-section compact-staff-tab-section hidamari-staff-tab-section">

			<div class="compact-table-header hidamari-staff-tab-header">

				<div class="list-title-action">
					<h3 class="section-title">表示切り替え</h3>
				</div>

			</div>

			<div class="tab-button-area staff-tab-action-area hidamari-staff-tab-action-area">

				<button type="button"
					class="tab-button hidamari-staff-tab-button active-tab"
					id="helperTabBtn">
					ヘルパー
				</button>

				<button type="button"
					class="tab-button hidamari-staff-tab-button"
					id="adminTabBtn">
					管理者・事務員
				</button>

				<a href="./staff_register.html" class="primary-button staff-register-tab-button">
					新規スタッフ登録
				</a>

			</div>

		</section>

		<section class="care-user-table-section compact-care-user-table-section compact-staff-table-section hidamari-staff-table-section"
			id="helperSection">

			<div class="compact-table-header hidamari-staff-table-header">

				<div class="hidamari-staff-title-left">
					<h3 class="section-title">ヘルパー一覧</h3>
				</div>

				<p class="list-count">
					表示件数：
					<span id="helperTotalCount">0</span>
					件
				</p>

			</div>

			<div class="table-area compact-table-area hidamari-staff-table-area" id="helperTableArea">
			</div>

			<p class="empty-message" id="helperEmpty" style="display:none;">
				条件に一致するヘルパーは見つかりませんでした。
			</p>

			<div class="pagination-area" id="helperPagination">
			</div>

		</section>

		<section class="care-user-table-section compact-care-user-table-section compact-staff-table-section hidamari-staff-table-section"
			id="adminSection" style="display:none;">

			<div class="compact-table-header hidamari-staff-table-header">

				<div class="hidamari-staff-title-left">
					<h3 class="section-title">管理者・事務員一覧</h3>
				</div>

				<p class="list-count">
					表示件数：
					<span id="adminTotalCount">0</span>
					件
				</p>

			</div>

			<div class="table-area compact-table-area hidamari-staff-table-area" id="adminTableArea">
			</div>

			<p class="empty-message" id="adminEmpty" style="display:none;">
				条件に一致する管理者・事務員は見つかりませんでした。
			</p>

			<div class="pagination-area" id="adminPagination">
			</div>

		</section>

	</main>

	<footer class="footer">
		<small>© 2026 TeamG ひだまり支援センター</small>
	</footer>

	<script src="./js/db.js"></script>
	<script>
		TeamG.init().then(function () {
			const sess = TeamG.requireLogin();
			if (!sess) return;
			if (!TeamG.requireRole(sess, [1])) return;
			document.getElementById("userName").textContent = sess.loginUserName || "ゲスト";

			const nameInput = document.getElementById("staffName");
			const activeSelect = document.getElementById("isActive");
			let activeTab = "helper";

			function activeBool() {
				const v = activeSelect.value;
				if (v === "true") return true;
				if (v === "false") return false;
				return null;
			}

			function buildTable(list, areaId, emptyId, countId, paginationId) {
				const area = document.getElementById(areaId);
				const empty = document.getElementById(emptyId);
				const paginationArea = document.getElementById(paginationId);
				document.getElementById(countId).textContent = list.length;

				if (!list.length) {
					area.innerHTML = "";
					empty.style.display = "";
					paginationArea.innerHTML = "";
					return;
				}
				empty.style.display = "none";

				let rows = "";
				list.forEach(function (s) {
					const statusClass = s.isActive ? " status-active" : " status-ended";
					const statusText = s.isActive ? "在籍中" : "退職";
					rows +=
						"<tr>" +
						'<td class="staff-col-action"><a href="./staff_detail.html?staffId=' + s.staffId + '" class="hidamari-detail-button">詳細</a></td>' +
						'<td class="staff-col-id">' + s.staffId + "</td>" +
						'<td class="staff-col-name">' + TeamG.esc(s.staffName) + "</td>" +
						'<td class="staff-col-status"><span class="status-pill' + statusClass + '">' + statusText + "</span></td>" +
						"</tr>";
				});

				const tableId = areaId + "Table";
				area.innerHTML =
					'<table class="hidamari-staff-table" id="' + tableId + '">' +
					"<colgroup>" +
					'<col class="staff-col-action">' +
					'<col class="staff-col-id">' +
					'<col class="staff-col-name">' +
					'<col class="staff-col-status">' +
					"</colgroup>" +
					"<thead><tr>" +
					'<th class="staff-col-action">操作</th>' +
					'<th class="staff-col-id">スタッフID</th>' +
					'<th class="staff-col-name">氏名</th>' +
					'<th class="staff-col-status">状態</th>' +
					"</tr></thead><tbody>" + rows + "</tbody></table>";

				buildPagination(document.getElementById(tableId), paginationArea);
			}

			function buildPagination(table, paginationArea) {
				paginationArea.innerHTML = "";
				if (!table) return;
				const tableRows = Array.from(table.querySelectorAll("tbody tr"));
				const rowsPerPage = 6;
				const totalPages = Math.ceil(tableRows.length / rowsPerPage);
				let currentPage = 1;

				function showPage(pageNumber) {
					currentPage = pageNumber;
					const startIndex = (currentPage - 1) * rowsPerPage;
					const endIndex = startIndex + rowsPerPage;
					tableRows.forEach(function (row, index) {
						row.style.display = (index >= startIndex && index < endIndex) ? "" : "none";
					});
					createButtons();
				}

				function createButtons() {
					paginationArea.innerHTML = "";
					if (totalPages <= 1) return;

					const prev = document.createElement("button");
					prev.type = "button";
					prev.className = "pagination-button";
					prev.textContent = "前へ";
					prev.disabled = currentPage === 1;
					if (currentPage === 1) prev.classList.add("disabled");
					prev.addEventListener("click", function () { if (currentPage > 1) showPage(currentPage - 1); });
					paginationArea.appendChild(prev);

					for (let i = 1; i <= totalPages; i++) {
						const b = document.createElement("button");
						b.type = "button";
						b.className = "pagination-button page-number-button pagination-number-button";
						b.textContent = i;
						if (i === currentPage) b.classList.add("active");
						b.addEventListener("click", function () { showPage(i); });
						paginationArea.appendChild(b);
					}

					const next = document.createElement("button");
					next.type = "button";
					next.className = "pagination-button";
					next.textContent = "次へ";
					next.disabled = currentPage === totalPages;
					if (currentPage === totalPages) next.classList.add("disabled");
					next.addEventListener("click", function () { if (currentPage < totalPages) showPage(currentPage + 1); });
					paginationArea.appendChild(next);
				}

				showPage(1);
			}

			function render() {
				const kw = nameInput.value.trim() || null;
				const isActive = activeBool();
				buildTable(TeamG.searchStaff(kw, 2, isActive), "helperTableArea", "helperEmpty", "helperTotalCount", "helperPagination");
				buildTable(TeamG.searchStaff(kw, 1, isActive), "adminTableArea", "adminEmpty", "adminTotalCount", "adminPagination");
			}

			function switchTab(tab) {
				activeTab = tab;
				const isHelper = tab === "helper";
				document.getElementById("helperSection").style.display = isHelper ? "" : "none";
				document.getElementById("adminSection").style.display = isHelper ? "none" : "";
				document.getElementById("helperTabBtn").classList.toggle("active-tab", isHelper);
				document.getElementById("adminTabBtn").classList.toggle("active-tab", !isHelper);
			}

			document.getElementById("helperTabBtn").addEventListener("click", function () { switchTab("helper"); });
			document.getElementById("adminTabBtn").addEventListener("click", function () { switchTab("admin"); });
			document.getElementById("searchButton").addEventListener("click", render);
			document.getElementById("clearSearchButton").addEventListener("click", function () {
				nameInput.value = "";
				activeSelect.value = "";
				switchTab("helper");
				render();
			});

			render();
		});
	</script>

</body>

</html>
