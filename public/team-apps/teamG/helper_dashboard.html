<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ヘルパーダッシュボード</title>

	<link rel="stylesheet" href="./css/style.css">
</head>

<body class="helper-dashboard-page admin-dashboard-page hidamari-admin-dashboard-page">

	<header class="site-header">

		<div class="header-inner">

			<div class="header-title-area">
				<p class="system-subtitle">ひだまり支援センター</p>
				<h1 class="system-title">事務作業管理システム</h1>
			</div>

			<div class="header-user-area">

				<p class="login-user">
					ようこそ、
					<span class="user-name" id="userName">
						ヘルパー
					</span>
					さん
				</p>

				<form class="logout-form" onsubmit="return false;">
					<button type="submit" class="logout-button" onclick="TeamG.logout()">
						ログアウト
					</button>
				</form>

			</div>

		</div>

	</header>

	<main class="dashboard-container compact-admin-dashboard-container compact-helper-dashboard-container hidamari-admin-dashboard-container">

		<section class="compact-page-top">

			<div class="page-heading compact-page-heading">
				<h2 class="page-title">ヘルパーダッシュボード</h2>
				<p class="page-description">
					全報告の登録・確認、申し送り、家族からの連絡事項を確認できます。
				</p>
			</div>

		</section>

		<section class="menu-section compact-dashboard-menu-section hidamari-dashboard-menu-section">

			<h3 class="section-title compact-table-header">メニュー</h3>

			<nav class="dashboard-menu" aria-label="ヘルパーメニュー">

				<ul class="menu-list compact-menu-list">

					<li class="menu-item">
						<a href="./report_register.html" class="menu-link">
							全報告を登録する
						</a>
					</li>

					<li class="menu-item">
						<a href="./visitreport_list.html" class="menu-link">
							訪問記録を見る
						</a>
					</li>

					<li class="menu-item">
						<a href="./handover_list.html" class="menu-link">
							申し送りを見る
						</a>
					</li>

					<li class="menu-item">
						<a href="./familycontact_list.html" class="menu-link">
							家族連絡を見る
						</a>
					</li>

					<li class="menu-item">
						<a href="./familyreport_list.html" class="menu-link">
							家族報告一覧を見る
						</a>
					</li>

				</ul>

			</nav>

		</section>

		<section class="dashboard-notice-section compact-dashboard-notice-section hidamari-dashboard-notice-section">

			<h3 class="section-title compact-table-header">確認事項</h3>

			<div class="dashboard-tab-button-area hidamari-dashboard-tab-button-area">

				<button type="button"
					class="dashboard-tab-button hidamari-dashboard-tab-button rejected-report-tab active"
					data-tab-target="rejectedReportPanel">

					<span class="dashboard-tab-label">
						差し戻された家族報告書
					</span>

					<span class="tab-notice-bubble rejected-report-bubble" id="rejectedBubble" style="display:none;">
						現在、差し戻された家族報告書が
						<span id="rejectedBubbleCount">0</span>
						件あります
					</span>

				</button>

				<button type="button"
					class="dashboard-tab-button hidamari-dashboard-tab-button family-contact-tab"
					data-tab-target="familyContactPanel">

					<span class="dashboard-tab-label">
						家族からの連絡事項
					</span>

					<span class="tab-notice-bubble family-contact-bubble" id="familyContactBubble" style="display:none;">
						現在、未確認の家族連絡事項が
						<span id="familyContactBubbleCount">0</span>
						件来ています
					</span>

				</button>

			</div>

			<div id="rejectedReportPanel"
				class="dashboard-tab-panel active"
				data-page-size="6">

				<section class="staff-table-section compact-staff-table-section hidamari-dashboard-table-section">

					<div class="compact-table-header hidamari-dashboard-table-header">
						<div class="hidamari-dashboard-title-left">
							<h3 class="section-title">差し戻された家族報告書</h3>

							<a href="./familyreport_list.html" class="section-link">
								家族報告一覧へ
							</a>
						</div>

						<p class="list-count">
							表示件数：
							<span id="rejectedCount">
								0
							</span>
							件
						</p>
					</div>

					<div class="table-area compact-table-area hidamari-dashboard-table-area" id="rejectedTableArea">
					</div>

					<p class="empty-message" id="rejectedEmpty" style="display:none;">
						現在、差し戻された家族報告書はありません。
					</p>

					<div class="pagination-area dashboard-pagination-area">
					</div>

				</section>

			</div>

			<div id="familyContactPanel"
				class="dashboard-tab-panel"
				data-page-size="6">

				<section class="staff-table-section compact-staff-table-section hidamari-dashboard-table-section">

					<div class="compact-table-header hidamari-dashboard-table-header">
						<div class="hidamari-dashboard-title-left">
							<h3 class="section-title">家族からの連絡事項</h3>

							<a href="./familycontact_list.html" class="section-link">
								すべて見る
							</a>
						</div>

						<p class="list-count">
							表示件数：
							<span id="contactCount">
								0
							</span>
							件
						</p>
					</div>

					<div class="table-area compact-table-area hidamari-dashboard-table-area" id="contactTableArea">
					</div>

					<p class="empty-message" id="contactEmpty" style="display:none;">
						現在、確認が必要な家族連絡はありません。
					</p>

					<div class="pagination-area dashboard-pagination-area">
					</div>

				</section>

			</div>

		</section>

	</main>

	<footer class="footer">
		<small>© 2026 TeamG ひだまり支援センター</small>
	</footer>

	<script src="./js/db.js"></script>
	<script>
		TeamG.init().then(function () {
			const sess = TeamG.requireLogin();
			if (!sess) return;
			if (!TeamG.requireRole(sess, [2])) return;

			document.getElementById("userName").textContent = sess.loginUserName || "ヘルパー";

			function importancePill(s) {
				if (s === "high") return '<span class="status-pill status-high">高</span>';
				if (s === "normal" || s === "middle") return '<span class="status-pill status-normal">中</span>';
				if (s === "low") return '<span class="status-pill status-low">低</span>';
				return '<span class="status-pill">未設定</span>';
			}
			function confirmPill(b) {
				if (b === false) return '<span class="status-pill status-waiting">未確認</span>';
				if (b === true) return '<span class="status-pill status-active">確認済み</span>';
				return '<span class="status-pill">未設定</span>';
			}

			// 差し戻された家族報告書
			const rejectedList = TeamG.rejectedFamilyReportsForHelper(sess.staffId);
			const rejectedCount = rejectedList.length;
			document.getElementById("rejectedCount").textContent = rejectedCount;
			if (rejectedCount > 0) {
				document.getElementById("rejectedBubble").style.display = "";
				document.getElementById("rejectedBubbleCount").textContent = rejectedCount;
			}
			if (rejectedCount > 0) {
				let html = '<table class="hidamari-dashboard-table helper-dashboard-table rejected-family-report-dashboard-table">'
					+ '<colgroup>'
					+ '<col class="rejected-col-detail">'
					+ '<col class="rejected-col-action">'
					+ '<col class="rejected-col-date">'
					+ '<col class="rejected-col-user">'
					+ '</colgroup>'
					+ '<thead><tr>'
					+ '<th>詳細</th><th>操作</th><th>訪問日</th><th>利用者</th>'
					+ '</tr></thead><tbody>';
				rejectedList.forEach(function (r) {
					html += '<tr>'
						+ '<td><a href="./familyreport_detail.html?familyReportId=' + encodeURIComponent(r.familyReportId) + '" class="hidamari-detail-button rejected-detail-button">詳細</a></td>'
						+ '<td><a href="./familyreport_edit.html?familyReportId=' + encodeURIComponent(r.familyReportId) + '" class="hidamari-detail-button rejected-edit-button">修正</a></td>'
						+ '<td><span>' + TeamG.esc(TeamG.fmtDate(r.visitDate)) + '</span></td>'
						+ '<td><span>' + TeamG.esc(r.careUserName) + '</span></td>'
						+ '</tr>';
				});
				html += '</tbody></table>';
				document.getElementById("rejectedTableArea").innerHTML = html;
			} else {
				document.getElementById("rejectedEmpty").style.display = "";
			}

			// 家族からの連絡事項
			const contactList = TeamG.unreadFamilyContactsForHelper(sess.staffId);
			const contactCount = contactList.length;
			document.getElementById("contactCount").textContent = contactCount;
			if (contactCount > 0) {
				document.getElementById("familyContactBubble").style.display = "";
				document.getElementById("familyContactBubbleCount").textContent = contactCount;
			}
			if (contactCount > 0) {
				let html = '<table class="hidamari-dashboard-table helper-dashboard-table family-contact-dashboard-table">'
					+ '<colgroup>'
					+ '<col class="family-contact-col-action">'
					+ '<col class="family-contact-col-date">'
					+ '<col class="family-contact-col-user">'
					+ '<col class="family-contact-col-important">'
					+ '<col class="family-contact-col-status">'
					+ '</colgroup>'
					+ '<thead><tr>'
					+ '<th>操作</th><th>受信日時</th><th>利用者</th><th>重要度</th><th>確認状態</th>'
					+ '</tr></thead><tbody>';
				contactList.forEach(function (c) {
					html += '<tr>'
						+ '<td><a href="./familycontact_detail.html?contactId=' + encodeURIComponent(c.contactId) + '" class="hidamari-detail-button family-contact-confirm-button">確認</a></td>'
						+ '<td><span>' + TeamG.esc(TeamG.fmtDateTime(c.sentAt)) + '</span></td>'
						+ '<td><span>' + TeamG.esc(c.careUserName) + '</span></td>'
						+ '<td>' + importancePill(c.importance) + '</td>'
						+ '<td>' + confirmPill(c.confirmStatus) + '</td>'
						+ '</tr>';
				});
				html += '</tbody></table>';
				document.getElementById("contactTableArea").innerHTML = html;
			} else {
				document.getElementById("contactEmpty").style.display = "";
			}

			initDashboardTabs();
		});

		function initDashboardTabs() {

			const tabButtons = document.querySelectorAll(".dashboard-tab-button");
			const panels = document.querySelectorAll(".dashboard-tab-panel");

			tabButtons.forEach(function (button) {

				button.addEventListener("click", function () {

					const targetId = button.dataset.tabTarget;

					tabButtons.forEach(function (tab) {
						tab.classList.remove("active");
					});

					panels.forEach(function (panel) {
						panel.classList.remove("active");
					});

					button.classList.add("active");

					const targetPanel = document.getElementById(targetId);

					if (targetPanel) {
						targetPanel.classList.add("active");
						setupDashboardPagination(targetPanel);
					}

				});

			});

			panels.forEach(function (panel) {
				panel.dataset.currentPage = "1";
				setupDashboardPagination(panel);
			});

			function setupDashboardPagination(panel) {

				const rows = Array.from(panel.querySelectorAll("tbody tr"));
				const pageSize = Number(panel.dataset.pageSize || 6);
				const totalPages = Math.ceil(rows.length / pageSize);
				let currentPage = Number(panel.dataset.currentPage || 1);
				const paginationArea = panel.querySelector(".dashboard-pagination-area");

				if (!paginationArea) {
					return;
				}

				if (rows.length === 0 || totalPages <= 1) {
					paginationArea.style.display = "none";

					rows.forEach(function (row) {
						row.style.display = "";
					});

					return;
				}

				paginationArea.style.display = "flex";

				if (currentPage < 1) {
					currentPage = 1;
				}

				if (currentPage > totalPages) {
					currentPage = totalPages;
				}

				panel.dataset.currentPage = String(currentPage);

				rows.forEach(function (row, index) {

					const start = (currentPage - 1) * pageSize;
					const end = start + pageSize;

					if (index >= start && index < end) {
						row.style.display = "";
					} else {
						row.style.display = "none";
					}

				});

				createPaginationButtons(panel, paginationArea, totalPages, currentPage);
			}

			function createPaginationButtons(panel, paginationArea, totalPages, currentPage) {

				paginationArea.innerHTML = "";

				const prevButton = document.createElement("button");
				prevButton.type = "button";
				prevButton.className = "pagination-button dashboard-page-button";
				prevButton.textContent = "前へ";
				prevButton.disabled = currentPage === 1;

				if (currentPage === 1) {
					prevButton.classList.add("disabled");
				}

				prevButton.addEventListener("click", function () {
					if (currentPage > 1) {
						panel.dataset.currentPage = String(currentPage - 1);
						setupDashboardPagination(panel);
					}
				});

				paginationArea.appendChild(prevButton);

				for (let i = 1; i <= totalPages; i++) {

					const pageButton = document.createElement("button");
					pageButton.type = "button";
					pageButton.className = "pagination-button dashboard-page-button page-number-button pagination-number-button";
					pageButton.textContent = i;

					if (i === currentPage) {
						pageButton.classList.add("active");
					}

					pageButton.addEventListener("click", function () {
						panel.dataset.currentPage = String(i);
						setupDashboardPagination(panel);
					});

					paginationArea.appendChild(pageButton);

				}

				const nextButton = document.createElement("button");
				nextButton.type = "button";
				nextButton.className = "pagination-button dashboard-page-button";
				nextButton.textContent = "次へ";
				nextButton.disabled = currentPage === totalPages;

				if (currentPage === totalPages) {
					nextButton.classList.add("disabled");
				}

				nextButton.addEventListener("click", function () {
					if (currentPage < totalPages) {
						panel.dataset.currentPage = String(currentPage + 1);
						setupDashboardPagination(panel);
					}
				});

				paginationArea.appendChild(nextButton);
			}

		}
	</script>

</body>

</html>
