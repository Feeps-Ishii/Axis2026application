<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>未承認報告一覧</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body class="staff-list-page care-user-list-page unapproved-list-page hidamari-unapproved-list-page">

	<header class="site-header">
		<div class="header-inner">

			<div class="header-title-area">
				<p class="system-subtitle">ひだまり支援センター</p>
				<h1 class="system-title">事務作業管理システム</h1>
			</div>

			<div class="header-user-area">
				<p class="login-user">
					ようこそ、
					<span class="user-name" id="userName">ゲスト</span>
					さん
				</p>

				<form class="logout-form" onsubmit="return false;">
					<button type="submit" class="logout-button" onclick="TeamG.logout()">
						ログアウト
					</button>
				</form>
			</div>

		</div>
	</header>

	<main class="care-user-list-container compact-care-user-list-container compact-staff-list-container hidamari-unapproved-list-container">

		<section class="compact-page-top">

			<div class="compact-page-heading">
				<h2 class="page-title">未承認報告一覧</h2>
				<p class="page-description">
					ヘルパーが登録した家族報告のうち、まだ承認されていない報告を確認できます。
				</p>
			</div>

			<div class="compact-page-action-area">
				<a href="./admin_dashboard.html" class="secondary-button">
					管理者ダッシュボードへ戻る
				</a>
			</div>

		</section>

		<section class="search-section compact-search-section hidamari-unapproved-search-section" id="searchArea">

			<h3 class="section-title compact-table-header">検索条件</h3>

			<form method="get" class="search-form" id="visitReportSearchForm" onsubmit="return false;">

				<div class="compact-search-grid hidamari-unapproved-search-grid">

					<div class="compact-form-group hidamari-unapproved-form-group">
						<label for="careUserName" class="compact-form-label hidamari-unapproved-form-label">
							利用者名
						</label>
						<input type="text"
							id="careUserName"
							name="careUserName"
							class="compact-form-input hidamari-unapproved-form-input"
							placeholder="例：山田 太郎">
					</div>

					<div class="compact-form-group hidamari-unapproved-form-group">
						<label for="visitDate" class="compact-form-label hidamari-unapproved-form-label">
							訪問日
						</label>
						<input type="date"
							id="visitDate"
							name="visitDate"
							class="compact-form-input hidamari-unapproved-form-input">
					</div>

				</div>

				<div class="button-area compact-button-area">
					<button type="submit" class="primary-button" id="searchButton">
						検索
					</button>

					<button type="button" class="secondary-button" id="clearSearchButton">
						クリア
					</button>
				</div>

			</form>

		</section>

		<section class="care-user-table-section compact-care-user-table-section compact-staff-table-section hidamari-unapproved-table-section">

			<div class="section-heading-row compact-section-heading-row hidamari-unapproved-table-header">
				<h3 class="section-title compact-table-header">未承認報告一覧</h3>
				<p class="list-count" id="listCount">0件</p>
			</div>

			<div class="table-area compact-table-area hidamari-unapproved-table-area">

				<table class="hidamari-unapproved-table">

					<colgroup>
						<col class="unapproved-col-action">
						<col class="unapproved-col-date">
						<col class="unapproved-col-user">
						<col class="unapproved-col-next">
					</colgroup>

					<thead>
						<tr>
							<th class="unapproved-col-action">操作</th>
							<th class="unapproved-col-date">訪問日</th>
							<th class="unapproved-col-user">利用者</th>
							<th class="unapproved-col-next">次回訪問日時</th>
						</tr>
					</thead>

					<tbody id="reportTableBody">
					</tbody>

				</table>

			</div>

		</section>

	</main>

	<footer class="footer">
		<small>© 2026 TeamG ひだまり支援センター</small>
	</footer>

	<script src="./js/db.js"></script>
	<script>
		TeamG.init().then(function () {
			const sess = TeamG.requireLogin();
			if (!sess) return;
			if (!TeamG.requireRole(sess, [1])) return;

			document.getElementById("userName").textContent = sess.loginUserName || "ゲスト";

			const q = new URLSearchParams(location.search);
			const careUserNameEl = document.getElementById("careUserName");
			const visitDateEl = document.getElementById("visitDate");
			careUserNameEl.value = q.get("careUserName") || "";
			visitDateEl.value = q.get("visitDate") || "";
			const serviceContent = q.get("serviceContent") || null;

			function render() {
				const rows = TeamG.unapprovalReportList(
					careUserNameEl.value.trim() || null,
					visitDateEl.value.trim() || null,
					serviceContent
				);
				document.getElementById("listCount").textContent = rows.length + "件";
				const tbody = document.getElementById("reportTableBody");
				if (!rows.length) {
					tbody.innerHTML = '<tr><td colspan="4" class="empty-message">現在、未承認の家族報告はありません。</td></tr>';
					return;
				}
				tbody.innerHTML = rows.map(function (report) {
					return '<tr>' +
						'<td class="unapproved-col-action"><a href="./approval.html?familyReportId=' + encodeURIComponent(report.familyReportId) + '" class="hidamari-detail-button">確認</a></td>' +
						'<td class="unapproved-col-date">' + TeamG.esc(report.visitDate ? TeamG.fmtDate(report.visitDate) : "") + '</td>' +
						'<td class="unapproved-col-user">' + TeamG.esc(report.careUserName) + '</td>' +
						'<td class="unapproved-col-next">' + TeamG.esc(report.nextVisitDate ? TeamG.fmtDateTime(report.nextVisitDate) : "未定") + '</td>' +
						'</tr>';
				}).join("");
			}

			document.getElementById("searchButton").addEventListener("click", render);
			document.getElementById("clearSearchButton").addEventListener("click", function () {
				careUserNameEl.value = "";
				visitDateEl.value = "";
				render();
			});

			render();
		});
	</script>

</body>

</html>
