<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>家族連絡事項一覧</title>

	<link rel="stylesheet" href="./css/style.css">
</head>

<body class="family-contact-list-page staff-list-page care-user-list-page">

	<header class="site-header">

		<div class="header-inner">

			<div class="header-title-area">
				<p class="system-subtitle">ひだまり支援センター</p>
				<h1 class="system-title">事務作業管理システム</h1>
			</div>

			<div class="header-user-area">
				<p class="login-user">
					ようこそ、
					<span class="user-name" id="userName">ログインユーザー</span>
					さん
				</p>

				<form class="logout-form" onsubmit="return false;">
					<button type="submit" class="logout-button" onclick="TeamG.logout()">
						ログアウト
					</button>
				</form>
			</div>

		</div>

	</header>

	<main class="care-user-list-container compact-care-user-list-container compact-staff-list-container">

		<section class="compact-page-top">

			<div class="compact-page-heading">
				<h2 class="page-title">家族連絡事項一覧</h2>

				<p class="page-description" id="pageDescription">
					家族・利用者からの連絡事項を確認できます。
				</p>
			</div>

			<div class="compact-page-action-area" id="backActionArea">
			</div>

		</section>

		<section class="message-section" id="messageSection" style="display:none;">
			<p class="error-message" id="errorMessage">
				家族連絡事項の取得に失敗しました。
			</p>
		</section>

		<section class="care-user-table-section compact-care-user-table-section compact-staff-table-section family-contact-table-section">

			<div class="compact-table-header">
				<h3 class="section-title">家族連絡事項一覧</h3>
			</div>

			<table class="data-table compact-data-table"
				   id="familyContactTable" style="display:none;">

				<thead>
					<tr>
						<th>受信日時</th>
						<th>利用者</th>
						<th>カテゴリ</th>
						<th>重要度</th>
						<th>確認状況</th>
						<th>操作</th>
					</tr>
				</thead>

				<tbody id="familyContactTableBody">
				</tbody>

			</table>

			<div class="pagination-area"
				 id="familyContactPagination" style="display:none;">

				<button type="button"
						class="pagination-button pagination-move-button"
						id="prevPageButton">
					前へ
				</button>

				<div class="pagination-number-area" id="paginationNumberArea">
				</div>

				<button type="button"
						class="pagination-button pagination-move-button"
						id="nextPageButton">
					次へ
				</button>

			</div>

			<p class="empty-message" id="emptyMessage" style="display:none;">
				現在、表示できる家族連絡事項はありません。
			</p>

		</section>

	</main>

	<footer class="footer">
		<small>© 2026 TeamG ひだまり支援センター</small>
	</footer>

	<script src="./js/db.js"></script>
	<script>
		TeamG.init().then(function () {
			const sess = TeamG.requireLogin();
			if (!sess) return;
			if (!TeamG.requireRole(sess, [1, 2])) return;

			document.getElementById("userName").textContent = sess.loginUserName || "ログインユーザー";

			// ページ説明（ロール別）
			const desc = document.getElementById("pageDescription");
			if (sess.roleType === 1) {
				desc.textContent = "管理者宛に届いた家族・利用者からの連絡事項を確認できます。";
			} else if (sess.roleType === 2) {
				desc.textContent = "ログイン中のヘルパー宛に届いた家族・利用者からの連絡事項を確認できます。";
			} else {
				desc.textContent = "家族・利用者からの連絡事項を確認できます。";
			}

			// ダッシュボードへ戻る（roleType 1,2 のみ表示）
			const backArea = document.getElementById("backActionArea");
			if (sess.roleType === 1 || sess.roleType === 2) {
				const a = document.createElement("a");
				a.href = TeamG.homeUrl(sess.roleType);
				a.className = "secondary-button compact-secondary-button";
				a.textContent = "ダッシュボードへ戻る";
				backArea.appendChild(a);
			}

			function categoryLabel(c) {
				switch (c) {
					case "family": return "家族連絡";
					case "consultation": return "相談";
					case "request": return "依頼";
					case "other": return "その他";
					default: return (c != null && c !== "") ? TeamG.esc(c) : "-";
				}
			}

			function importanceCell(s) {
				switch (s) {
					case "high": return '<span class="importance-label high">高</span>';
					case "normal": return '<span class="importance-label normal">中</span>';
					case "middle": return '<span class="importance-label normal">中</span>';
					case "low": return '<span class="importance-label low">低</span>';
					default: return '<span class="importance-label none">未設定</span>';
				}
			}

			function confirmCell(s) {
				// 文字列 'unconfirmed'/'confirmed' / Boolean 両対応（元テンプレ準拠）
				if (s === "confirmed" || s === true) {
					return '<span class="status-label approved">確認済</span>';
				}
				return '<span class="status-label pending">未確認</span>';
			}

			const list = TeamG.familyContactsForHelper(sess.staffId);

			const table = document.getElementById("familyContactTable");
			const pagination = document.getElementById("familyContactPagination");
			const emptyMsg = document.getElementById("emptyMessage");

			if (!list || list.length === 0) {
				emptyMsg.style.display = "";
			} else {
				const tbody = document.getElementById("familyContactTableBody");
				tbody.innerHTML = list.map(function (c) {
					return '<tr class="pagination-row">' +
						'<td>' + (c.sentAt ? TeamG.esc(TeamG.fmtDateTime(c.sentAt)) : "-") + '</td>' +
						'<td>' + ((c.careUserName != null && c.careUserName !== "") ? TeamG.esc(c.careUserName) : "-") + '</td>' +
						'<td>' + categoryLabel(c.contactCategory) + '</td>' +
						'<td>' + importanceCell(c.importance) + '</td>' +
						'<td>' + confirmCell(c.confirmStatus) + '</td>' +
						'<td><a href="./familycontact_detail.html?contactId=' + encodeURIComponent(c.contactId) + '" class="table-action-link compact-table-action-link">詳細</a></td>' +
						'</tr>';
				}).join("");
				table.style.display = "";
				pagination.style.display = "";
				setupPagination();
			}
		});

		function setupPagination() {
			const rows = Array.from(document.querySelectorAll(".pagination-row"));
			const prevButton = document.getElementById("prevPageButton");
			const nextButton = document.getElementById("nextPageButton");
			const numberArea = document.getElementById("paginationNumberArea");
			const paginationArea = document.getElementById("familyContactPagination");

			const rowsPerPage = 6;
			let currentPage = 1;
			const totalPages = Math.ceil(rows.length / rowsPerPage);

			if (rows.length === 0 || totalPages <= 1) {
				if (paginationArea) {
					paginationArea.style.display = "none";
				}
			}

			function showPage(page) {
				currentPage = page;

				const startIndex = (currentPage - 1) * rowsPerPage;
				const endIndex = startIndex + rowsPerPage;

				rows.forEach(function (row, index) {
					if (index >= startIndex && index < endIndex) {
						row.style.display = "";
					} else {
						row.style.display = "none";
					}
				});

				renderPageButtons();

				prevButton.disabled = currentPage === 1;
				nextButton.disabled = currentPage === totalPages;
			}

			function renderPageButtons() {
				numberArea.innerHTML = "";

				for (let i = 1; i <= totalPages; i++) {
					const button = document.createElement("button");
					button.type = "button";
					button.textContent = i;
					button.className = "pagination-button pagination-number-button";

					if (i === currentPage) {
						button.classList.add("active");
					}

					button.addEventListener("click", function () {
						showPage(i);
					});

					numberArea.appendChild(button);
				}
			}

			prevButton.addEventListener("click", function () {
				if (currentPage > 1) {
					showPage(currentPage - 1);
				}
			});

			nextButton.addEventListener("click", function () {
				if (currentPage < totalPages) {
					showPage(currentPage + 1);
				}
			});

			showPage(1);
		}
	</script>

</body>

</html>
