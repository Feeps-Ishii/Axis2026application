<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>在庫管理アプリ（サンプル）</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>在庫管理アプリ <span class="badge">サンプル</span></h1>
      <p class="hint">
        これは共通モックストアの配線サンプルです。データは JSON として
        localStorage に保存され、ブラウザを閉じても残ります。
      </p>

      <form id="add-form" class="add-form">
        <input id="name" type="text" placeholder="商品名" required />
        <input id="stock" type="number" placeholder="在庫数" min="0" value="0" required />
        <button type="submit">追加</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>商品名</th>
            <th class="num">在庫</th>
            <th class="actions">操作</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>

      <button id="reset" class="reset">サンプルデータをリセット</button>
    </div>

    <!-- 共通モックストアを読み込む -->
    <script src="/mock/store.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
