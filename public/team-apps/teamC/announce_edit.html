<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>お知らせ変更 | 進学ゼミナール松風</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>

	<div id="appHeader"></div>

	<div class="container" style="max-width:760px;">

		<a href="./admin_dashboard.html" class="btn btn-back">◀ ポータルに戻る</a>

		<div class="card">

			<div class="card-header">
				<span class="card-title">&#128226; お知らせ変更（入力）</span>
			</div>

			<form id="noticeForm">

				<div class="form-group">
					<label>タイトル</label>
					<input type="text" id="title" name="title" class="form-control" required>
				</div>

				<div class="form-group">
					<label>お知らせ内容</label>
					<textarea id="content" name="content" class="form-control" rows="5" required></textarea>
				</div>

				<div class="form-group">
					<label>公開対象</label>
					<select id="targetRole" name="targetRole" class="form-control" required>
						<option value="全員">全員</option>
						<option value="生徒">生徒</option>
						<option value="講師">講師</option>
					</select>
				</div>

				<div class="form-group">
					<label>公開開始日</label>
					<input type="date" id="startDate" name="startDate" class="form-control">
				</div>

				<div class="form-group">
					<label>公開終了日</label>
					<input type="date" id="endDate" name="endDate" class="form-control">
					<div id="endDateError" class="error" style="color:red; display:none;"></div>
				</div>

				<div style="margin-top:2rem; display:flex; gap:10px;">
					<button type="submit" class="btn btn-primary" style="flex:1;">確認画面へ進む ➔</button>
					<a href="./admin_dashboard.html" class="btn" style="background:#e2e8f0; color:#475569;">キャンセル</a>
				</div>

			</form>

		</div>

	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamC.init().then(() => {
			const s = TeamC.requireLogin();
			if (!s) return;
			if (!TeamC.isManager(s.user)) { location.href = "./admin_dashboard.html"; return; }

			const params = new URLSearchParams(location.search);
			const noticeId = params.get("noticeId");
			const notice = TeamC.notice(noticeId);
			if (!notice) { location.href = "./admin_dashboard.html"; return; }

			const titleEl = document.getElementById("title");
			const contentEl = document.getElementById("content");
			const roleEl = document.getElementById("targetRole");
			const startEl = document.getElementById("startDate");
			const endEl = document.getElementById("endDate");

			// ?restore=1 なら確認画面から戻った値、なければ元データで初期化
			const restore = params.get("restore") === "1";
			let init = {
				title: notice.title, content: notice.content,
				targetRole: notice.targetRole, startDate: notice.startDate, endDate: notice.endDate,
			};
			if (restore) {
				const p = TeamC.getPending("notice");
				if (p && p.mode === "edit" && String(p.id) === String(noticeId) && p.data) init = p.data;
			}

			titleEl.value = init.title || "";
			contentEl.value = init.content || "";
			roleEl.value = init.targetRole || "全員";
			startEl.value = init.startDate ? String(init.startDate).slice(0, 10) : "";
			endEl.value = init.endDate ? String(init.endDate).slice(0, 10) : "";

			const errEl = document.getElementById("endDateError");

			document.getElementById("noticeForm").addEventListener("submit", function (e) {
				e.preventDefault();
				errEl.style.display = "none";

				const data = {
					title: titleEl.value.trim(),
					content: contentEl.value.trim(),
					targetRole: roleEl.value,
					startDate: startEl.value || null,
					endDate: endEl.value || null,
				};

				if (data.startDate && data.endDate && data.endDate < data.startDate) {
					errEl.textContent = "終了日は開始日以降にしてください";
					errEl.style.display = "block";
					return;
				}

				TeamC.setPending("notice", { mode: "edit", id: notice.noticeId, data });
				location.href = "./announce_edit_confirm.html?noticeId=" + notice.noticeId;
			});
		});
	</script>

</body>

</html>
