<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>宿題変更</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>
	<div id="appHeader"></div>

	<div class="container" style="max-width:700px;">
		<a id="backLink" class="btn btn-back">◀ 宿題管理に戻る</a>
		<div class="card">
			<div class="card-header"><span class="card-title">宿題変更 (入力)</span></div>
			<form id="form">

				<div class="form-group">
					<label>科目</label>
					<select class="form-control" name="subjectId" required>
						<option value="" disabled>選択してください</option>
					</select>
				</div>

				<div class="form-group">
					<label>宿題内容</label>
					<textarea class="form-control" rows="4" name="homeworkContent" required></textarea>
				</div>

				<div class="form-group">
					<label>提出期限</label>
					<div class="form-text-static" id="dueDisplay"></div>
					<input type="date" class="form-control" name="dueDate" required>
				</div>

				<div class="form-group">
					<label>提出確認</label>
					<select class="form-control" name="submissionStatus">
						<option value="未提出">未提出</option>
						<option value="提出済">提出済</option>
					</select>
				</div>

				<div class="form-group">
					<label>点数</label>
					<input type="number" class="form-control" name="score" min="0" max="100">
				</div>

				<div class="form-group">
					<label>コメント</label>
					<textarea class="form-control" rows="3" name="comment"></textarea>
				</div>

				<div style="margin-top:2rem; display:flex; gap:10px;">
					<button type="submit" class="btn btn-primary" style="flex:1;">確認画面へ進む ➔</button>
					<a id="cancelLink" class="btn" style="background:#e2e8f0; color:#475569;">
						キャンセル
					</a>
				</div>
			</form>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamC.init().then(() => {
			const s = TeamC.requireLogin();
			if (!s) return;
			const me = s.user;
			const fmtJpDate = TeamC.fmtJpDate;

			const params = new URLSearchParams(location.search);
			const studentId = Number(params.get("studentId"));
			const homeworkId = Number(params.get("homeworkId"));
			if (!studentId || !homeworkId) { location.href = "./login.html"; return; }

			if (!TeamC.isStaff(me)) {
				location.href = "./student_homework.html?studentId=" + studentId;
				return;
			}

			const hw = TeamC.homework(homeworkId);
			if (!hw) { location.href = "./student_homework.html?studentId=" + studentId; return; }

			const backHref = "./student_homework.html?studentId=" + studentId;
			document.getElementById("backLink").href = backHref;
			document.getElementById("cancelLink").href = backHref;

			const f = document.getElementById("form");

			const sel = f.subjectId;
			TeamC.subjects().forEach(sub => {
				const o = document.createElement("option");
				o.value = sub.subjectId;
				o.textContent = sub.subjectName;
				sel.appendChild(o);
			});

			// 復元元：restore時は pending.patch、無ければ既存レコード
			let src = hw;
			if (params.get("restore") === "1") {
				const pending = TeamC.getPending("homework_edit");
				if (pending && pending.id === homeworkId && pending.patch) src = pending.patch;
			}

			f.subjectId.value = src.subjectId != null ? src.subjectId : "";
			f.homeworkContent.value = src.homeworkContent != null ? src.homeworkContent : "";
			f.dueDate.value = src.dueDate != null ? String(src.dueDate).slice(0, 10) : "";
			f.submissionStatus.value = src.submissionStatus != null ? src.submissionStatus : "未提出";
			f.score.value = (src.score != null && src.score !== "") ? src.score : "";
			f.comment.value = src.comment != null ? src.comment : "";

			document.getElementById("dueDisplay").textContent =
				hw.dueDate ? fmtJpDate(hw.dueDate) : "未設定";

			f.addEventListener("submit", e => {
				e.preventDefault();
				const patch = {
					subjectId: Number(f.subjectId.value),
					homeworkContent: f.homeworkContent.value,
					dueDate: f.dueDate.value,
					submissionStatus: f.submissionStatus.value,
					score: f.score.value === "" ? null : Number(f.score.value),
					comment: f.comment.value,
				};
				TeamC.setPending("homework_edit", { studentId: studentId, id: homeworkId, patch: patch });
				location.href = "./homework_edit_confirm.html";
			});
		});
	</script>

</body>

</html>
