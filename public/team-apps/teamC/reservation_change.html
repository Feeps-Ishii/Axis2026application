<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>予約変更 | 進学ゼミナール松風</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>

	<div id="appHeader"></div>

	<div class="container" style="max-width:760px;">
		<a id="backLink" class="btn btn-back">◀ 週間スケジュールに戻る</a>
		<div class="card">
			<div class="card-header"><span class="card-title">予約変更 (入力)</span></div>

			<p id="errorMessage" class="error-message" style="display:none;"></p>

			<form id="reservationForm">

				<div class="form-group">
					<label>予約登録者区分</label>
					<div class="form-control" style="background:#f8fafc;">
						<span id="loginRoleText"></span>
					</div>
					<input type="hidden" id="reservationRole" name="reservationRole">
				</div>

				<div class="form-group">
					<label for="lessonType">授業形式</label>
					<select id="lessonType" name="lessonType" class="form-control" required>
						<option value="">選択してください</option>
						<option value="個別">個別</option>
						<option value="自習室">自習室</option>
					</select>
				</div>

				<div class="form-group">
					<label for="classroomId">教室</label>
					<select id="classroomId" name="classroomId" class="form-control" required>
						<option value="">授業形式を選択してください</option>
					</select>
				</div>

				<div class="form-group">
					<label for="studentId">生徒</label>
					<select id="studentId" name="studentId" class="form-control" required>
						<option value="">選択してください</option>
					</select>
				</div>

				<div class="form-group">
					<label for="reservationDate">希望日</label>
					<input type="date" id="reservationDate" name="reservationDate" class="form-control" required>
					<p id="dateHelpText" style="font-size:0.85rem; color:#64748b; margin-top:4px;"></p>
				</div>

				<div class="form-group">
					<label for="scheduleSlotId">希望コマ</label>
					<select id="scheduleSlotId" name="scheduleSlotId" class="form-control" required>
						<option value="">授業形式と希望日を選択してください</option>
					</select>
				</div>

				<div class="form-group">
					<label for="teacherId">担当講師</label>
					<select id="teacherId" name="teacherId" class="form-control" required>
						<option value="">コマを選択してください</option>
					</select>
				</div>

				<div class="form-group">
					<label for="subjectId">科目</label>
					<select id="subjectId" name="subjectId" class="form-control" required>
						<option value="">講師を選択してください</option>
					</select>
				</div>

				<div class="form-group">
					<label for="memo">備考</label>
					<textarea id="memo" name="memo" class="form-control"></textarea>
				</div>

				<div style="margin-top:2rem; display:flex; gap:10px;">
					<button type="submit" class="btn btn-primary" style="flex:1;">確認画面へ進む ➔</button>
					<a id="cancelLink" class="btn btn-secondary">キャンセル</a>
				</div>
			</form>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamC.init().then(() => {
			const s = TeamC.requireLogin();
			if (!s) return;
			const me = s.user;

			const loginRole = me.role || "";
			const userLoc = TeamC.userLocation(me);

			const params = new URLSearchParams(window.location.search);
			const reservationId = params.get("reservationId");
			const restore = params.get("restore") === "1";

			const view = reservationId != null ? TeamC.reservationView(reservationId) : null;
			if (!view) {
				alert("指定された予約が存在しません。");
				window.location.href = "./schedule_week.html";
				return;
			}
			const res = view.reservation;

			// 戻り先リンク
			document.getElementById("backLink").href = "./schedule_week.html?date=" + res.reservationDate;
			document.getElementById("cancelLink").href = "./schedule_week.html?date=" + res.reservationDate;

			// 復元データ（確認画面から戻ってきた場合）
			const pending = restore ? (TeamC.getPending("reservation_edit") || {}) : {};
			const ppatch = pending.patch || {};

			const initialLessonType = ppatch.lessonType || res.lessonType || "";
			const initialReservationDate = ppatch.reservationDate || res.reservationDate || "";
			const initialScheduleSlotId = ppatch.scheduleSlotId != null ? ppatch.scheduleSlotId : res.scheduleSlotId;
			const initialClassroomId = ppatch.classroomId != null ? ppatch.classroomId : res.classroomId;
			const initialTeacherId = ppatch.teacherId != null ? ppatch.teacherId : res.teacherId;
			const initialSubjectId = ppatch.subjectId != null ? ppatch.subjectId : res.subjectId;
			const initialStudentId = ppatch.studentId != null ? ppatch.studentId : res.studentId;
			const initialMemo = ppatch.memo != null ? ppatch.memo : (res.memo || "");

			const form = document.getElementById("reservationForm");
			const lessonTypeSelect = document.getElementById("lessonType");
			const reservationDateInput = document.getElementById("reservationDate");
			const scheduleSlotSelect = document.getElementById("scheduleSlotId");
			const classroomSelect = document.getElementById("classroomId");
			const teacherSelect = document.getElementById("teacherId");
			const subjectSelect = document.getElementById("subjectId");
			const studentSelect = document.getElementById("studentId");
			const dateHelpText = document.getElementById("dateHelpText");

			document.getElementById("loginRoleText").textContent = loginRole;
			document.getElementById("reservationRole").value = loginRole;
			reservationDateInput.min = TeamC.today();
			document.getElementById("memo").value = initialMemo;

			// 生徒選択肢
			const isStudentUser = TeamC.isStudent(me);
			(function populateStudents() {
				let students;
				if (isStudentUser) {
					const sid = TeamC.loginStudentId();
					const stu = sid != null ? TeamC.student(sid) : null;
					students = stu ? [stu] : [];
				} else {
					students = TeamC.students();
				}
				studentSelect.innerHTML = '<option value="">選択してください</option>';
				students.forEach((stu) => {
					const opt = document.createElement("option");
					opt.value = stu.studentId;
					opt.textContent = stu.studentName;
					if (initialStudentId != null && String(initialStudentId) === String(stu.studentId)) opt.selected = true;
					studentSelect.appendChild(opt);
				});
				const selectable = Array.from(studentSelect.options).filter((o) => o.value !== "");
				if (selectable.length === 1) studentSelect.value = selectable[0].value;
			})();

			function clearSelect(select, placeholder) {
				select.innerHTML = "";
				const option = document.createElement("option");
				option.value = ""; option.textContent = placeholder;
				select.appendChild(option); select.value = "";
			}
			function addOption(select, value, text, selectedValue) {
				const option = document.createElement("option");
				option.value = value; option.textContent = text;
				if (selectedValue != null && String(selectedValue) === String(value)) option.selected = true;
				select.appendChild(option);
			}
			function setDisabled(el, disabled) { el.disabled = disabled; }
			function resetClassrooms() { clearSelect(classroomSelect, "授業形式を選択してください"); setDisabled(classroomSelect, true); }
			function resetSlots() { clearSelect(scheduleSlotSelect, "授業形式と希望日を選択してください"); setDisabled(scheduleSlotSelect, true); }
			function resetTeachers() { clearSelect(teacherSelect, "コマを選択してください"); setDisabled(teacherSelect, true); }
			function resetSubjects() { clearSelect(subjectSelect, "講師を選択してください"); setDisabled(subjectSelect, true); }
			function disableTeacherAndSubjectForStudyRoom() {
				clearSelect(teacherSelect, "自習室では講師選択不要");
				clearSelect(subjectSelect, "自習室では科目選択不要");
				setDisabled(teacherSelect, true); setDisabled(subjectSelect, true);
			}

			function loadClassrooms(selectedClassroomId) {
				const lessonType = lessonTypeSelect.value;
				resetClassrooms();
				if (!lessonType) return;
				const classrooms = TeamC.availableClassrooms(lessonType, userLoc);
				clearSelect(classroomSelect, "選択してください");
				classrooms.forEach((c) => addOption(classroomSelect, c.classroomId, c.roomName, selectedClassroomId));
				if (classrooms.length === 0) { clearSelect(classroomSelect, "選択できる教室がありません"); setDisabled(classroomSelect, true); return; }
				setDisabled(classroomSelect, false);
				if ((selectedClassroomId == null || selectedClassroomId === "") && classrooms.length === 1) classroomSelect.value = classrooms[0].classroomId;
			}
			function enableReservationDateByLessonType() {
				const lessonType = lessonTypeSelect.value;
				dateHelpText.textContent = "";
				if (!lessonType) { setDisabled(reservationDateInput, true); dateHelpText.textContent = "授業形式を選択してください。"; return; }
				setDisabled(reservationDateInput, false);
				if (lessonType === "個別") dateHelpText.textContent = "個別は、選択した日に講師シフトがあるコマのみ表示されます。";
				else if (lessonType === "自習室") dateHelpText.textContent = "自習室は講師シフトに関係なく予約日を選択できます。";
			}
			function loadSlots(selectedScheduleSlotId) {
				const lessonType = lessonTypeSelect.value;
				const reservationDate = reservationDateInput.value;
				resetSlots(); resetTeachers(); resetSubjects();
				if (!lessonType || !reservationDate) return 0;
				const slots = TeamC.availableSlots(lessonType, reservationDate, userLoc);
				clearSelect(scheduleSlotSelect, "選択してください");
				slots.forEach((sl) => addOption(scheduleSlotSelect, sl.scheduleSlotId, TeamC.slotLabel(sl), selectedScheduleSlotId));
				if (slots.length === 0) {
					clearSelect(scheduleSlotSelect, lessonType === "個別" ? "この日に講師シフトがあるコマはありません" : "選択できるコマがありません");
					setDisabled(scheduleSlotSelect, true);
				} else { setDisabled(scheduleSlotSelect, false); }
				if (lessonType === "自習室") disableTeacherAndSubjectForStudyRoom();
				return slots.length;
			}
			function loadTeachers(selectedTeacherId) {
				const lessonType = lessonTypeSelect.value;
				const reservationDate = reservationDateInput.value;
				const scheduleSlotId = scheduleSlotSelect.value;
				resetTeachers(); resetSubjects();
				if (lessonType === "自習室") { disableTeacherAndSubjectForStudyRoom(); return; }
				if (!reservationDate || !scheduleSlotId) return;
				const teachers = TeamC.availableTeachers(reservationDate, scheduleSlotId, userLoc);
				clearSelect(teacherSelect, "選択してください");
				teachers.forEach((t) => addOption(teacherSelect, t.teacherId, t.teacherName, selectedTeacherId));
				if (teachers.length === 0) { clearSelect(teacherSelect, "選択できる講師がいません"); setDisabled(teacherSelect, true); }
				else { setDisabled(teacherSelect, false); }
			}
			function loadSubjects(selectedSubjectId) {
				const lessonType = lessonTypeSelect.value;
				const teacherId = teacherSelect.value;
				resetSubjects();
				if (lessonType === "自習室") { disableTeacherAndSubjectForStudyRoom(); return; }
				if (!teacherId) return;
				const subjects = TeamC.availableSubjects(teacherId);
				clearSelect(subjectSelect, "選択してください");
				subjects.forEach((sb) => addOption(subjectSelect, sb.subjectId, sb.subjectName, selectedSubjectId));
				if (subjects.length === 0) { clearSelect(subjectSelect, "この講師の担当科目がありません"); setDisabled(subjectSelect, true); }
				else { setDisabled(subjectSelect, false); }
			}

			lessonTypeSelect.addEventListener("change", function () {
				reservationDateInput.value = "";
				resetSlots(); resetTeachers(); resetSubjects(); resetClassrooms();
				const lessonType = lessonTypeSelect.value;
				if (!lessonType) { setDisabled(reservationDateInput, true); dateHelpText.textContent = "授業形式を選択してください。"; return; }
				loadClassrooms(null);
				enableReservationDateByLessonType();
				if (lessonType === "自習室") disableTeacherAndSubjectForStudyRoom();
			});
			reservationDateInput.addEventListener("change", function () {
				resetSlots(); resetTeachers(); resetSubjects();
				const lessonType = lessonTypeSelect.value;
				if (!lessonType || !reservationDateInput.value) return;
				const slotCount = loadSlots(null);
				if (lessonType === "個別" && slotCount === 0) alert("この日は講師シフトが登録されていないため、個別予約はできません。");
			});
			scheduleSlotSelect.addEventListener("change", function () {
				resetTeachers(); resetSubjects();
				if (lessonTypeSelect.value === "自習室") { disableTeacherAndSubjectForStudyRoom(); return; }
				loadTeachers(null);
			});
			teacherSelect.addEventListener("change", function () { loadSubjects(null); });

			form.addEventListener("submit", function (event) {
				event.preventDefault();
				const lessonType = lessonTypeSelect.value;
				if (!lessonType) { alert("授業形式を選択してください。"); return; }
				if (!classroomSelect.value) { alert("教室を選択してください。"); return; }
				if (!studentSelect.value) { alert("生徒を選択してください。"); return; }
				if (!reservationDateInput.value) { alert("希望日を選択してください。"); return; }
				if (!scheduleSlotSelect.value) { alert("コマを選択してください。"); return; }
				if (lessonType === "個別") {
					if (!teacherSelect.value) { alert("講師を選択してください。"); return; }
					if (!subjectSelect.value) { alert("科目を選択してください。"); return; }
				}
				const patch = {
					studentId: studentSelect.value ? Number(studentSelect.value) : null,
					teacherId: lessonType === "自習室" ? null : (teacherSelect.value ? Number(teacherSelect.value) : null),
					subjectId: lessonType === "自習室" ? null : (subjectSelect.value ? Number(subjectSelect.value) : null),
					classroomId: classroomSelect.value ? Number(classroomSelect.value) : null,
					scheduleSlotId: scheduleSlotSelect.value ? Number(scheduleSlotSelect.value) : null,
					reservationDate: reservationDateInput.value,
					lessonType: lessonType,
					reservationRole: loginRole,
					memo: document.getElementById("memo").value
				};
				if (isStudentUser) {
					const sid = TeamC.loginStudentId();
					if (sid != null) patch.studentId = sid;
				}
				TeamC.setPending("reservation_edit", { id: Number(reservationId), patch: patch });
				window.location.href = "./reservation_change_confirm.html";
			});

			// 初期化＋既存値の復元
			(function init() {
				resetClassrooms(); resetSlots(); resetTeachers(); resetSubjects();
				setDisabled(reservationDateInput, true);
				dateHelpText.textContent = "授業形式を選択してください。";
				if (!initialLessonType) return;
				lessonTypeSelect.value = initialLessonType;
				loadClassrooms(initialClassroomId);
				enableReservationDateByLessonType();
				if (initialReservationDate) {
					reservationDateInput.value = initialReservationDate;
					loadSlots(initialScheduleSlotId);
				}
				if (initialLessonType === "個別") {
					if (initialScheduleSlotId) loadTeachers(initialTeacherId);
					if (initialTeacherId) loadSubjects(initialSubjectId);
				} else if (initialLessonType === "自習室") {
					disableTeacherAndSubjectForStudyRoom();
				}
			})();
		});
	</script>

</body>

</html>
