<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>生徒情報変更完了 | 進学ゼミナール松風</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>

	<div id="appHeader"></div>

	<main class="complete-page">
		<section class="complete-card">
			<div class="complete-icon">✓</div>

			<h1 class="complete-title">
				生徒情報変更完了
			</h1>

			<p class="complete-message">
				入力内容の変更が完了しました。
			</p>

			<div class="complete-actions">

				<a id="carteBtn" href="./students.html" class="btn btn-primary">
					生徒カルテへ戻る
				</a>

				<a href="./admin_dashboard.html" class="btn btn-secondary">
					ポータルへ戻る
				</a>

			</div>
		</section>
	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamC.init().then(() => {
			const s = TeamC.requireLogin();
			if (!s) return;
			const sid = sessionStorage.getItem("teamC:lastEditedStudentId");
			if (sid) {
				document.getElementById("carteBtn").href = "./student_carte.html?studentId=" + sid;
			}
			TeamC.clearPending("student_edit");
		});
	</script>

</body>

</html>
