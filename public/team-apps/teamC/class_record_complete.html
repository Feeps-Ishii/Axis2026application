<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>授業記録追加完了 | 進学ゼミナール松風</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>

	<div id="appHeader"></div>

	<main class="complete-page">
		<section class="complete-card">

			<div class="complete-icon">✓</div>

			<h1 class="complete-title">授業記録追加完了</h1>

			<p class="complete-message">
				入力内容の登録が完了しました。
			</p>

			<div class="complete-actions">
				<a id="toList" class="btn btn-primary">
					授業記録管理へ戻る
				</a>
			</div>

		</section>
	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamC.init().then(() => {
			const s = TeamC.requireLogin();
			if (!s) return;
			const params = new URLSearchParams(location.search);
			const studentId = Number(params.get("studentId"));
			document.getElementById("toList").href =
				"./student_class_records.html?studentId=" + studentId;
		});
	</script>

</body>

</html>
