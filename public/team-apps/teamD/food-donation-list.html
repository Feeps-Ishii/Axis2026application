<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>食材寄付一覧 | まちのこ食卓プロジェクト</title>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/validation.js" defer></script>
</head>

<body>
	<!-- 共通ヘッダー -->
	<div id="appHeader"></div>

	<main class="main-container" style="margin-top: 80px;">
		<p class="screen-id">Food Donation List</p>

		<h2 class="page-title">食材寄付一覧</h2>
		<p class="page-lead"></p>

		<section class="table-toolbar">
			<form class="table-search" id="searchForm" onsubmit="return false;">
				<label for="keyword">キーワード検索</label>
				<div class="search-area">
					<select name="searchType" id="searchType">
						<option value="donorName">寄付者名</option>
						<option value="foodName">食材名</option>
					</select>

					<input id="keyword" type="search" name="keyword" placeholder="キーワードを入力" style="width: 400px;">

					<button type="submit" class="search-button">検索</button>

					<a class="reset-button" href="javascript:void(0);" id="resetBtn">リセット</a>
				</div>
			</form>
		</section>

		<section class="table-card" aria-label="食材寄付一覧">
			<table class="data-table">
				<thead>
					<tr>
						<th>寄付ID</th>
						<th>募集タイトル</th>
						<th>寄付者名</th>
						<th>食材名</th>
						<th>数量</th>
						<th>賞味期限</th>
						<th>受渡方法</th>
						<th>状態</th>
						<th>登録日時</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody id="donationTbody"></tbody>
			</table>
		</section>

		<a class="secondary-button" href="./dashboard.html">ダッシュボードへ戻る</a>
	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		function esc(s) {
			return String(s == null ? "" : s)
				.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
		}
		function fmtDateTime(s) {
			if (!s) return "";
			const d = String(s);
			return d.slice(0, 10).replace(/-/g, "/") + (d.length > 10 ? " " + d.slice(11, 16) : "");
		}
		function fmtSlash(s) {
			return s ? String(s).slice(0, 10).replace(/-/g, "/") : "";
		}

		TeamD.init().then(() => {
			if (!TeamD.requireStaff('food-donation-list.html')) return;

			const tbody = document.getElementById("donationTbody");
			const searchType = document.getElementById("searchType");
			const keyword = document.getElementById("keyword");

			function render(list) {
				if (!list.length) {
					tbody.innerHTML = `<tr><td colspan="10">食材寄付データがありません。</td></tr>`;
					return;
				}
				tbody.innerHTML = list.map((d) => {
					const statusCell = d.status === 2
						? `<button type="button" class="badge status-complete" data-unreceive="${d.donationId}">受取済</button>`
						: `<button type="button" class="badge status-pending" data-receive="${d.donationId}">未受取</button>`;
					return `
						<tr>
							<td>${esc(d.donationId)}</td>
							<td>${esc(d.recruitTitle)}</td>
							<td>${esc(d.donorName)}</td>
							<td>${esc(d.foodName)}</td>
							<td>${esc(String(d.quantity) + (d.unit || ""))}</td>
							<td>${esc(fmtSlash(d.expirationDate))}</td>
							<td>${esc(d.methodName)}</td>
							<td>${statusCell}</td>
							<td>${esc(fmtDateTime(d.createdAt))}</td>
							<td class="action-links">
								<a class="text-link" href="./food-donation-edit.html?id=${d.donationId}">編集</a>
								<button type="button" class="text-link delete-link" data-delete="${d.donationId}">削除</button>
							</td>
						</tr>`;
				}).join("");
			}

			function doSearch() {
				render(TeamD.donationList(searchType.value, keyword.value));
			}

			document.getElementById("searchForm").addEventListener("submit", (e) => {
				e.preventDefault();
				doSearch();
			});

			document.getElementById("resetBtn").addEventListener("click", () => {
				searchType.value = "donorName";
				keyword.value = "";
				render(TeamD.donationList("", ""));
			});

			tbody.addEventListener("click", (e) => {
				const recv = e.target.closest("[data-receive]");
				const unrecv = e.target.closest("[data-unreceive]");
				const del = e.target.closest("[data-delete]");
				if (recv) {
					TeamD.markReceived(Number(recv.getAttribute("data-receive")));
					doSearch();
				} else if (unrecv) {
					TeamD.markUnreceived(Number(unrecv.getAttribute("data-unreceive")));
					doSearch();
				} else if (del) {
					if (!confirm("この食材寄付情報を削除しますか？")) return;
					TeamD.deleteDonation(Number(del.getAttribute("data-delete")));
					doSearch();
				}
			});

			// 初期表示：全件
			render(TeamD.donationList("", ""));
		});
	</script>
</body>

</html>
