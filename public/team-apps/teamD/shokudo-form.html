<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>食堂登録画面 | まちのこ食卓プロジェクト</title>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/validation.js" defer></script>
</head>

<body>

	<!-- 共通ヘッダー -->
	<div id="appHeader"></div>

	<main class="main-container">

		<p class="screen-id">Shokudo Form</p>

		<h2 class="page-title">食堂登録</h2>
		<p class="page-lead"><!-- タイトルの下に文を表示 --></p>

		<section class="card form-card">
			<form id="shokudoForm" data-validate="true" novalidate>

				<div class="form-grid">

					<div class="form-field">
						<label for="I-001">
							食堂名
							<span class="required-mark">必須</span>
						</label>

						<input type="text" id="I-001" name="I-001" data-item-id="I-001"
							data-db-table="T_KODOMO_SHOKUDO" data-db-column="shokudo_name" data-label="食堂名"
							data-required="true" maxlength="100" data-max-length="100" placeholder="食堂名を入力してください">

						<small class="field-help">
							100文字以内
						</small>

						<p id="I-001-error" class="error-message" aria-live="polite"></p>
					</div>

					<div class="form-field form-field-full">
						<label for="I-002">紹介文</label>

						<textarea id="I-002" name="I-002" data-item-id="I-002"
							data-db-table="T_KODOMO_SHOKUDO" data-db-column="description" data-label="紹介文" rows="4"
							maxlength="255" data-max-length="255" placeholder="紹介文を入力してください"></textarea>

						<small class="field-help">
							画面表示用 255文字以内
						</small>

						<p id="I-002-error" class="error-message" aria-live="polite"></p>
					</div>

					<div class="form-field">
						<label for="I-003">郵便番号
							<span class="required-mark">必須</span>
						</label>

						<input type="text" id="I-003" name="I-003" data-item-id="I-003"
							data-db-table="T_KODOMO_SHOKUDO" data-db-column="postal_code" data-label="郵便番号"
							data-required="true" maxlength="10" data-max-length="10" data-pattern="postal"
							placeholder="郵便番号を入力してください">

						<small class="field-help">
							数字3桁-4桁
						</small>

						<p id="I-003-error" class="error-message" aria-live="polite"></p>
					</div>

					<div class="form-field form-field-full">
						<label for="I-004">
							住所
							<span class="required-mark">必須</span>
						</label>

						<input type="text" id="I-004" name="I-004" data-item-id="I-004"
							data-db-table="T_KODOMO_SHOKUDO" data-db-column="address" data-label="住所"
							data-required="true" maxlength="255" data-max-length="255" placeholder="住所を入力してください">

						<small class="field-help">
							255文字以内
						</small>

						<p id="I-004-error" class="error-message" aria-live="polite"></p>
					</div>

					<div class="form-field">
						<label for="I-005">電話番号
							<span class="required-mark">必須</span>
						</label>

						<input type="tel" id="I-005" name="I-005" data-item-id="I-005"
							data-db-table="T_KODOMO_SHOKUDO" data-db-column="phone_number" data-label="電話番号"
							data-required="true" maxlength="20" data-max-length="20" data-pattern="phone"
							placeholder="電話番号を入力してください">

						<small class="field-help">
							半角数字・ハイフン
						</small>

						<p id="I-005-error" class="error-message" aria-live="polite"></p>
					</div>

					<!-- I-006 管理者名はEntityに存在しないため削除 -->

					<div class="form-field form-field-full">
						<label for="I-007">HPリンク
							<span class="required-mark">必須</span>
						</label>

						<input type="url" id="I-007" name="I-007" data-item-id="I-007"
							data-db-table="T_KODOMO_SHOKUDO" data-db-column="hp_url" data-label="HPリンク"
							data-required="true" maxlength="255" data-max-length="255" data-pattern="url"
							placeholder="HPリンクを入力してください">

						<small class="field-help">
							URL形式
						</small>

						<p id="I-007-error" class="error-message" aria-live="polite"></p>
					</div>

					<div class="form-field form-field-full">
						<label for="I-008">SNSリンク
							<span class="required-mark">必須</span>
						</label>

						<input type="url" id="I-008" name="I-008" data-item-id="I-008"
							data-db-table="T_KODOMO_SHOKUDO" data-db-column="sns_url" data-label="SNSリンク"
							data-required="true" maxlength="255" data-max-length="255" data-pattern="url"
							placeholder="SNSリンクを入力してください">

						<small class="field-help">
							URL形式
						</small>

						<p id="I-008-error" class="error-message" aria-live="polite"></p>
					</div>

				</div>

				<div class="button-area">
					<button type="submit" class="primary-button" data-button-id="B-001"
						data-next-screen="SC-024 食堂確認画面">
						確認へ
					</button>

					<button type="button" class="secondary-button" onclick="history.back()">
						戻る
					</button>

				</div>

			</form>
		</section>
	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamD.init().then(() => {
			if (!TeamD.requireStaff("shokudo-form.html")) return;

			const form = document.getElementById("shokudoForm");

			// 「戻る」で復元できるよう draft を復元
			const draft = TeamD.getDraft("shokudo");
			if (draft) {
				document.getElementById("I-001").value = draft.shokudoName || "";
				document.getElementById("I-002").value = draft.description || "";
				document.getElementById("I-003").value = draft.postalCode || "";
				document.getElementById("I-004").value = draft.address || "";
				document.getElementById("I-005").value = draft.phoneNumber || "";
				document.getElementById("I-007").value = draft.hpUrl || "";
				document.getElementById("I-008").value = draft.snsUrl || "";
			}

			form.addEventListener("submit", (e) => {
				e.preventDefault();
				// validation.js の submit ハンドラが先に動き、不正なら aria-invalid を付与する。
				if (form.querySelector('[aria-invalid="true"]')) return;

				TeamD.setDraft("shokudo", {
					shokudoName: document.getElementById("I-001").value.trim(),
					description: document.getElementById("I-002").value.trim(),
					postalCode: document.getElementById("I-003").value.trim(),
					address: document.getElementById("I-004").value.trim(),
					phoneNumber: document.getElementById("I-005").value.trim(),
					hpUrl: document.getElementById("I-007").value.trim(),
					snsUrl: document.getElementById("I-008").value.trim(),
				});
				location.href = "./shokudo-confirm.html";
			});
		});
	</script>
</body>

</html>
