<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>食堂確認画面 | まちのこ食卓プロジェクト</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>

	<!-- 共通ヘッダー -->
	<div id="appHeader"></div>

	<main class="main-container">

		<p class="screen-id">Shokudo Confirm</p>

		<h2 class="page-title">食堂確認</h2>
		<p class="page-lead"><!-- タイトルの下に文を表示 --></p>

		<section class="card confirm-card">

			<dl class="confirm-list">

				<div class="confirm-row" data-db-table="T_KODOMO_SHOKUDO" data-db-column="shokudo_name">
					<dt>食堂名</dt>
					<dd>
						<span id="I-001" data-confirm-field="I-001"></span>
					</dd>
				</div>

				<div class="confirm-row" data-db-table="T_KODOMO_SHOKUDO" data-db-column="description">
					<dt>紹介文</dt>
					<dd>
						<span id="I-002" data-confirm-field="I-002"></span>
					</dd>
				</div>

				<div class="confirm-row" data-db-table="T_KODOMO_SHOKUDO" data-db-column="postal_code">
					<dt>郵便番号</dt>
					<dd>
						<span id="I-003" data-confirm-field="I-003"></span>
					</dd>
				</div>

				<div class="confirm-row" data-db-table="T_KODOMO_SHOKUDO" data-db-column="address">
					<dt>住所</dt>
					<dd>
						<span id="I-004" data-confirm-field="I-004"></span>
					</dd>
				</div>

				<div class="confirm-row" data-db-table="T_KODOMO_SHOKUDO" data-db-column="phone_number">
					<dt>電話番号</dt>
					<dd>
						<span id="I-005" data-confirm-field="I-005"></span>
					</dd>
				</div>

				<!-- I-006 管理者名はEntityに存在しないため削除 -->

				<div class="confirm-row" data-db-table="T_KODOMO_SHOKUDO" data-db-column="hp_url">
					<dt>HPリンク</dt>
					<dd>
						<span id="I-007" data-confirm-field="I-007"></span>
					</dd>
				</div>

				<div class="confirm-row" data-db-table="T_KODOMO_SHOKUDO" data-db-column="sns_url">
					<dt>SNSリンク</dt>
					<dd>
						<span id="I-008" data-confirm-field="I-008"></span>
					</dd>
				</div>

			</dl>

			<div class="button-area">
				<button type="button" id="confirmBtn" class="primary-button">確定</button>
				<button type="button" id="backBtn" class="secondary-button">戻る</button>
			</div>

		</section>

	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamD.init().then(() => {
			if (!TeamD.requireStaff("shokudo-confirm.html")) return;

			const draft = TeamD.getDraft("shokudo");
			if (!draft) {
				location.href = "./shokudo-form.html";
				return;
			}

			document.getElementById("I-001").textContent = draft.shokudoName || "";
			document.getElementById("I-002").textContent = draft.description || "";
			document.getElementById("I-003").textContent = draft.postalCode || "";
			document.getElementById("I-004").textContent = draft.address || "";
			document.getElementById("I-005").textContent = draft.phoneNumber || "";
			document.getElementById("I-007").textContent = draft.hpUrl || "";
			document.getElementById("I-008").textContent = draft.snsUrl || "";

			document.getElementById("confirmBtn").addEventListener("click", () => {
				TeamD.saveShokudo(draft);
				TeamD.clearDraft("shokudo");
				location.href = "./complete.html?type=admin";
			});

			document.getElementById("backBtn").addEventListener("click", () => {
				// draft は保持したまま入力画面へ戻り復元
				location.href = "./shokudo-form.html";
			});
		});
	</script>
</body>

</html>
