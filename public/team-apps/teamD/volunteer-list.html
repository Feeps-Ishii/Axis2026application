<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ボランティア名簿画面 | まちのこ食卓プロジェクト</title>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/validation.js" defer></script>
</head>

<body>
	<!-- 共通ヘッダー -->
	<div id="appHeader"></div>

	<main class="main-container">
		<p class="screen-id">Volunteer List</p>
		<h2 class="page-title">ボランティア名簿</h2>
		<p class="page-lead"><!-- タイトルの下に文を表示できます --></p>

		<section class="table-toolbar">
			<form id="searchForm">
				<h3 style="margin-bottom:10px;">検索条件</h3>

				<div style="display:flex; align-items:end; gap:20px; margin-bottom:15px;">
					<div>
						<label for="dayId">曜日</label><br>
						<select id="dayId" name="dayId">
							<option value="">すべて</option>
						</select>
					</div>

					<div>
						<label for="timeId">時間</label><br>
						<select id="timeId" name="timeId">
							<option value="">すべて</option>
						</select>
					</div>

					<div>
						<label for="regionId">地域</label><br>
						<select id="regionId" name="regionId">
							<option value="">すべて</option>
						</select>
					</div>

					<button type="submit" class="primary-button">検索</button>

					<a href="javascript:void(0);" id="clearBtn" class="secondary-button">クリア</a>
				</div>

				<div style="margin-bottom:10px;">
					<strong>資格</strong>
				</div>

				<div style="display:flex; gap:25px; margin-bottom:20px;">
					<label>
						<input type="checkbox" name="cookingExperience" id="cookingExperience" value="true">
						調理経験
					</label>
					<label>
						<input type="checkbox" name="nutritionist" id="nutritionist" value="true">
						栄養士
					</label>
					<label>
						<input type="checkbox" name="childcare" id="childcare" value="true">
						保育士
					</label>
					<label>
						<input type="checkbox" name="driverLicense" id="driverLicense" value="true">
						運転免許
					</label>
				</div>
			</form>
		</section>

		<section class="table-card" aria-label="ボランティア名簿一覧">
			<div style="overflow:auto; width:100%; max-height:600px;">
				<table class="data-table" style="min-width:1600px; white-space:nowrap;">
					<thead>
						<tr>
							<th>ボランティアID</th>
							<th>氏名</th>
							<th>ニックネーム</th>
							<th>郵便番号</th>
							<th>住所</th>
							<th>年齢</th>
							<th>職業</th>
							<th>調理経験</th>
							<th>栄養士</th>
							<th>保育</th>
							<th>運転免許</th>
							<th>参加可能曜日・時間</th>
							<th>参加可能地域</th>
							<th>スタンプ数</th>
							<th>バッジ名</th>
							<th>操作</th>
						</tr>
					</thead>
					<tbody id="volTbody"></tbody>
				</table>
			</div>
		</section>

		<a class="secondary-button" href="./dashboard.html">ダッシュボードへ戻る</a>
	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		function esc(s) {
			return String(s == null ? "" : s)
				.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
		}
		function truncate(s, n) {
			const v = String(s == null ? "" : s);
			return v.length > n ? v.substring(0, n) + "…" : v;
		}

		TeamD.init().then(() => {
			if (!TeamD.requireStaff("volunteer-list.html")) return;

			const daySel = document.getElementById("dayId");
			const timeSel = document.getElementById("timeId");
			const regionSel = document.getElementById("regionId");
			const cooking = document.getElementById("cookingExperience");
			const nutritionist = document.getElementById("nutritionist");
			const childcare = document.getElementById("childcare");
			const driver = document.getElementById("driverLicense");
			const tbody = document.getElementById("volTbody");

			TeamD.days().forEach((d) => {
				const opt = document.createElement("option");
				opt.value = d.dayId;
				opt.textContent = d.dayName;
				daySel.appendChild(opt);
			});
			TeamD.times().forEach((t) => {
				const opt = document.createElement("option");
				opt.value = t.timeId;
				opt.textContent = t.startTime + "～" + t.endTime;
				timeSel.appendChild(opt);
			});
			TeamD.regions().forEach((r) => {
				const opt = document.createElement("option");
				opt.value = r.regionId;
				opt.textContent = r.regionName;
				regionSel.appendChild(opt);
			});

			function render(list) {
				if (!list.length) {
					tbody.innerHTML = `<tr><td colspan="16">ボランティア情報が登録されていません。</td></tr>`;
					return;
				}
				tbody.innerHTML = list.map((v) => {
					const u = TeamD.userById(v.userId) || {};
					const badge = TeamD.currentBadge(v.stamp);
					const badgeName = badge ? badge.badgeName : "-";
					const shiftText = TeamD.shiftTextByUser(v.userId) || "-";
					const regionText = TeamD.regionTextByUser(v.userId) || "-";
					return `
						<tr>
							<td>${esc(v.volunteerId)}</td>
							<td title="${esc(u.name)}">${esc(truncate(u.name, 10))}</td>
							<td title="${esc(v.nickname)}">${esc(truncate(v.nickname, 10))}</td>
							<td>${esc(v.postalCode)}</td>
							<td title="${esc(v.address)}">${esc(truncate(v.address, 16))}</td>
							<td>${esc(v.age)}</td>
							<td title="${esc(v.occupation)}">${esc(truncate(v.occupation, 10))}</td>
							<td>${v.cookingExperience ? "あり" : "なし"}</td>
							<td>${v.nutritionist ? "あり" : "なし"}</td>
							<td>${v.childcare ? "あり" : "なし"}</td>
							<td>${v.driverLicense ? "あり" : "なし"}</td>
							<td style="min-width:180px; max-width:260px; white-space:normal; line-height:1.8;">${shiftText}</td>
							<td style="min-width:160px; max-width:240px; white-space:normal; line-height:1.8;">${esc(regionText)}</td>
							<td>${esc(v.stamp)}</td>
							<td>${esc(badgeName)}</td>
							<td style="width:120px; text-align:center; white-space:nowrap;" class="action-links">
								<a class="text-link" href="./mypage-edit.html?volunteerId=${v.volunteerId}">編集</a>
								|
								<a class="text-link" href="javascript:void(0);" data-delete="${v.volunteerId}">削除</a>
							</td>
						</tr>`;
				}).join("");
			}

			function doSearch() {
				render(TeamD.searchVolunteers(
					daySel.value, timeSel.value, regionSel.value,
					cooking.checked, nutritionist.checked, childcare.checked, driver.checked
				));
			}

			document.getElementById("searchForm").addEventListener("submit", (e) => {
				e.preventDefault();
				doSearch();
			});

			document.getElementById("clearBtn").addEventListener("click", () => {
				daySel.value = "";
				timeSel.value = "";
				regionSel.value = "";
				cooking.checked = false;
				nutritionist.checked = false;
				childcare.checked = false;
				driver.checked = false;
				doSearch();
			});

			tbody.addEventListener("click", (e) => {
				const link = e.target.closest("[data-delete]");
				if (!link) return;
				e.preventDefault();
				if (!confirm("削除しますか？")) return;
				TeamD.deleteVolunteerById(Number(link.getAttribute("data-delete")));
				doSearch();
			});

			doSearch();
		});
	</script>
</body>

</html>
