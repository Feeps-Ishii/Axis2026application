<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ボランティア募集詳細画面 | まちのこ食卓プロジェクト</title>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/validation.js" defer></script>
</head>

<body>
	<div id="appHeader"></div>
	<main class="main-container">
		<p class="screen-id">Volunteer Recruit Detail</p>
		<h2 class="page-title">ボランティア募集詳細</h2>
		<p class="page-lead"></p>
		<section class="card confirm-card">
			<dl class="confirm-list">
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="title">
					<dt>募集タイトル</dt>
					<dd><span id="I-001" data-confirm-field="I-001"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="cafeteria_id">
					<dt>食堂</dt>
					<dd><span id="d-shokudo"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="event_date">
					<dt>開催日時</dt>
					<dd><span id="I-003" data-confirm-field="I-003"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="location">
					<dt>開催場所</dt>
					<dd><span id="I-004" data-confirm-field="I-004"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="description">
					<dt>募集内容</dt>
					<dd><span id="I-005" data-confirm-field="I-005"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="capacity">
					<dt>定員数</dt>
					<dd><span id="I-006" data-confirm-field="I-006"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="current_count">
					<dt>現在の参加人数</dt>
					<dd><span id="I-011" data-confirm-field="I-011">0</span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="deadline">
					<dt>応募期限</dt>
					<dd><span id="I-007" data-confirm-field="I-007"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="is_urgent">
					<dt>緊急フラグ</dt>
					<dd><span id="I-008" data-confirm-field="I-008"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="status">
					<dt>状態</dt>
					<dd><span id="I-009" data-confirm-field="I-009"></span></dd>
				</div>
				<div class="confirm-row" data-db-table="T_STAMP" data-db-column="stamp_count">
					<dt>登録日時</dt>
					<dd><span id="I-010" data-confirm-field="I-010"></span></dd>
				</div>
			</dl>

			<section class="table-card" aria-label="ボランティア参加予定一覧" id="participantSection" style="display:none;">
				<h3 class="participant-title">参加予定一覧（<span id="participantCount">0</span>名）</h3>
				<table class="data-table">
					<thead>
						<tr>
							<th>ニックネーム</th>
							<th>バッジ</th>
						</tr>
					</thead>
					<tbody id="participantTbody"></tbody>
				</table>
			</section>

			<div class="button-area" id="actionArea"></div>
		</section>
	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		const recruitId = Number(new URLSearchParams(location.search).get("id"));
		function esc(s) {
			return String(s == null ? "" : s)
				.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
		}
		function fmtDateTime(s) {
			if (!s) return "-";
			const t = String(s).replace("T", " ");
			return t.slice(0, 10).replace(/-/g, "/") + " " + t.slice(11, 16);
		}

		TeamD.init().then(() => {
			const recruit = TeamD.recruitActiveById(recruitId);
			if (!recruit) {
				window.location.href = "./volunteer-recruit-list.html";
				return;
			}
			const shokudo = TeamD.shokudoById(recruit.shokudoId);

			document.getElementById("I-001").textContent = recruit.title || "";
			document.getElementById("d-shokudo").textContent = shokudo ? shokudo.shokudoName : "食堂情報なし";
			document.getElementById("I-003").textContent = fmtDateTime(recruit.eventDate);
			document.getElementById("I-004").textContent = recruit.location || "";
			document.getElementById("I-005").textContent = recruit.description || "";
			document.getElementById("I-006").textContent = recruit.capacity != null ? recruit.capacity : "";
			document.getElementById("I-011").textContent = recruit.currentCount != null ? recruit.currentCount : 0;
			document.getElementById("I-007").textContent = fmtDateTime(recruit.deadline);
			document.getElementById("I-008").textContent = recruit.isUrgent ? "緊急募集" : "通常募集";
			document.getElementById("I-009").textContent =
				recruit.status === 1 ? "募集中" : (recruit.status === 2 ? "終了" : "未設定");
			document.getElementById("I-010").textContent = fmtDateTime(recruit.createdAt);

			const isLogin = TeamD.isLogin();
			const isAdmin = TeamD.isStaff();
			const isVolunteer = TeamD.isVolunteer();
			const currentUser = TeamD.currentUser();
			const alreadyApplied = currentUser && TeamD.isAlreadyApplied(recruitId, currentUser.userId);
			const hasCapacity = (recruit.currentCount || 0) < recruit.capacity;

			// 管理者/職員：参加者一覧
			if (isAdmin) {
				const participants = TeamD.participantsByRecruitId(recruitId);
				document.getElementById("participantSection").style.display = "";
				document.getElementById("participantCount").textContent = participants.length;
				const tbody = document.getElementById("participantTbody");
				if (!participants.length) {
					tbody.innerHTML = `<tr><td colspan="2">まだ参加予定者はいません。</td></tr>`;
				} else {
					tbody.innerHTML = participants.map((p) => {
						const prof = p.volunteerProfile;
						const badge = prof ? TeamD.currentBadge(prof.stamp) : null;
						return `<tr>
							<td>${esc(prof ? prof.nickname : "-")}</td>
							<td><span class="badge">${esc(badge ? badge.badgeName : "未取得")}</span></td>
						</tr>`;
					}).join("");
				}
			}

			// 操作ボタン
			const area = document.getElementById("actionArea");
			let html = "";

			if (!isLogin) {
				html += `<button type="button" class="primary-button" onclick="location.href='./login.html'">参加する</button>`;
			}
			if (isVolunteer && !alreadyApplied && hasCapacity) {
				html += `<button type="button" class="primary-button" id="entryBtn">参加申込</button>`;
			}
			if (isVolunteer && alreadyApplied) {
				html += `<p class="error-message">この募集にはすでに参加申込済みです。</p>`;
				html += `<button type="button" class="secondary-button" id="cancelBtn">参加をキャンセル</button>`;
			}
			html += `<button type="button" class="secondary-button" onclick="location.href='./portal.html'">戻る</button>`;
			area.innerHTML = html;

			const entryBtn = document.getElementById("entryBtn");
			if (entryBtn) {
				entryBtn.addEventListener("click", () => {
					window.location.href = `./volunteer-entry-form.html?recruitId=${recruitId}`;
				});
			}
			const cancelBtn = document.getElementById("cancelBtn");
			if (cancelBtn) {
				cancelBtn.addEventListener("click", () => {
					if (!confirm("この参加申込をキャンセルしますか？")) return;
					try {
						TeamD.cancelByRecruitAndUser(recruitId, currentUser.userId);
						window.location.reload();
					} catch (err) {
						alert(err.message);
					}
				});
			}
		});
	</script>
</body>

</html>
