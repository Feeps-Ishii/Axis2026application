<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ボランティア募集確認画面 | まちのこ食卓プロジェクト</title>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/validation.js" defer></script>
</head>

<body>
	<div id="appHeader"></div>

	<main class="main-container">
		<p class="screen-id">Volunteer Recruit Confilm</p>
		<h2 class="page-title">ボランティア募集確認</h2>
		<p class="page-lead"></p>
		<p id="errorMessage" class="error-message" style="display:none;"></p>

		<section class="card confirm-card">
			<dl class="confirm-list">
				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="title">
					<dt>募集タイトル</dt>
					<dd><span id="I-001" data-confirm-field="I-001"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="shokudo_id">
					<dt>食堂</dt>
					<dd><span id="I-002" data-confirm-field="I-002"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="event_date">
					<dt>開催日</dt>
					<dd><span id="I-003" data-confirm-field="I-003"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="event_date">
					<dt>開催時間</dt>
					<dd><span id="I-010" data-confirm-field="I-010"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="end_date">
					<dt>終了時間</dt>
					<dd><span id="I-011" data-confirm-field="I-011"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="location">
					<dt>開催場所</dt>
					<dd><span id="I-004" data-confirm-field="I-004"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="description">
					<dt>募集内容</dt>
					<dd><span id="I-005" data-confirm-field="I-005"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="capacity">
					<dt>定員数</dt>
					<dd><span id="I-006" data-confirm-field="I-006"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="deadline">
					<dt>応募期限</dt>
					<dd><span id="I-007" data-confirm-field="I-007"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="is_urgent">
					<dt>緊急フラグ</dt>
					<dd><span id="I-008" data-confirm-field="I-008"></span></dd>
				</div>

				<div class="confirm-row" data-db-table="T_VOLUNTEER_RECRUIT" data-db-column="status">
					<dt>状態</dt>
					<dd><span id="I-009" data-confirm-field="I-009">募集中</span></dd>
				</div>
			</dl>

			<div class="button-area">
				<button type="button" id="confirmBtn" class="primary-button" data-button-id="B-001"
					data-next-screen="SC-013 完了画面">確定する</button>
				<button type="button" id="backBtn" class="secondary-button" data-button-id="B-002"
					data-next-screen="SC-020 ボランティア募集登録">戻る</button>
			</div>
		</section>
	</main>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		function fmtDeadline(s) {
			if (!s) return "";
			const t = String(s).replace("T", " ");
			return t.slice(0, 10).replace(/-/g, "/") + " " + t.slice(11, 16);
		}

		TeamD.init().then(() => {
			if (!TeamD.requireStaff("volunteer-recruit-confirm.html")) return;

			const draft = TeamD.getDraft("recruit");
			if (!draft) {
				window.location.href = "./volunteer-recruit-form.html";
				return;
			}

			document.getElementById("I-001").textContent = draft.title || "";
			document.getElementById("I-002").textContent = TeamD.shokudoName(draft.shokudoId) || "";
			document.getElementById("I-003").textContent = draft.eventDate || "";
			document.getElementById("I-010").textContent = draft.eventTime || "";
			document.getElementById("I-011").textContent = draft.endTime || "";
			document.getElementById("I-004").textContent = draft.location || "";
			document.getElementById("I-005").textContent = draft.description || "";
			document.getElementById("I-006").textContent = draft.capacity || "";
			document.getElementById("I-007").textContent = fmtDeadline(draft.deadline);
			document.getElementById("I-008").textContent = draft.isUrgent ? "有効" : "無効";

			document.getElementById("confirmBtn").addEventListener("click", () => {
				TeamD.createRecruit(draft);
				TeamD.clearDraft("recruit");
				window.location.href = "./complete.html?type=admin";
			});

			document.getElementById("backBtn").addEventListener("click", () => {
				window.location.href = "./volunteer-recruit-form.html";
			});
		});
	</script>
</body>

</html>
