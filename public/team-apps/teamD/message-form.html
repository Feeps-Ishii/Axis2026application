<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>メッセージ新規作成画面 | まちのこ食卓プロジェクト</title>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/validation.js" defer></script>
</head>

<body>
	<div id="appHeader"></div>

	<main class="main-container">
		<p class="screen-id">Thanks Massage</p>
		<h2 class="page-title">メッセージ新規作成</h2>
		<p class="page-lead">管理者または食堂管理者が感謝メッセージを投稿する画面。</p>

		<p id="errorMessage" class="error-message" style="display:none;"></p>

		<form class="card form-card" id="thanksForm" data-validate="true" novalidate>
			<div class="form-grid">

				<div class="form-field">
					<label for="I-001">送信元の食堂を選んでください <span class="required-mark">必須</span></label>
					<select id="I-001" name="I-001" data-item-id="I-001" data-db-table="T_THANKS_MESSAGE"
						data-db-column="shokudo_id" data-label="食堂" data-required="true">
						<option value="">選択してください</option>
					</select>
					<p id="I-001-error" class="error-message" aria-live="polite"></p>
				</div>

				<div class="form-field">
					<label for="I-003">送信先 <span class="required-mark">必須</span></label>
					<select id="I-003" name="I-003" data-item-id="I-003" data-db-table="T_THANKS_MESSAGE"
						data-db-column="volunteer_id" data-label="送信先" data-required="true"
						onchange="toggleVolunteerSelect()">
						<option value="">選択してください</option>
						<option value="ALL">全体に送る</option>
						<option value="PERSONAL">個人に送る</option>
					</select>
					<p id="I-003-error" class="error-message" aria-live="polite"></p>
				</div>

				<div class="form-field" id="volunteerSelectArea">
					<label for="I-004">送信先ボランティア</label>
					<select id="I-004" name="I-004" data-item-id="I-004" data-db-table="T_THANKS_MESSAGE"
						data-db-column="volunteer_id" data-label="送信先ボランティア">
						<option value="">個人に送る場合のみ選択してください</option>
					</select>
					<small class="field-help">個人に送る場合のみ選択してください。</small>
					<p id="I-004-error" class="error-message" aria-live="polite"></p>
				</div>

				<div class="form-field form-field-full">
					<label for="I-002">感謝内容 <span class="required-mark">必須</span></label>
					<textarea id="I-002" name="I-002" data-item-id="I-002" data-db-table="T_THANKS_MESSAGE"
						data-db-column="message" data-label="感謝内容" data-required="true" rows="4"
						placeholder="感謝内容を入力してください"></textarea>
					<p id="I-002-error" class="error-message" aria-live="polite"></p>
				</div>

				<div class="form-field form-field-full">
					<label for="I-005">画像URL</label>
					<input type="url" id="I-005" name="I-005" data-item-id="I-005" data-db-table="T_THANKS_MESSAGE"
						data-db-column="image_url" data-label="画像URL" data-pattern="url" maxlength="255"
						placeholder="画像URLを入力してください">
					<small class="field-help">任意</small>
					<p id="I-005-error" class="error-message" aria-live="polite"></p>
				</div>

			</div>

			<div class="button-area">
				<button type="submit" class="primary-button" data-button-id="B-001" data-next-screen="SC-013 完了画面">
					メッセージを送る
				</button>
				<button type="button" class="secondary-button" onclick="location.href='./dashboard.html'"
					data-button-id="B-002" data-next-screen="SC-016 管理者ダッシュボード">
					ダッシュボードに戻る
				</button>
			</div>
		</form>
	</main>

	<script>
		function toggleVolunteerSelect() {
			const targetType = document.getElementById("I-003").value;
			const volunteerSelectArea = document.getElementById("volunteerSelectArea");
			volunteerSelectArea.style.display = targetType === "PERSONAL" ? "block" : "none";
		}
	</script>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamD.init().then(() => {
			if (!TeamD.requireStaff("message-form.html")) return;

			const form = document.getElementById("thanksForm");
			const errBox = document.getElementById("errorMessage");
			const shokudoSelect = document.getElementById("I-001");
			const volunteerSelect = document.getElementById("I-004");

			TeamD.shokudosActive().forEach((s) => {
				const opt = document.createElement("option");
				opt.value = s.shokudoId;
				opt.textContent = s.shokudoName;
				shokudoSelect.appendChild(opt);
			});

			TeamD.searchVolunteers().forEach((p) => {
				const user = TeamD.userById(p.userId);
				const opt = document.createElement("option");
				opt.value = p.userId;
				opt.textContent = `${user ? user.name : ""}（${p.nickname || ""}）`;
				volunteerSelect.appendChild(opt);
			});

			toggleVolunteerSelect();

			form.addEventListener("submit", (e) => {
				e.preventDefault();
				if (form.querySelector('[aria-invalid="true"]')) return;

				const shokudoId = shokudoSelect.value;
				const targetType = document.getElementById("I-003").value;
				const volunteerId = volunteerSelect.value;
				const message = document.getElementById("I-002").value.trim();
				const imageUrl = document.getElementById("I-005").value.trim();

				errBox.style.display = "none";
				errBox.textContent = "";
				const errors = [];
				if (!shokudoId) errors.push("食堂を選択してください");
				if (!targetType) errors.push("送信先を選択してください");
				if (targetType === "PERSONAL" && !volunteerId) errors.push("送信先ボランティアを選択してください");
				if (!message) errors.push("感謝内容を入力してください");
				if (errors.length) {
					errBox.textContent = errors[0];
					errBox.style.display = "block";
					return;
				}

				TeamD.createThanks({ shokudoId, targetType, volunteerId, message, imageUrl });
				window.location.href = "./complete.html?type=messageList";
			});
		});
	</script>
</body>

</html>
