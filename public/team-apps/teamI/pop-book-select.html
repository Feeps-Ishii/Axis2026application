<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ことのは書房 | POP対象書籍の選択</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Serif+JP:wght@700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
		rel="stylesheet">

	<style>
		:root {
			--bg-color: #f7f4eb;
			--primary-color: #1e3d33;
			--accent-color: #bd4a30;
			--text-color: #333333;
			--paper-bg: #fffbf0;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Zen Kaku Gothic New', sans-serif;
			background-color: var(--bg-color);
			color: var(--text-color);
			line-height: 1.6;
			margin: 0;
			position: relative;
		}

		.serif {
			font-family: 'Noto Serif JP', serif;
		}

		.pop-font {
			font-family: 'Kiwi Maru', sans-serif;
		}

		header {
			padding: 40px 4% 20px;
			text-align: center;
			position: relative;
			border-bottom: 2px dashed rgba(30, 61, 51, 0.2);
			margin-bottom: 40px;
		}

		header h1 {
			color: var(--primary-color);
			font-size: 1.8rem;
			margin-bottom: 5px;
		}

		.subtitle {
			color: var(--accent-color);
			font-size: 1.05rem;
			margin-bottom: 15px;
		}

		.header-actions {
			position: absolute;
			top: 35px;
			right: 4%;
		}

		.btn-back {
			display: inline-block;
			background-color: transparent;
			color: var(--primary-color);
			border: 2px solid var(--primary-color);
			padding: 8px 25px;
			border-radius: 30px;
			text-decoration: none;
			font-size: 0.95rem;
			font-weight: bold;
			transition: all 0.3s;
		}

		.btn-back:hover {
			background-color: var(--primary-color);
			color: #fff;
		}

		.container {
			max-width: 1000px;
			margin: 0 auto 60px;
			padding: 40px;
			background: rgba(255, 255, 255, 0.45);
			border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
			backdrop-filter: blur(6px);
			border: 1px solid rgba(255, 255, 255, 0.6);
		}

		.search-card {
			background-color: var(--paper-bg);
			border: 1px dashed #ebdcb9;
			border-radius: 8px;
			padding: 30px 40px;
			margin-bottom: 40px;
			box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.03);
		}

		.search-grid {
			display: flex;
			gap: 15px;
			align-items: center;
			flex-wrap: wrap;
		}

		.search-item {
			flex: 1;
			min-width: 200px;
		}

		.search-item input,
		.search-item select {
			width: 100%;
			padding: 12px 15px;
			border: 1px dashed #ebdcb9;
			border-radius: 6px;
			font-family: inherit;
			font-size: 1rem;
			background-color: rgba(255, 255, 255, 0.8);
			transition: border-color 0.3s, background-color 0.3s;
			color: #333;
		}

		.search-item input:focus,
		.search-item select:focus {
			outline: none;
			border-color: var(--accent-color);
			background-color: #fff;
		}

		.search-action {
			margin-top: 25px;
			text-align: center;
		}

		.btn-search {
			background-color: var(--primary-color);
			color: #fff;
			padding: 12px 50px;
			border-radius: 30px;
			border: none;
			font-weight: bold;
			cursor: pointer;
			transition: background-color 0.3s;
			font-size: 1.05rem;
			width: 100%;
		}

		.btn-search:hover {
			background-color: #142a23;
		}

		.book-list {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
			gap: 20px;
			margin-bottom: 40px;
		}

		.book-card {
			background: #fff;
			border: 1px solid #ebdcb9;
			border-radius: 8px;
			padding: 25px 20px;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.02);
			transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
			text-decoration: none;
			color: inherit;
		}

		.book-card:hover {
			transform: translateY(-3px);
			box-shadow: 2px 5px 15px rgba(0, 0, 0, 0.05);
			border-color: var(--accent-color);
		}

		.book-header {
			display: flex;
			gap: 15px;
			margin-bottom: 20px;
		}

		.book-cover-mini {
			width: 50px;
			height: 70px;
			background-color: #888;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: bold;
			font-size: 1.2rem;
			flex-shrink: 0;
			box-shadow: 1px 2px 4px rgba(0, 0, 0, 0.1);
			border-radius: 2px;
		}

		.book-title {
			font-weight: bold;
			color: var(--primary-color);
			font-size: 1.1rem;
			margin-bottom: 5px;
			line-height: 1.4;
		}

		.book-author {
			font-size: 0.9rem;
			color: #666;
		}

		.btn-select {
			background-color: transparent;
			color: var(--primary-color);
			border: 1px solid var(--primary-color);
			text-align: center;
			padding: 10px;
			border-radius: 30px;
			font-size: 0.9rem;
			font-weight: bold;
			display: block;
			transition: all 0.3s;
		}

		.book-card:hover .btn-select {
			background-color: var(--primary-color);
			color: #fff;
		}

		.pagination {
			display: flex;
			list-style: none;
			justify-content: center;
			gap: 8px;
		}

		.pagination li a,
		.pagination li span {
			display: flex;
			align-items: center;
			justify-content: center;
			min-width: 40px;
			height: 40px;
			padding: 0 12px;
			border-radius: 20px;
			border: 1px dashed #ebdcb9;
			background-color: #fff;
			color: #666;
			text-decoration: none;
			font-weight: bold;
			transition: all 0.3s;
			cursor: pointer;
		}

		.pagination li a:hover {
			border-color: var(--primary-color);
			color: var(--primary-color);
		}

		.pagination li.active a {
			background-color: var(--primary-color);
			color: #fff;
			border: 1px solid var(--primary-color);
		}

		.pagination li.disabled a {
			background-color: transparent;
			color: #ccc;
			border-color: #e2e8f0;
			pointer-events: none;
		}

		@media (max-width: 768px) {
			.header-actions {
				position: static;
				margin-top: 15px;
				text-align: center;
			}

			.container {
				padding: 20px;
			}

			.search-card {
				padding: 25px 20px;
			}

			.search-grid {
				flex-direction: column;
			}
		}
	</style>
</head>

<body>
	<header>
		<h1 class="serif">POPを飾る本を選ぶ</h1>
		<p class="pop-font subtitle">どの本のPOPを作成しますか？</p>
		<div class="header-actions">
			<a href="./board.html" class="btn-back">一覧へ戻る</a>
		</div>
	</header>

	<div class="container">
		<form id="searchForm">
			<div class="search-card">
				<div class="search-grid">
					<div class="search-item">
						<input type="text" name="title" placeholder="本のタイトル" class="pop-font">
					</div>
					<div class="search-item">
						<input type="text" name="author" placeholder="著者名" class="pop-font">
					</div>
					<div class="search-item">
						<select name="genreId" id="genreSel" class="pop-font">
							<option value="">すべてのジャンル</option>
						</select>
					</div>
				</div>
				<div class="search-action">
					<button type="submit" class="btn-search pop-font">検索する</button>
				</div>
			</div>
		</form>

		<div id="emptyMsg" style="text-align: center; padding: 40px; color: #888; display:none;" class="pop-font">
			該当する書籍が見つかりませんでした。
		</div>

		<div class="book-list" id="bookList"></div>

		<ul class="pagination pop-font" id="pager"></ul>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/nav.js"></script>
	<script>
		const PER = 6;

		function criteria() {
			const f = document.getElementById("searchForm");
			return {
				title: f.title.value.trim(),
				author: f.author.value.trim(),
				genreId: f.genreId.value
			};
		}

		function match(b, c) {
			if (c.title && !String(b.title || "").includes(c.title)) return false;
			if (c.author && !String(b.author || "").includes(c.author)) return false;
			if (c.genreId && String(b.genreId) !== c.genreId) return false;
			return true;
		}

		function card(b, index) {
			const hue = (index * 40) % 360;
			const initial = b.title ? String(b.title).charAt(0) : "本";
			return `<a href="./custom-pop-new.html?bookId=${b.id}" class="book-card">
				<div class="book-header">
					<div class="book-cover-mini" style="background-color: hsl(${hue}, 40%, 40%);">${TeamI.esc(initial)}</div>
					<div>
						<div class="book-title serif">${TeamI.esc(b.title)}</div>
						<div class="book-author pop-font">${TeamI.esc(b.author || "")}</div>
					</div>
				</div>
				<div class="btn-select pop-font">この本でPOPを作る</div>
			</a>`;
		}

		function render(rows, page) {
			const list = document.getElementById("bookList");
			const empty = document.getElementById("emptyMsg");
			if (!rows.length) {
				list.innerHTML = "";
				empty.style.display = "block";
				TeamIUI.wirePager(document.getElementById("pager"), 0, 1, PER, function () { });
				return;
			}
			empty.style.display = "none";
			const slice = rows.slice((page - 1) * PER, page * PER);
			list.innerHTML = slice.map(function (b, i) { return card(b, (page - 1) * PER + i); }).join("");
			TeamIUI.wirePager(document.getElementById("pager"), rows.length, page, PER,
				function (pp) { render(rows, pp); });
		}

		function run() {
			const c = criteria();
			const rows = TeamI.books().filter(function (b) { return !b.isDeleted && match(b, c); });
			render(rows, 1);
		}

		TeamI.init().then(function () {
			const gsel = document.getElementById("genreSel");
			TeamI.categories().forEach(function (cat) {
				const o = document.createElement("option");
				o.value = cat.id;
				o.textContent = cat.category;
				gsel.appendChild(o);
			});
			document.getElementById("searchForm").addEventListener("submit", function (e) { e.preventDefault(); run(); });
			run();
		});
	</script>
</body>

</html>
