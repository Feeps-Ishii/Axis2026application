<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ユーザーログイン | ことのは書房</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>
	<nav class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
		<div style="display: flex; align-items: center; gap: 20px;">
			<a href="#" class="brand" style="font-weight: bold; text-decoration: none;">書籍・POP管理システム</a>
		</div>
	</nav>
	<div class="container">
		<div class="card" style="max-width: 420px; margin: 80px auto;">
			<h1>ユーザーログイン</h1>

			<div id="loginError" class="error-message" style="display:none;">
				<p style="color: #dc2626;"></p>
			</div>

			<form id="loginForm">
				<div class="form-group">
					<label for="staffId">ID（必須）</label>
					<input type="text" id="staffId" name="staffNumber" placeholder="半角数字で入力">
				</div>

				<div class="form-group">
					<label for="password">パスワード（必須）</label>
					<input type="password" id="password" name="password" placeholder="8文字以上の半角英数字">
				</div>

				<div class="form-actions">
					<button type="submit" class="btn btn-primary">ログイン</button>
				</div>
			</form>

			<p style="margin-top:20px; font-size:0.85rem; color:#64748b; line-height:1.8;">
				<strong>デモ用アカウント</strong><br>
				管理者（本店）: ID <code>10001</code> / password123<br>
				一般（駅前店）: ID <code>20002</code> / password123
			</p>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamI.init().then(() => {
			document.getElementById("loginForm").addEventListener("submit", function (e) {
				e.preventDefault();
				const f = e.target;
				const sess = TeamI.login(f.staffNumber.value.trim(), f.password.value);
				if (!sess) {
					const box = document.getElementById("loginError");
					box.style.display = "block";
					box.querySelector("p").textContent = "IDまたはパスワードが正しくありません";
					return;
				}
				location.href = "./dashboard.html";
			});
		});
	</script>
</body>

</html>
