<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>店員新規登録 | ことのは書房</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>
	<div id="nav"></div>
	<div class="container">
		<h1>店員新規登録</h1>

		<div class="card" style="max-width: 600px; margin: 0 auto;">
			<p style="color: #64748b; font-size: 0.95rem; margin-bottom: 20px;">
				新規登録する店員情報を入力してください。
			</p>

			<form id="staffForm">
				<div class="form-group">
					<label for="employeeNo">社員番号（必須）</label>
					<input type="text" id="employeeNo" name="staffNumber" placeholder="半角数字で入力">
					<span class="err" data-for="staffNumber" style="color: #dc2626; font-size: 0.85rem;"></span>
				</div>

				<div class="form-group">
					<label for="name">氏名（必須）</label>
					<input type="text" id="name" name="name" placeholder="氏名を入力">
					<span class="err" data-for="name" style="color: #dc2626; font-size: 0.85rem;"></span>
				</div>

				<div class="form-group">
					<label for="password">パスワード（必須）</label>
					<input type="password" id="password" name="password" placeholder="8文字以上 半角英数字">
					<span class="err" data-for="password" style="color: #dc2626; font-size: 0.85rem;"></span>
				</div>

				<div class="form-group">
					<label for="store">所属店舗（必須）</label>
					<select id="store" name="storeId">
						<option value="">選択してください</option>
					</select>
					<span class="err" data-for="storeId" style="color: #dc2626; font-size: 0.85rem;"></span>
				</div>

				<div class="form-group">
					<label for="role">役職（必須）</label>
					<select id="role" name="roleId">
						<option value="">選択してください</option>
						<option value="1">管理者</option>
						<option value="2">一般</option>
					</select>
					<span class="err" data-for="roleId" style="color: #dc2626; font-size: 0.85rem;"></span>
				</div>

				<div class="form-actions"
					style="border-top: 1px solid #e2e8f0; padding-top: 20px; margin-top: 30px; justify-content: flex-end;">
					<a href="./staffs.html" class="btn btn-secondary">キャンセル</a>
					<button type="submit" class="btn btn-primary">確認</button>
				</div>
			</form>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/nav.js"></script>
	<script>
		TeamI.init().then(() => {
			const sess = TeamI.requireLogin();
			if (!sess) return;
			if (sess.staff.roleId !== 1) { location.href = "./dashboard.html"; return; }
			TeamINav.render("staffs");

			const f = document.getElementById("staffForm");
			const ssel = document.getElementById("store");
			TeamI.stores().forEach(s => { const o = document.createElement("option"); o.value = s.id; o.textContent = s.storeName; ssel.appendChild(o); });

			// 修正で戻ってきた場合は下書きを復元
			const draft = TeamI.getDraft("staff");
			if (draft) {
				f.staffNumber.value = draft.staffNumber || "";
				f.name.value = draft.name || "";
				f.password.value = draft.password || "";
				f.storeId.value = draft.storeId != null ? draft.storeId : "";
				f.roleId.value = draft.roleId != null ? draft.roleId : "";
			}

			f.addEventListener("submit", e => {
				e.preventDefault();
				f.querySelectorAll(".err").forEach(s => s.textContent = "");
				const data = {
					staffNumber: f.staffNumber.value.trim(),
					name: f.name.value.trim(),
					password: f.password.value,
					storeId: f.storeId.value ? Number(f.storeId.value) : "",
					roleId: f.roleId.value ? Number(f.roleId.value) : "",
				};
				const errs = {};
				if (!data.staffNumber) errs.staffNumber = "社員番号を入力してください";
				else if (!/^[0-9]+$/.test(data.staffNumber)) errs.staffNumber = "半角数字で入力してください";
				if (!data.name) errs.name = "氏名を入力してください";
				if (!data.password) errs.password = "パスワードを入力してください";
				else if (data.password.length < 8) errs.password = "8文字以上で入力してください";
				if (!data.storeId) errs.storeId = "所属店舗を選択してください";
				if (!data.roleId) errs.roleId = "役職を選択してください";
				if (Object.keys(errs).length) {
					Object.keys(errs).forEach(k => { const s = f.querySelector('.err[data-for="' + k + '"]'); if (s) s.textContent = errs[k]; });
					return;
				}
				TeamI.setDraft("staff", data);
				location.href = "./staff-confirm.html";
			});
		});
	</script>
</body>

</html>
