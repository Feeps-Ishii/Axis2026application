<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>疑似レジ販売入力</title>
	<link rel="stylesheet" href="./css/style.css">
	<style>
		#scanner-modal {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.8);
			z-index: 9999;
			justify-content: center;
			align-items: center;
		}

		.scanner-content {
			background: #fff;
			padding: 20px;
			border-radius: 8px;
			width: 90%;
			max-width: 500px;
			text-align: center;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
		}
	</style>
</head>

<body>
	<div id="nav"></div>

	<div style="padding: 20px; font-family: sans-serif;">
		<h2>レジ販売情報 疑似送信フォーム</h2>
		<p>ここに入力した情報がJSONとして送信され、在庫システム側で引き算されます。</p>

		<div style="margin-bottom: 15px;">
			<label>1. 店舗 (Store):</label><br>
			<select id="storeId" style="width: 215px; padding: 5px;"></select>
		</div>

		<div style="margin-bottom: 15px;">
			<label>2. ISBNコード (String):</label><br>
			<div style="display: flex; gap: 10px; align-items: center;">
				<input type="text" id="isbn" value="" placeholder="978..." style="width: 200px; padding: 5px;">
			</div>
		</div>

		<div style="margin-bottom: 15px;">
			<label>3. 販売数量 (Integer):</label><br>
			<input type="number" id="quantity" value="1" min="1" style="width: 200px; padding: 5px;">
		</div>

		<button type="button" onclick="sendSalesData()"
			style="padding: 10px 20px; cursor: pointer; margin-top: 10px; background-color: #2ecc71; color: white; border: none; border-radius: 4px;">
			販売データを送信（在庫を減算）
		</button>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/nav.js"></script>
	<script>
		// 数量入力欄の制限（現在の在庫数を超えない）
		window.addEventListener('DOMContentLoaded', () => {
			const quantityInput = document.getElementById('quantity');
			if (quantityInput) {
				quantityInput.addEventListener('input', (e) => {
					const isbn = document.getElementById('isbn').value.trim();
					const storeId = document.getElementById('storeId').value;
					let currentVal = parseInt(e.target.value);
					if (isNaN(currentVal) || !isbn) return;
					if (currentVal < 1) { e.target.value = 1; currentVal = 1; }
					const stock = TeamI.findStockByIsbnStore(isbn, storeId);
					if (stock && stock.stockCount != null) {
						const maxStock = stock.stockCount;
						if (currentVal > maxStock) e.target.value = maxStock;
					}
				});
			}
		});

		function sendSalesData() {
			const isbnValue = document.getElementById('isbn').value.trim();
			const quantityValue = parseInt(document.getElementById('quantity').value);
			const storeId = parseInt(document.getElementById('storeId').value);

			if (!isbnValue) {
				alert('ISBNコードを入力（または読み取り）してください。');
				return;
			}
			if (isNaN(quantityValue) || quantityValue < 1) {
				alert('正しい販売数量を入力してください。');
				return;
			}

			const stock = TeamI.findStockByIsbnStore(isbnValue, storeId);
			if (!stock) {
				alert('【エラー】\n指定された店舗・ISBNの在庫が見つかりませんでした。');
				return;
			}
			if (quantityValue > stock.stockCount) {
				alert('【エラー】\n販売数量が在庫数（' + stock.stockCount + '冊）を超えています。');
				return;
			}

			const newCount = stock.stockCount - quantityValue;
			TeamI.updateStock(stock.id, { stockCount: newCount });

			alert('送信成功：在庫が減算されました。（残り ' + newCount + ' 冊）');
			document.getElementById('isbn').value = '';
			document.getElementById('quantity').value = 1;
		}

		TeamI.init().then(() => {
			const SESS = TeamI.requireLogin();
			if (!SESS) return;
			TeamINav.render("stocks");

			const ssel = document.getElementById("storeId");
			TeamI.stores().forEach(s => {
				const o = document.createElement("option");
				o.value = s.id; o.textContent = s.storeName; ssel.appendChild(o);
			});
			ssel.value = String(SESS.store.id);
		});
	</script>
</body>

</html>
