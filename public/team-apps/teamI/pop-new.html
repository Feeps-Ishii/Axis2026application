<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>POP登録入力 | ことのは書房</title>
	<link rel="stylesheet" href="./css/style.css">
	<style>
		.flex-container { display: flex; flex-wrap: wrap; gap: 25px; }
		.pop-upload-area { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 15px; }
		.image-preview-box { width: 100%; background-color: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; min-height: 380px; color: #64748b; border: 2px dashed #cbd5e1; box-sizing: border-box; padding: 20px; text-align: center; }
		.pop-form-area { flex: 1.5; min-width: 350px; }
		.readonly-input { background-color: #f8fafc !important; color: #475569 !important; pointer-events: none; border: 1px solid #e2e8f0; width: 100%; box-sizing: border-box; }
		.error-message { color: #e74c3c; background-color: #fce4e4; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9rem; }
	</style>
</head>

<body>
	<div id="nav"></div>

	<div class="container">
		<h1>POP新規登録</h1>
		<p style="margin-bottom: 20px; color: #64748b; font-size: 0.95rem;">
			選択した書籍に対するPOP画像と、必要事項を入力してください。
		</p>

		<div id="errorBox" class="error-message" style="display:none;"></div>

		<div class="card" style="max-width: 950px; margin: 0 auto;">
			<form id="popForm">
				<div class="flex-container">
					<div class="pop-upload-area">
						<label style="font-weight: bold; font-size: 0.9rem; color: #475569;">POP画像設定</label>
						<div class="image-preview-box">
							<img id="imagePreview" style="max-width: 100%; max-height: 250px; margin-bottom: 15px; display:none;">
							<p id="defaultMessage" style="margin: 0 0 10px 0; font-size: 0.9rem;">ここに画像をドラッグ＆ドロップ<br>または</p>
							<p id="changeMessage" style="font-size: 0.85rem; margin: 0 0 10px 0; display:none;">変更する場合は新しいファイルを選択してください</p>
							<input type="file" id="imageFile" accept="image/jpeg, image/png, image/gif" style="font-size: 0.85rem;">
						</div>
					</div>

					<div class="pop-form-area">
						<div class="form-group">
							<label>対象書籍</label>
							<input type="text" id="bookTitle" class="readonly-input" readonly>
						</div>

						<div class="form-group">
							<label>店舗</label>
							<input type="text" id="storeName" class="readonly-input" readonly>
						</div>

						<div class="form-group">
							<label>社員番号</label>
							<input type="text" id="staffNumber" class="readonly-input" readonly>
						</div>

						<div class="form-group">
							<label>ステータス</label>
							<select id="status">
								<option value="1" selected>公開中</option>
								<option value="0">非公開</option>
							</select>
						</div>

						<div class="form-group">
							<label>備考欄</label>
							<textarea id="note" rows="4" placeholder="掲示場所や特記事項などのメモを入力してください。"></textarea>
						</div>

						<div class="form-actions" style="border-top: 1px solid #e2e8f0; padding-top: 15px; margin-top: 25px;">
							<a href="./stocks.html" class="btn btn-secondary">キャンセル</a>
							<button type="submit" class="btn btn-primary">確認</button>
						</div>
					</div>
				</div>
			</form>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/nav.js"></script>
	<script>
		let SESS, BOOK, imageDataUrl = "";

		function showError(msg) {
			const box = document.getElementById("errorBox");
			box.textContent = msg;
			box.style.display = "block";
		}

		TeamI.init().then(() => {
			SESS = TeamI.requireLogin();
			if (!SESS) return;
			TeamINav.render("pops");

			const bookId = Number(new URLSearchParams(location.search).get("bookId"));
			BOOK = TeamI.book(bookId);
			if (!BOOK) {
				showError("対象の書籍が見つかりません。");
				document.getElementById("popForm").style.display = "none";
				return;
			}

			document.getElementById("bookTitle").value = BOOK.title || "";
			document.getElementById("storeName").value = SESS.store ? SESS.store.storeName : "";
			document.getElementById("staffNumber").value = SESS.staff.staffNumber || "";

			const fileInput = document.getElementById("imageFile");
			const imagePreview = document.getElementById("imagePreview");
			const defaultMessage = document.getElementById("defaultMessage");
			const changeMessage = document.getElementById("changeMessage");
			fileInput.addEventListener("change", (event) => {
				const file = event.target.files[0];
				if (file && file.type.startsWith("image/")) {
					const reader = new FileReader();
					reader.onload = (e) => {
						imageDataUrl = e.target.result;
						imagePreview.src = imageDataUrl;
						imagePreview.style.display = "block";
						defaultMessage.style.display = "none";
						changeMessage.style.display = "block";
					};
					reader.readAsDataURL(file);
				}
			});

			document.getElementById("popForm").addEventListener("submit", (e) => {
				e.preventDefault();
				const draft = {
					bookId: BOOK.id,
					bookTitle: BOOK.title,
					storeId: SESS.store ? SESS.store.id : SESS.staff.storeId,
					storeName: SESS.store ? SESS.store.storeName : "",
					contributorType: 1,
					status: Number(document.getElementById("status").value),
					staffId: SESS.staff.id,
					staffNumber: SESS.staff.staffNumber,
					staffName: SESS.staff.name,
					imageUrl: imageDataUrl || "",
					note: document.getElementById("note").value,
				};
				TeamI.setDraft("pop", draft);
				location.href = "./pop-confirm.html";
			});
		});
	</script>
</body>
</html>
