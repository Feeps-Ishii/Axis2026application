<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ情報編集</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Yu Gothic", "Meiryo", sans-serif; }
		body { background: #f4f7fb; color: #333; }
		header { background: #2f6fec; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
		header h1 { font-size: 26px; color: white; }
		.header-right { display: flex; align-items: center; gap: 14px; }
		.header-btn { background: white; color: #2f6fec; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }
		.header-btn:hover { background: #e8efff; }
		.container { width: 95%; max-width: 1200px; margin: 36px auto; }
		.breadcrumb { font-size: 14px; color: #6b7280; margin-bottom: 22px; font-weight: bold; }
		.card { background: white; border-radius: 18px; padding: 30px; margin-bottom: 28px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06); }
		.section-title { font-size: 26px; color: #1f2937; margin-bottom: 24px; }
		.form-grid { display: grid; grid-template-columns: 1fr; gap: 22px; }
		.form-group { display: flex; flex-direction: column; gap: 10px; }
		.form-group label { font-size: 16px; font-weight: bold; color: #374151; }
		.required { color: #dc2626; margin-left: 4px; }
		.form-group input, .form-group select { width: 100%; height: 54px; border: 1px solid #d1d5db; border-radius: 10px; padding: 0 14px; font-size: 15px; background: white; outline: none; }
		.error-msg { color: #dc2626; font-size: 14px; font-weight: bold; }
		.form-group input:hover, .form-group select:hover { border-color: #2f6fec; }
		.form-group input:focus, .form-group select:focus { border-color: #2f6fec; box-shadow: 0 0 0 3px rgba(47, 111, 236, 0.1); }
		.readonly { background: #f3f6fb !important; color: #666; }
		.info-message { font-size: 14px; color: #666; }
		.button-area { display: flex; justify-content: center; gap: 16px; margin-top: 34px; flex-wrap: wrap; }
		.back-btn, .confirm-btn { border: none; padding: 14px 34px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; min-width: 220px; text-decoration: none; text-align: center; }
		.back-btn { background: white; color: #444; border: 1px solid #d1d5db; }
		.back-btn:hover { background: #dce3ec; border-color: #a0aec0; }
		.confirm-btn { background: #2f6fec; color: white; }
		.confirm-btn:hover { background: #1e5ad3; }
	</style>
</head>

<body>
	<header>
		<h1>スタッフ情報編集</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="#" class="header-btn" onclick="TeamB.logout();return false;">ログアウト</a>
		</div>
	</header>

	<div class="container">
		<div class="breadcrumb">管理者TOP ＞ スタッフ一覧 ＞ スタッフ詳細 ＞ スタッフ情報編集</div>

		<div class="card">
			<h2 class="section-title">編集内容入力</h2>

			<form id="editForm" novalidate>
				<div class="form-grid">
					<div class="form-group">
						<label>スタッフID</label>
						<input type="text" id="staffId" class="readonly" readonly>
						<div class="info-message">※ スタッフIDは変更できません</div>
					</div>

					<div class="form-group">
						<label>氏名<span class="required">*</span></label>
						<input type="text" id="name" placeholder="例：佐藤 健一">
						<div class="error-msg" id="err-name"></div>
					</div>

					<div class="form-group">
						<label>所属部署<span class="required">*</span></label>
						<select id="jobType">
							<option value="受付">受付</option>
							<option value="内科">内科</option>
							<option value="小児科">小児科</option>
						</select>
						<div class="error-msg" id="err-jobType"></div>
					</div>

					<div class="form-group">
						<label>権限<span class="required">*</span></label>
						<select id="authorityType">
							<option value="管理者">管理者</option>
							<option value="一般">一般</option>
						</select>
						<div class="error-msg" id="err-authorityType"></div>
					</div>

					<div class="form-group">
						<label>メールアドレス<span class="required">*</span></label>
						<input type="email" id="email" placeholder="例：sato@example.com">
						<div class="error-msg" id="err-email"></div>
					</div>

					<div class="form-group">
						<label>備考</label>
						<input type="text" id="memo" placeholder="特記事項があれば入力">
						<div class="error-msg" id="err-memo"></div>
					</div>
				</div>

				<div class="button-area">
					<a href="#" id="backBtn" class="back-btn">詳細画面へ戻る</a>
					<button type="submit" class="confirm-btn">確認画面へ</button>
				</div>
			</form>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			TeamB.requireStaff();
			const id = new URLSearchParams(location.search).get("id");
			const staff = TeamB.staff(id);
			if (!staff) { location.href = "./staff-list.html"; return; }

			document.getElementById("backBtn").href = "./staff-detail.html?id=" + encodeURIComponent(staff.staffId);

			const draft = TeamB.getDraft("staff-edit");
			const useDraft = draft && String(draft.staffId) === String(staff.staffId);
			const src = useDraft ? draft : staff;

			document.getElementById("staffId").value = staff.staffId;
			document.getElementById("name").value = src.name || "";
			document.getElementById("jobType").value = src.jobType || "受付";
			document.getElementById("authorityType").value = src.authorityType || "管理者";
			document.getElementById("email").value = src.email || "";
			document.getElementById("memo").value = src.memo || "";

			document.getElementById("editForm").addEventListener("submit", (e) => {
				e.preventDefault();
				["name", "jobType", "authorityType", "email", "memo"].forEach((f) => {
					document.getElementById("err-" + f).textContent = "";
				});

				const data = {
					staffId: staff.staffId,
					name: document.getElementById("name").value.trim(),
					jobType: document.getElementById("jobType").value,
					authorityType: document.getElementById("authorityType").value,
					email: document.getElementById("email").value.trim(),
					memo: document.getElementById("memo").value.trim(),
				};

				let ok = true;
				if (!data.name) { document.getElementById("err-name").textContent = "氏名を入力してください"; ok = false; }
				if (!data.jobType) { document.getElementById("err-jobType").textContent = "所属部署を選択してください"; ok = false; }
				if (!data.authorityType) { document.getElementById("err-authorityType").textContent = "権限を選択してください"; ok = false; }
				if (!data.email) {
					document.getElementById("err-email").textContent = "メールアドレスを入力してください"; ok = false;
				} else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(data.email)) {
					document.getElementById("err-email").textContent = "メールアドレスの形式が正しくありません"; ok = false;
				} else if (TeamB.staffs().some((s) => s.email === data.email && String(s.staffId) !== String(staff.staffId))) {
					document.getElementById("err-email").textContent = "そのメールアドレスは既に登録されています"; ok = false;
				}

				if (!ok) return;

				TeamB.setDraft("staff-edit", data);
				location.href = "./staff-edit-confirm.html";
			});
		});
	</script>
</body>

</html>
