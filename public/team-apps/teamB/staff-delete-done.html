<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ削除完了</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Yu Gothic", "Meiryo", sans-serif; }
		body { background: #f4f7fb; color: #333; }
		header { background: #2f6fec; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
		header h1 { font-size: 26px; color: white; }
		.header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
		.header-btn { background: white; color: #2f6fec; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: inline-block; }
		.header-btn:hover { background: #e8efff; }
		.container { width: 95%; max-width: 1200px; margin: 36px auto; }
		.breadcrumb { font-size: 14px; color: #6b7280; margin-bottom: 22px; font-weight: bold; }
		.complete-card { background: #fff7f7; border: 3px solid #fecaca; border-radius: 18px; padding: 54px 34px; text-align: center; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05); }
		.check-icon { width: 96px; height: 96px; border-radius: 50%; border: 6px solid #ef4444; color: #ef4444; display: flex; align-items: center; justify-content: center; font-size: 54px; font-weight: bold; margin: 0 auto 28px; }
		.complete-title { font-size: 34px; font-weight: bold; color: #b91c1c; margin-bottom: 18px; }
		.complete-message { font-size: 18px; line-height: 1.9; color: #7f1d1d; margin-bottom: 36px; font-weight: bold; }
		.summary-box { max-width: 700px; margin: 0 auto 36px; background: white; border-radius: 14px; overflow: hidden; border: 1px solid #e5e7eb; text-align: left; }
		.summary-row { display: flex; border-bottom: 1px solid #e5e7eb; }
		.summary-row:last-child { border-bottom: none; }
		.summary-label { width: 240px; background: #fdecec; color: #7f1d1d; font-weight: bold; padding: 18px; }
		.summary-value { flex: 1; padding: 18px; font-weight: bold; color: #222; }
		.notice-box { max-width: 700px; margin: 0 auto 34px; background: #fff7ed; border: 1px solid #fdba74; border-radius: 12px; padding: 18px; text-align: left; font-size: 15px; line-height: 1.8; color: #9a3412; font-weight: bold; }
		.button-area { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
		.list-btn { border: none; padding: 14px 34px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; min-width: 240px; background: white; color: #444; border: 1px solid #d1d5db; }
		.list-btn:hover { background: #dce3ec; border-color: #a0aec0; }
		@media (max-width: 768px) {
			header { padding: 16px; flex-direction: column; gap: 14px; align-items: flex-start; }
			.header-right { width: 100%; }
			.header-btn { flex: 1; text-align: center; }
			.container { width: 100%; padding: 0 12px; }
			.complete-card { padding: 36px 20px; }
			.complete-title { font-size: 26px; }
			.summary-row { flex-direction: column; }
			.summary-label { width: 100%; }
			.button-area { flex-direction: column; }
			.list-btn { width: 100%; }
		}
	</style>
</head>

<body>
	<header>
		<h1>スタッフ削除完了</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="#" class="header-btn" onclick="TeamB.logout();return false;">ログアウト</a>
		</div>
	</header>

	<div class="container">
		<div class="breadcrumb">管理者TOP ＞ スタッフ一覧 ＞ スタッフ詳細 ＞ スタッフ削除 ＞ 削除確認 ＞ 削除完了</div>

		<div class="complete-card">
			<div class="check-icon">✓</div>
			<div class="complete-title">スタッフアカウントを削除しました</div>
			<p class="complete-message">
				対象スタッフのアカウント削除が完了しました。<br>
				削除されたアカウントでは、システムへログインできません。
			</p>

			<div class="summary-box">
				<div class="summary-row"><div class="summary-label">スタッフID</div><div class="summary-value" id="v-id"></div></div>
				<div class="summary-row"><div class="summary-label">氏名</div><div class="summary-value" id="v-name"></div></div>
				<div class="summary-row"><div class="summary-label">所属部署</div><div class="summary-value" id="v-jobType"></div></div>
				<div class="summary-row"><div class="summary-label">権限</div><div class="summary-value" id="v-authorityType"></div></div>
			</div>

			<div class="notice-box">
				※ 削除されたスタッフ情報は復元できません。<br>
				※ 操作履歴など一部データはシステム内部に保持される場合があります。
			</div>

			<div class="button-area">
				<a href="./staff-list.html" class="list-btn" style="text-decoration: none; color: #444; display: inline-block;">スタッフ一覧へ戻る</a>
			</div>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			TeamB.requireStaff();
			const id = new URLSearchParams(location.search).get("id");
			const draft = TeamB.getDraft("staff-delete");
			const reason = (draft && String(draft.staffId) === String(id)) ? draft.deleteReason : "";

			TeamB.invalidateStaff(id, reason);
			TeamB.clearDraft("staff-delete");

			const staff = TeamB.staff(id);
			if (staff) {
				document.getElementById("v-id").textContent = staff.staffId;
				document.getElementById("v-name").textContent = staff.name || "";
				document.getElementById("v-jobType").textContent = staff.jobType || "";
				document.getElementById("v-authorityType").textContent = staff.authorityType || "";
			}
		});
	</script>
</body>

</html>
