<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>本日の予約一覧・案内順</title>
	<link rel="stylesheet" href="./css/rsv/reservation_now_view.css">
</head>

<body>

	<header>

		<h1>本日の予約一覧</h1>

		<div class="header-right">

			<a href="./admin.html" class="header-btn">
				管理者TOP
			</a>

			<a href="javascript:void(0)" onclick="TeamB.logout()" class="header-btn">
				ログアウト
			</a>

		</div>

	</header>

	<div class="container">

		<div class="breadcrumb">
			管理者TOP ＞ 予約管理 ＞ 本日の予約一覧・案内順
		</div>

		<div id="statusMessageBox" class="status-message-box">

			<div class="status-message-inner">

				<div class="status-message-header">

					<div class="status-message-title">
						予約状態を変更する操作を選択してください
					</div>

					<div id="statusMessageTarget" class="status-message-target">
						対象予約：未選択
					</div>

				</div>

				<div class="status-message-actions">

					<button type="button" class="status-tab-btn status-tab-unaccepted"
						onclick="applyStatus('未受付')">
						未受付
					</button>

					<button type="button" class="status-tab-btn status-tab-received"
						onclick="applyStatus('受付済')">
						受付済
					</button>

					<button type="button" class="status-tab-btn status-tab-guided"
						onclick="applyStatus('案内済')">
						案内済
					</button>

					<button type="button" class="status-tab-btn status-tab-absent"
						onclick="applyStatus('不在')">
						不在
					</button>

					<button type="button" class="status-tab-btn status-tab-cancel"
						onclick="applyStatus('キャンセル')">
						キャンセル
					</button>

				</div>

				<button type="button" class="status-message-close" onclick="closeStatusMessageBox()">
					閉じる
				</button>

			</div>

		</div>

		<div class="card">

			<h2 class="section-title">
				本日の予約検索
			</h2>

			<form id="searchForm">

				<div class="search-grid">

					<div class="form-group">
						<label>患者名</label>
						<input type="text" name="patientName" placeholder="患者名を入力">
					</div>

					<div class="form-group">
						<label>診察券番号</label>
						<input type="text" name="cardNo" placeholder="12345">
					</div>

					<div class="form-group">

						<label>診療科</label>

						<select name="departmentName">

							<option value="">
								すべて
							</option>

							<option value="内科">
								内科
							</option>

							<option value="小児科">
								小児科
							</option>

							<option value="予防接種">
								予防接種
							</option>

						</select>

					</div>


					<div class="form-group reservation-status-group">

						<label>予約状態</label>

						<div class="status-checkbox-area">

							<label class="status-check-label status-check-all">
								<input type="checkbox" id="checkAllStatus">
								全て
							</label>

							<label class="status-check-label">
								<input type="checkbox" name="reservationStatus" value="未受付" class="status-check">
								未受付
							</label>

							<label class="status-check-label">
								<input type="checkbox" name="reservationStatus" value="受付済" class="status-check">
								受付済
							</label>

							<label class="status-check-label">
								<input type="checkbox" name="reservationStatus" value="案内済" class="status-check">
								案内済
							</label>

							<label class="status-check-label">
								<input type="checkbox" name="reservationStatus" value="不在" class="status-check">
								不在
							</label>

							<label class="status-check-label">
								<input type="checkbox" name="reservationStatus" value="キャンセル" class="status-check">
								キャンセル
							</label>

						</div>

					</div>

				</div>

				<div class="search-btn-area">

					<button type="button" class="clear-btn" onclick="clearSearchCondition()">
					    条件クリア
					</button>

					<button type="submit" class="search-btn">
						検索
					</button>

				</div>

			</form>

		</div>

		<div class="card">

			<div class="section-header">

				<h2 class="section-title">
					本日の案内順・予約一覧
				</h2>

				<div class="section-buttons">

					<button class="register-btn" onclick="location.href='./rsv-list.html'">
						予約一覧へ
					</button>

					<button class="register-btn" onclick="location.href='./rsv-new.html'">
						＋ 予約登録
					</button>

				</div>

			</div>

			<div class="table-wrap">

				<table>

					<thead>
						<tr>
							<th>受付番号</th>
							<th>患者名</th>
							<th>診察券番号</th>
							<th>予約時間</th>
							<th>診療科</th>
							<th>問診票</th>
							<th>予約状態</th>
							<th class="action-col">操作</th>
							<th class="patient-info-col">患者情報</th>
						</tr>
					</thead>

					<tbody id="tableBody"></tbody>

				</table>

			</div>

		</div>

	</div>

	<script src="./js/db.js"></script>
	<script>
		const E = TeamB.esc;

		function statusBadge(status) {
			const map = {
				"未受付": "status-tab-unaccepted",
				"受付済": "status-tab-received",
				"案内済": "status-tab-guided",
				"不在": "status-tab-absent",
				"キャンセル": "status-tab-cancel",
			};
			if (map[status]) {
				return `<span class="status ${map[status]}">${E(status)}</span>`;
			}
			return `<span class="status status-reserved">${E(status)}</span>`;
		}

		function readFilters() {
			const f = {};
			const fd = new FormData(document.getElementById("searchForm"));
			f.patientName = (fd.get("patientName") || "").trim();
			f.cardNo = (fd.get("cardNo") || "").trim();
			f.departmentName = fd.get("departmentName") || "";
			f.statuses = fd.getAll("reservationStatus");
			return f;
		}

		function render() {
			const f = readFilters();
			let rows = TeamB.todayAppointments();
			rows = rows.filter((v) => {
				if (f.patientName && !`${v.patient.lastName}${v.patient.firstName}${v.patient.lastNameKana}${v.patient.firstNameKana}`.includes(f.patientName)) return false;
				if (f.cardNo && !String(v.cardNumber).includes(f.cardNo)) return false;
				if (f.departmentName && v.departmentName !== f.departmentName) return false;
				if (f.statuses.length && !f.statuses.includes(v.status)) return false;
				return true;
			});

			const tbody = document.getElementById("tableBody");
			tbody.innerHTML = rows.map((v) => {
				const qReg = v.questionnaire
					? `<span class="status status-arrived">登録済</span>`
					: `<span class="status status-waiting">未登録</span>`;
				return `
				<tr>
					<td>${E(v.dailyQueueNumber)}</td>
					<td>${E(v.patientName)}</td>
					<td>${E(v.cardNumber)}</td>
					<td>${E(v.appointmentTime)}</td>
					<td>${E(v.departmentName)}</td>
					<td>${qReg}</td>
					<td>${statusBadge(v.status)}</td>
					<td class="action-cell">
						<div class="table-actions">
							<button type="button" class="operation-btn"
								data-appointment-id="${E(v.appointmentId)}"
								data-patient-name="${E(v.patientName)}"
								onclick="openStatusMessageBoxFromButton(this)">
								操作
							</button>
							<button type="button" class="questionnaire-register-btn"
								onclick="location.href='./q-new.html?appointmentId=${E(v.appointmentId)}&from=todayReservation'">
								問診票登録
							</button>
						</div>
					</td>
					<td class="patient-info-cell">
						<div class="patient-info-actions">
							<button class="detail-btn"
								onclick="location.href='./patient-detail.html?id=${E(v.patientId)}'">
								患者詳細
							</button>
							<button class="questionnaire-btn"
								onclick="location.href='./q-new.html?appointmentId=${E(v.appointmentId)}&from=todayReservation'">
								問診票
							</button>
						</div>
					</td>
				</tr>`;
			}).join("");
		}

		let selectedAppointmentId = null;

		function openStatusMessageBox(appointmentId, patientName) {
			selectedAppointmentId = appointmentId;
			document.getElementById("statusMessageTarget").textContent =
				"対象予約：" + appointmentId + "（" + patientName + "）";
			document.getElementById("statusMessageBox").classList.add("is-open");
		}

		function openStatusMessageBoxFromButton(button) {
			openStatusMessageBox(button.dataset.appointmentId, button.dataset.patientName);
		}

		function closeStatusMessageBox() {
			document.getElementById("statusMessageBox").classList.remove("is-open");
		}

		function applyStatus(status) {
			if (selectedAppointmentId == null) return;
			TeamB.updateAppointmentStatus(selectedAppointmentId, status);
			closeStatusMessageBox();
			render();
		}

		function clearSearchCondition() {
			document.querySelector('input[name="patientName"]').value = '';
			document.querySelector('input[name="cardNo"]').value = '';
			document.querySelector('select[name="departmentName"]').value = '';
			document.querySelectorAll('.status-check').forEach((c) => { c.checked = false; });
			const checkAll = document.getElementById('checkAllStatus');
			if (checkAll) checkAll.checked = false;
			render();
		}

		TeamB.init().then(() => {
			if (!TeamB.requireStaff()) return;

			document.getElementById("searchForm").addEventListener("submit", (e) => {
				e.preventDefault();
				render();
			});

			document.getElementById("statusMessageBox").addEventListener("click", function (event) {
				if (event.target === this) closeStatusMessageBox();
			});

			const checkAllStatus = document.getElementById("checkAllStatus");
			const statusChecks = document.querySelectorAll(".status-check");
			if (checkAllStatus) {
				checkAllStatus.addEventListener("change", function () {
					statusChecks.forEach((c) => { c.checked = checkAllStatus.checked; });
				});
				statusChecks.forEach((c) => {
					c.addEventListener("change", function () {
						const checkedCount = document.querySelectorAll(".status-check:checked").length;
						checkAllStatus.checked = checkedCount === statusChecks.length;
					});
				});
			}

			render();
		});
	</script>

</body>

</html>
