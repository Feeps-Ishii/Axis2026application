<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>予約登録</title>
	<link rel="stylesheet" href="./css/rsv/reservation_insert.css">
</head>

<body>

	<header>
		<h1>診療予約管理システム</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="javascript:void(0)" onclick="TeamB.logout()" class="header-btn">ログアウト</a>
		</div>
	</header>

	<div class="container">

		<div class="breadcrumb">
			管理者TOP ＞ 予約管理 ＞ 予約登録
		</div>

		<div class="card">

			<div class="page-title">
				<h2>予約登録</h2>
			</div>

			<div class="message-box">
				電話で受け付けた予約内容を入力してください。<br>
				必須項目を入力後、「内容確認へ」を押してください。
			</div>

			<form id="rsvForm">

				<table class="form-table">

					<tr>
						<th>姓<span class="required">必須</span></th>
						<td>
							<input type="text" name="lastName" required maxlength="50">
						</td>
					</tr>

					<tr>
						<th>名<span class="required">必須</span></th>
						<td>
							<input type="text" name="firstName" required maxlength="50">
						</td>
					</tr>

					<tr>
						<th>セイ<span class="required">必須</span></th>
						<td>
							<input type="text" name="lastNameKana" required maxlength="50">
						</td>
					</tr>

					<tr>
						<th>メイ<span class="required">必須</span></th>
						<td>
							<input type="text" name="firstNameKana" required maxlength="50">
						</td>
					</tr>

					<tr>
						<th>生年月日<span class="required">必須</span></th>
						<td>
							<input type="date" name="birthday" required>
						</td>
					</tr>

					<tr>
						<th>性別<span class="required">必須</span></th>
						<td>

							<label>
								<input type="radio" name="gender" value="男性" required>
								男性
							</label>

							<label>
								<input type="radio" name="gender" value="女性">
								女性
							</label>

						</td>
					</tr>

					<tr>
						<th>住所<span class="required">必須</span></th>
						<td>
							<input type="text" name="address" required maxlength="255">
						</td>
					</tr>

					<tr>
						<th>電話番号<span class="required">必須</span></th>
						<td>
							<input type="tel" name="phoneNumber" required maxlength="15">
						</td>
					</tr>

					<tr>
						<th>診療科<span class="required">必須</span></th>
						<td>

							<select name="departmentId" id="departmentId" required>

								<option value="">
									選択してください
								</option>

							</select>

						</td>
					</tr>

					<tr>
						<th>症状<span class="required">必須</span></th>
						<td>

							<select name="symptom" required>

								<option value="">
									選択してください
								</option>

								<option value="発熱">
									発熱
								</option>

								<option value="咳">
									咳
								</option>

								<option value="頭痛">
									頭痛
								</option>

								<option value="腹痛">
									腹痛
								</option>

								<option value="その他">
									その他
								</option>

							</select>

						</td>
					</tr>

					<tr>
						<th>症状詳細</th>
						<td>
							<textarea name="symptomDetail" placeholder="症状の詳細を入力してください"
								maxlength="500"></textarea>
						</td>
					</tr>

					<tr>
						<th>
							マイナ保険証連携
							<span class="required">必須</span>
						</th>

						<td>

							<label>
								<input type="radio" name="insurance" value="連携済み" required>
								連携済み
							</label>

							<label>
								<input type="radio" name="insurance" value="未連携">
								未連携
							</label>

						</td>

					</tr>

					<tr>
						<th>
							予防接種希望時間<br>
							<span class="required">
								予防接種以外は選択できません
							</span>
						</th>

						<td>

							<select name="vaccinationTime">

								<option value="">
									選択してください
								</option>

								<option value="09:00">09:00</option>
								<option value="10:00">10:00</option>
								<option value="11:00">11:00</option>
								<option value="15:00">15:00</option>
								<option value="16:00">16:00</option>
								<option value="17:00">17:00</option>

							</select>

						</td>
					</tr>

					<tr>
						<th>予約種別</th>
						<td>

							<select name="reservationType">

								<option value="初診">
									初診
								</option>

								<option value="再診">
									再診
								</option>

							</select>

						</td>
					</tr>

					<tr>
						<th>予約方法</th>
						<td>

							<select name="reservationMethod">

								<option value="電話">
									電話
								</option>

								<option value="窓口">
									窓口
								</option>

							</select>

						</td>
					</tr>

					<tr>
						<th>予約日</th>
						<td>
							<input type="date" name="appointmentDate">
						</td>
					</tr>

					<tr>
						<th>予約時間</th>
						<td>
							<input type="time" name="appointmentTime">
						</td>
					</tr>

					<tr>
						<th>備考</th>
						<td>
							<textarea name="remarks" placeholder="補足事項など" maxlength="500"></textarea>
						</td>
					</tr>

				</table>

				<div class="button-area">

					<button type="button" class="back-btn" onclick="location.href='./rsv-today.html'">
						戻る
					</button>

					<button type="submit" class="confirm-btn">
						内容確認へ
					</button>

				</div>

			</form>

		</div>

	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			if (!TeamB.requireStaff()) return;

			// 診療科プルダウンを有効な診療科で生成
			const sel = document.getElementById("departmentId");
			TeamB.activeDepartments().forEach((d) => {
				const opt = document.createElement("option");
				opt.value = d.departmentId;
				opt.textContent = d.departmentName;
				sel.appendChild(opt);
			});

			// 下書き復元
			const draft = TeamB.getDraft("admin-rsv");
			if (draft) {
				const form = document.getElementById("rsvForm");
				Object.keys(draft).forEach((k) => {
					const els = form.elements[k];
					if (!els) return;
					if (els.length && els[0] && els[0].type === "radio") {
						Array.from(els).forEach((r) => { r.checked = r.value === draft[k]; });
					} else {
						els.value = draft[k];
					}
				});
			}

			document.getElementById("rsvForm").addEventListener("submit", (e) => {
				e.preventDefault();
				const fd = new FormData(e.target);
				const obj = {};
				fd.forEach((v, k) => { obj[k] = v; });
				TeamB.setDraft("admin-rsv", obj);
				location.href = "./rsv-new-confirm.html";
			});
		});
	</script>

</body>

</html>
