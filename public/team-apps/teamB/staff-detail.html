<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ詳細</title>

	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Yu Gothic", "Meiryo", sans-serif; }
		body { background: #f4f7fb; color: #333; }
		header { background: #2f6fec; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
		header h1 { font-size: 26px; color: white; }
		.header-right { display: flex; align-items: center; gap: 14px; }
		.header-btn { background: white; color: #2f6fec; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; }
		.header-btn:hover { background: #eef2ff; color: #1e5ad3; }
		.container { width: 95%; max-width: 1200px; margin: 36px auto; }
		.top-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 26px; flex-wrap: wrap; gap: 14px; }
		.breadcrumb { font-size: 14px; color: #6b7280; margin-bottom: 22px; font-weight: bold; }
		.back-btn { border: 1px solid #d1d5db; background: white; padding: 12px 20px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; color: #444; text-decoration: none; display: inline-block; }
		.back-btn:hover { background: #f3f4f6; border-color: #d1d5db; color: #111; }
		.content-layout { display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
		.profile-card, .detail-card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06); }
		.profile-header { background: linear-gradient(135deg, #2f6fec, #5b8cff); color: white; padding: 32px 24px; text-align: center; }
		.profile-icon { width: 110px; height: 110px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; font-size: 46px; font-weight: bold; margin: 0 auto 18px; border: 4px solid rgba(255, 255, 255, 0.4); }
		.staff-name { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
		.staff-role { display: inline-block; padding: 8px 18px; border-radius: 999px; background: rgba(255, 255, 255, 0.2); font-size: 15px; font-weight: bold; }
		.profile-body { padding: 24px; }
		.status-box { display: flex; justify-content: center; margin-bottom: 24px; }
		.status { padding: 8px 65px; border-radius: 999px; font-size: 15px; font-weight: bold; }
		.status-active { background: #dcfce7; color: #166534; }
		.status-inactive { background: #fee2e2; color: #b91c1c; }
		.button-group { display: flex; flex-direction: column; gap: 12px; }
		.edit-btn, .disable-btn { width: 100%; height: 54px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
		.edit-btn { background: #2f6fec; color: white; }
		.edit-btn:hover { background: #1d52bd; }
		.disable-btn { background: #fee2e2; color: #b91c1c; }
		.disable-btn:hover { background: #fecaca; }
		.detail-card { padding: 30px; }
		.section-title { font-size: 28px; font-weight: bold; margin-bottom: 24px; color: #1f2937; }
		.detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
		.detail-item { border: 1px solid #e5e7eb; border-radius: 14px; padding: 22px; background: #fafcff; }
		.detail-label { font-size: 14px; color: #666; font-weight: bold; margin-bottom: 10px; }
		.detail-value { font-size: 22px; font-weight: bold; color: #222; word-break: break-word; }
		.wide { grid-column: 1 / 3; }
		@media (max-width: 1100px) { .content-layout { grid-template-columns: 1fr; } }
		@media (max-width: 768px) {
			header { padding: 16px; flex-direction: column; gap: 14px; align-items: flex-start; }
			.header-right { width: 100%; }
			.header-btn { flex: 1; text-align: center; }
			.container { width: 100%; padding: 0 12px; }
			.top-area { flex-direction: column; align-items: flex-start; }
			.detail-grid { grid-template-columns: 1fr; }
			.wide { grid-column: auto; }
			.detail-card { padding: 24px; }
			.staff-name { font-size: 24px; }
			.detail-value { font-size: 18px; }
		}
	</style>
</head>

<body>
	<header>
		<h1>スタッフ詳細</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="#" class="header-btn" onclick="TeamB.logout();return false;">ログアウト</a>
		</div>
	</header>

	<div class="container">
		<div class="top-area">
			<div class="breadcrumb">管理者TOP ＞ スタッフ一覧 ＞ スタッフ詳細</div>
			<a href="./staff-list.html" class="back-btn">← スタッフ一覧へ戻る</a>
		</div>
		<div class="content-layout" id="content"></div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			TeamB.requireStaff();
			const id = new URLSearchParams(location.search).get("id");
			const staff = TeamB.staff(id);
			const el = document.getElementById("content");
			if (!staff) {
				el.innerHTML = '<div class="detail-card"><div class="section-title">該当するスタッフが見つかりません</div></div>';
				return;
			}
			const initial = TeamB.esc((staff.name || "").substring(0, 1));
			const memo = (staff.memo != null && staff.memo !== "") ? TeamB.esc(staff.memo) : "-";
			const statusBadge = staff.invalidFlag
				? '<span class="status status-inactive">無効</span>'
				: '<span class="status status-active">有効</span>';
			let actions;
			if (!staff.invalidFlag) {
				actions = `
					<a href="./staff-edit.html?id=${TeamB.esc(staff.staffId)}" class="edit-btn">スタッフ情報編集</a>
					<a href="./staff-delete-confirm.html?id=${TeamB.esc(staff.staffId)}" class="disable-btn" style="text-decoration: none;">アカウント無効化</a>`;
			} else {
				actions = `<div style="text-align: center; color: #b91c1c; font-weight: bold;">※現在このアカウントは無効です</div>`;
			}
			el.innerHTML = `
				<div class="profile-card">
					<div class="profile-header">
						<div class="profile-icon">${initial}</div>
						<div class="staff-name">${TeamB.esc(staff.name)}</div>
						<div class="staff-role">${TeamB.esc(staff.authorityType)}アカウント</div>
					</div>
					<div class="profile-body">
						<div class="status-box">${statusBadge}</div>
						<div class="button-group">${actions}</div>
					</div>
				</div>
				<div class="detail-card">
					<div class="section-title">基本情報</div>
					<div class="detail-grid">
						<div class="detail-item"><div class="detail-label">スタッフID</div><div class="detail-value">${TeamB.esc(staff.staffId)}</div></div>
						<div class="detail-item"><div class="detail-label">氏名</div><div class="detail-value">${TeamB.esc(staff.name)}</div></div>
						<div class="detail-item"><div class="detail-label">所属部署</div><div class="detail-value">${TeamB.esc(staff.jobType)}</div></div>
						<div class="detail-item"><div class="detail-label">権限</div><div class="detail-value">${TeamB.esc(staff.authorityType)}</div></div>
						<div class="detail-item wide"><div class="detail-label">メールアドレス</div><div class="detail-value">${TeamB.esc(staff.email)}</div></div>
						<div class="detail-item wide"><div class="detail-label">備考</div><div class="detail-value">${memo}</div></div>
					</div>
				</div>`;
		});
	</script>
</body>

</html>
