<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ登録確認</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Yu Gothic", "Meiryo", sans-serif; }
		body { background: #f4f7fb; color: #333; }
		header { background: #2f6fec; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
		header h1 { font-size: 26px; color: white; }
		.header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
		.header-btn { background: white; color: #2f6fec; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: inline-block; }
		.header-btn:hover { background: #e8efff; }
		.container { width: 95%; max-width: 1200px; margin: 36px auto; }
		.breadcrumb { font-size: 14px; color: #6b7280; margin-bottom: 22px; font-weight: bold; }
		.card { background: white; border-radius: 18px; padding: 30px; margin-bottom: 28px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06); }
		.section-title { font-size: 26px; color: #1f2937; margin-bottom: 12px; }
		.lead { font-size: 16px; color: #666; margin-bottom: 28px; }
		.confirm-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 22px; }
		.confirm-table th, .confirm-table td { padding: 18px; text-align: left; vertical-align: top; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
		.confirm-table th:last-child, .confirm-table td:last-child { border-right: none; }
		.confirm-table tr:last-child th, .confirm-table tr:last-child td { border-bottom: none; }
		.confirm-table th { width: 260px; background: #edf3ff; color: #1e2937; font-weight: bold; }
		.note { padding: 16px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px; color: #9a3412; font-weight: bold; font-size: 15px; }
		.button-area { display: flex; justify-content: center; gap: 16px; margin-top: 34px; flex-wrap: wrap; }
		.back-btn, .complete-btn { border: none; padding: 14px 34px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; min-width: 220px; text-decoration: none; text-align: center; }
		.back-btn { background: white; color: #444; border: 1px solid #d1d5db; }
		.back-btn:hover { background: #dce3ec; border-color: #a0aec0; }
		.complete-btn { background: #2f6fec; color: white; }
		.complete-btn:hover { background: #1e5ad3; }
	</style>
</head>

<body>
	<header>
		<h1>スタッフ登録確認</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="#" class="header-btn" onclick="TeamB.logout();return false;">ログアウト</a>
		</div>
	</header>

	<div class="container">
		<div class="breadcrumb">管理者TOP ＞ スタッフ一覧 ＞ スタッフ登録 ＞ 登録確認</div>

		<div class="card">
			<h2 class="section-title">登録内容の確認</h2>
			<p class="lead">以下の内容でスタッフ情報を登録します。内容に誤りがないか確認してください。</p>

			<table class="confirm-table">
				<tr><th>氏名</th><td id="v-name"></td></tr>
				<tr><th>所属部署</th><td id="v-jobType"></td></tr>
				<tr><th>権限</th><td id="v-authorityType"></td></tr>
				<tr><th>メールアドレス</th><td id="v-email"></td></tr>
				<tr><th>パスワード</th><td>********</td></tr>
				<tr><th>備考</th><td id="v-memo"></td></tr>
			</table>

			<div class="note">※ パスワードは安全のため、確認画面では伏せ字で表示します。</div>

			<div class="button-area">
				<button type="button" class="back-btn" onclick="location.href='./staff-new.html'">入力画面へ戻る</button>
				<button type="button" id="completeBtn" class="complete-btn">登録する</button>
			</div>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			TeamB.requireStaff();
			const draft = TeamB.getDraft("staff-new");
			if (!draft) { location.href = "./staff-new.html"; return; }

			document.getElementById("v-name").textContent = draft.name || "";
			document.getElementById("v-jobType").textContent = draft.jobType || "";
			document.getElementById("v-authorityType").textContent = draft.authorityType || "";
			document.getElementById("v-email").textContent = draft.email || "";
			document.getElementById("v-memo").textContent = (draft.memo != null && draft.memo !== "") ? draft.memo : "-";

			document.getElementById("completeBtn").addEventListener("click", () => {
				location.href = "./staff-new-done.html";
			});
		});
	</script>
</body>

</html>
