<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ削除確認</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Yu Gothic", "Meiryo", sans-serif; }
		body { background: #f4f7fb; color: #333; }
		header { background: #2f6fec; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
		header h1 { font-size: 26px; color: white; }
		.header-right { display: flex; align-items: center; gap: 14px; }
		.header-btn { background: white; color: #2f6fec; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: inline-block; }
		.header-btn:hover { background: #e8efff; }
		.container { width: 95%; max-width: 1200px; margin: 36px auto; }
		.breadcrumb { font-size: 14px; color: #6b7280; margin-bottom: 22px; font-weight: bold; }
		.card { background: white; border-radius: 18px; padding: 30px; margin-bottom: 28px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06); }
		.section-title { font-size: 26px; color: #1f2937; margin-bottom: 24px; }
		.warning-card { background: #fff1f2; border: 2px solid #fecdd3; border-radius: 18px; padding: 28px; margin-bottom: 28px; }
		.warning-title { font-size: 20px; font-weight: bold; color: #b91c1c; margin-bottom: 12px; }
		.warning-message { font-size: 15px; line-height: 1.6; color: #7f1d1d; }
		.detail-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
		.detail-table th, .detail-table td { padding: 18px; text-align: left; vertical-align: top; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
		.detail-table th:last-child, .detail-table td:last-child { border-right: none; }
		.detail-table tr:last-child th, .detail-table tr:last-child td { border-bottom: none; }
		.detail-table th { width: 260px; background: #edf3ff; color: #1e2937; font-weight: bold; }
		.reason-box { margin-top: 28px; margin-bottom: 24px; }
		.reason-label { display: block; margin-bottom: 12px; font-weight: bold; color: #374151; }
		textarea { width: 100%; min-height: 160px; border: 1px solid #d1d5db; border-radius: 12px; padding: 16px; font-size: 15px; outline: none; }
		textarea:hover { border-color: #2f6fec; }
		textarea:focus { border-color: #2f6fec; box-shadow: 0 0 0 3px rgba(47, 111, 236, 0.1); }
		.notice-box { padding: 18px; border-radius: 12px; background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; font-size: 15px; font-weight: bold; }
		.button-area { display: flex; justify-content: center; gap: 16px; margin-top: 34px; flex-wrap: wrap; }
		.cancel-btn, .delete-btn { border: none; padding: 14px 34px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; min-width: 220px; text-decoration: none; text-align: center; }
		.cancel-btn { background: white; color: #444; border: 1px solid #d1d5db; }
		.cancel-btn:hover { background: #dce3ec; border-color: #a0aec0; }
		.delete-btn { background: #dc2626; color: white; }
		.delete-btn:hover { background: #b91c1c; }
		.err { color: #dc2626; font-size: 14px; margin-left: 5px; font-weight: bold; }
		@media (max-width: 768px) {
			.button-area { flex-direction: column; }
			.cancel-btn, .delete-btn { width: 100%; }
		}
	</style>
</head>

<body>
	<header>
		<h1>スタッフ削除確認</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="#" class="header-btn" onclick="TeamB.logout();return false;">ログアウト</a>
		</div>
	</header>

	<div class="container">
		<div class="breadcrumb">管理者TOP ＞ スタッフ一覧 ＞ スタッフ詳細 ＞ スタッフ削除確認</div>

		<div class="card">
			<h2 class="section-title">削除対象スタッフ情報</h2>

			<div class="warning-card">
				<div class="warning-title">⚠ スタッフアカウントを削除します</div>
				<div class="warning-message">
					削除を実行すると、対象スタッフはシステムへログインできなくなります。<br>
					内容を確認した上で、削除を実行してください。
				</div>
			</div>

			<form id="delForm">
				<table class="detail-table">
					<tr><th>スタッフID</th><td id="v-id"></td></tr>
					<tr><th>氏名</th><td id="v-name"></td></tr>
					<tr><th>所属部署</th><td id="v-jobType"></td></tr>
					<tr><th>メールアドレス</th><td id="v-email"></td></tr>
				</table>

				<div class="reason-box">
					<label class="reason-label">
						削除理由
						<span style="color:#dc2626; margin-left:1px;">*</span>
						<span class="err" id="err-reason"></span>
					</label>
					<textarea id="deleteReason" placeholder="スタッフアカウントを削除する理由を入力してください"></textarea>
				</div>

				<div class="notice-box">
					※ 削除後は元に戻せません。<br>
					※ 削除理由は、監査・履歴確認のために記録されます。
				</div>

				<div class="button-area">
					<a href="#" id="cancelBtn" class="cancel-btn">スタッフ詳細へ戻る</a>
					<button type="submit" class="delete-btn">削除する</button>
				</div>
			</form>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			TeamB.requireStaff();
			const id = new URLSearchParams(location.search).get("id");
			const staff = TeamB.staff(id);
			if (!staff) { location.href = "./staff-list.html"; return; }

			document.getElementById("v-id").textContent = staff.staffId;
			document.getElementById("v-name").textContent = staff.name || "";
			document.getElementById("v-jobType").textContent = staff.jobType || "";
			document.getElementById("v-email").textContent = staff.email || "";
			document.getElementById("cancelBtn").href = "./staff-detail.html?id=" + encodeURIComponent(staff.staffId);

			const draft = TeamB.getDraft("staff-delete");
			if (draft && String(draft.staffId) === String(staff.staffId)) {
				document.getElementById("deleteReason").value = draft.deleteReason || "";
			}

			document.getElementById("delForm").addEventListener("submit", (e) => {
				e.preventDefault();
				const reason = document.getElementById("deleteReason").value.trim();
				document.getElementById("err-reason").textContent = "";
				if (!reason) {
					document.getElementById("err-reason").textContent = "削除理由を入力してください";
					return;
				}
				TeamB.setDraft("staff-delete", { staffId: staff.staffId, deleteReason: reason });
				location.href = "./staff-delete-final.html?id=" + encodeURIComponent(staff.staffId);
			});
		});
	</script>
</body>

</html>
