	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			const sess = TeamB.requirePatient();
			if (!sess) return;

			const params = new URLSearchParams(location.search);
			const appointmentId = params.get("appointmentId");
			if (appointmentId) {
				TeamB.cancelAppointment(appointmentId);
			}
		});
	</script>
