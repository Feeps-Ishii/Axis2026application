<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">カルテ登録確認</title>
    <link rel="stylesheet" href="./css/admin/records/confirm.css">
</head>
<body>
    <header>
        <h1>カルテ・患者管理システム</h1>
        <div class="header-right">
            <a href="./admin.html" class="header-btn">管理者TOP</a>
            <a href="javascript:void(0)" class="header-btn" onclick="TeamB.logout()">ログアウト</a>
        </div>
    </header>

    <main class="container">
        <nav class="breadcrumb" id="breadcrumb" aria-label="パンくずリスト">管理者TOP ＞ 患者管理 ＞ カルテ登録確認</nav>

        <section class="card" aria-labelledby="confirmTitle">
            <div class="page-title"><h2 id="confirmTitle">カルテ登録確認</h2></div>
            <div class="message-box">以下の内容で処理を行います。内容に誤りがないか確認してください。</div>

            <table class="confirm-table">
                <tr><th>予約ID</th><td id="v_appointmentId"></td></tr>
                <tr><th>主訴</th><td id="v_chiefComplaint"></td></tr>
                <tr><th>現病歴</th><td id="v_presentIllness"></td></tr>
                <tr><th>誘因</th><td id="v_triggerFactor"></td></tr>
                <tr><th>体温</th><td><span id="v_bodyTemperature"></span> ℃</td></tr>
                <tr><th>血圧</th><td><span id="v_systolicBp"></span> / <span id="v_diastolicBp"></span> mmHg</td></tr>
                <tr><th>脈拍</th><td><span id="v_pulse"></span> 回/分</td></tr>
                <tr><th>SpO2</th><td><span id="v_spo2"></span> %</td></tr>
                <tr><th>身体所見</th><td id="v_physicalExam"></td></tr>
                <tr><th>神経学的所見</th><td id="v_neurologicalExam"></td></tr>
                <tr><th>血液検査</th><td id="v_bloodTest"></td></tr>
                <tr><th>尿検査</th><td id="v_urineTest"></td></tr>
                <tr><th>心電図</th><td id="v_ecg"></td></tr>
                <tr><th>レントゲン</th><td id="v_xray"></td></tr>
                <tr><th>診断名</th><td id="v_diagnosis"></td></tr>
                <tr><th>ICD-10</th><td id="v_icd10Code"></td></tr>
                <tr><th>処方薬</th><td id="v_prescription"></td></tr>
                <tr><th>処置</th><td id="v_treatment"></td></tr>
                <tr><th>次回来院予定日</th><td id="v_nextVisitDate"></td></tr>
                <tr><th>医師メモ</th><td id="v_doctorMemo"></td></tr>
                <tr><th>備考</th><td id="v_memo"></td></tr>
            </table>

            <div class="button-area">
                <button type="button" class="edit-btn" id="editBtn">修正する</button>
                <button type="button" class="submit-btn" id="submitBtn">登録する</button>
            </div>
        </section>
    </main>

    <script src="./js/db.js"></script>
    <script>
        TeamB.init().then(() => {
            const s = TeamB.requireStaff();
            if (!s) return;

            const draft = TeamB.getDraft("record");
            if (!draft) { alert("入力内容が見つかりません。"); location.href = "./admin.html"; return; }

            const mode = draft.mode || "register";
            document.getElementById("pageTitle").textContent = mode === "edit" ? "カルテ編集確認" : "カルテ登録確認";
            document.getElementById("confirmTitle").textContent = mode === "edit" ? "カルテ編集確認" : "カルテ登録確認";
            document.getElementById("breadcrumb").textContent =
                mode === "edit" ? "管理者TOP ＞ 患者管理 ＞ カルテ編集確認" : "管理者TOP ＞ 患者管理 ＞ カルテ登録確認";
            document.getElementById("submitBtn").textContent = mode === "edit" ? "更新する" : "登録する";

            const fields = ["appointmentId", "chiefComplaint", "presentIllness", "triggerFactor",
                "bodyTemperature", "systolicBp", "diastolicBp", "pulse", "spo2", "physicalExam",
                "neurologicalExam", "bloodTest", "urineTest", "ecg", "xray", "diagnosis",
                "icd10Code", "prescription", "treatment", "nextVisitDate", "doctorMemo", "memo"];
            fields.forEach((f) => {
                document.getElementById("v_" + f).textContent = draft[f] == null ? "" : draft[f];
            });

            document.getElementById("editBtn").addEventListener("click", () => {
                // draftは保持したまま入力画面へ戻る
                if (mode === "edit") {
                    location.href = "./record-form.html?recordId=" + encodeURIComponent(draft.recordId);
                } else {
                    const ap = draft.appointmentId ? "?appointmentId=" + encodeURIComponent(draft.appointmentId) : "";
                    location.href = "./record-form.html" + ap;
                }
            });

            document.getElementById("submitBtn").addEventListener("click", () => {
                const payload = {};
                fields.forEach((f) => { payload[f] = draft[f]; });
                let newId;
                if (mode === "edit") {
                    const r = TeamB.updateRecord(draft.recordId, payload);
                    newId = r ? r.recordId : draft.recordId;
                } else {
                    payload.appointmentId = draft.appointmentId;
                    payload.doctorStaffId = TeamB.staffSession().staffId;
                    const r = TeamB.createRecord(payload);
                    newId = r.recordId;
                }
                TeamB.clearDraft("record");
                location.href = "./record-detail.html?id=" + encodeURIComponent(newId);
            });
        });
    </script>
</body>
</html>
