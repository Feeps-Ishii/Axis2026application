<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ削除最終確認</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Yu Gothic", "Meiryo", sans-serif; }
		body { background: #f4f7fb; color: #333; }
		header { background: #2f6fec; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
		header h1 { font-size: 26px; color: white; }
		.header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
		.header-btn { background: white; color: #2f6fec; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: inline-block; }
		.header-btn:hover { background: #e8efff; }
		.container { width: 95%; max-width: 1200px; margin: 36px auto; }
		.breadcrumb { font-size: 14px; color: #6b7280; margin-bottom: 22px; font-weight: bold; }
		.confirm-card { background: #fff7f7; border: 3px solid #ef4444; border-radius: 18px; padding: 42px 32px; text-align: center; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05); }
		.warning-icon { width: 96px; height: 96px; border-radius: 50%; background: #fee2e2; color: #dc2626; display: flex; align-items: center; justify-content: center; font-size: 58px; font-weight: bold; margin: 0 auto 24px; border: 4px solid #fecaca; }
		.confirm-title { font-size: 32px; font-weight: bold; color: #b91c1c; margin-bottom: 18px; }
		.confirm-message { font-size: 18px; line-height: 1.8; color: #7f1d1d; margin-bottom: 34px; font-weight: bold; }
		.target-box { max-width: 700px; margin: 0 auto 34px; background: white; border-radius: 14px; overflow: hidden; border: 1px solid #e5e7eb; text-align: left; }
		.target-row { display: flex; border-bottom: 1px solid #e5e7eb; }
		.target-row:last-child { border-bottom: none; }
		.target-label { width: 240px; background: #fdecec; color: #7f1d1d; font-weight: bold; padding: 18px; }
		.target-value { flex: 1; padding: 18px; font-weight: bold; color: #222; }
		.final-check { max-width: 700px; margin: 0 auto 36px; background: #fffbeb; border: 1px solid #facc15; border-radius: 12px; padding: 18px; text-align: left; font-size: 15px; line-height: 1.8; color: #854d0e; font-weight: bold; }
		.button-area { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
		.back-btn, .delete-btn { border: none; padding: 14px 34px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; min-width: 240px; }
		.back-btn { background: white; color: #444; border: 1px solid #d1d5db; }
		.back-btn:hover { background: #dce3ec; border-color: #a0aec0; }
		.delete-btn { background: #dc2626; color: white; }
		.delete-btn:hover { background: #b91c1c; }
		@media (max-width: 768px) {
			header { padding: 16px; flex-direction: column; gap: 14px; align-items: flex-start; }
			.header-right { width: 100%; }
			.header-btn { flex: 1; text-align: center; }
			.container { width: 100%; padding: 0 12px; }
			.confirm-card { padding: 32px 20px; }
			.confirm-title { font-size: 26px; }
			.target-row { flex-direction: column; }
			.target-label { width: 100%; }
			.button-area { flex-direction: column; }
			.back-btn, .delete-btn { width: 100%; }
		}
	</style>
</head>

<body>
	<header>
		<h1>スタッフ削除最終確認</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="#" class="header-btn" onclick="TeamB.logout();return false;">ログアウト</a>
		</div>
	</header>

	<div class="container">
		<div class="breadcrumb">管理者TOP ＞ スタッフ一覧 ＞ スタッフ詳細 ＞ スタッフ削除 ＞ 削除確認</div>

		<div class="confirm-card">
			<div class="warning-icon">!</div>
			<div class="confirm-title">本当に削除してよろしいですか？</div>
			<p class="confirm-message">
				以下のスタッフアカウントを削除します。<br>
				削除後、このスタッフはログインできなくなります。
			</p>

			<div class="target-box">
				<div class="target-row"><div class="target-label">スタッフID</div><div class="target-value" id="v-id"></div></div>
				<div class="target-row"><div class="target-label">氏名</div><div class="target-value" id="v-name"></div></div>
				<div class="target-row"><div class="target-label">所属部署</div><div class="target-value" id="v-jobType"></div></div>
				<div class="target-row"><div class="target-label">権限</div><div class="target-value" id="v-authorityType"></div></div>
				<div class="target-row"><div class="target-label">メールアドレス</div><div class="target-value" id="v-email"></div></div>
			</div>

			<div class="final-check">
				※ この操作は取り消せません。<br>
				※ 管理者アカウントを削除する場合は、他に管理者権限を持つスタッフが存在することを確認してください。
			</div>

			<div class="button-area">
				<a href="#" id="backBtn" class="back-btn" style="text-decoration: none; color: #444; display: inline-block;">削除画面へ戻る</a>
				<button type="button" id="deleteBtn" class="delete-btn">完全に削除する</button>
			</div>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			TeamB.requireStaff();
			const id = new URLSearchParams(location.search).get("id");
			const staff = TeamB.staff(id);
			if (!staff) { location.href = "./staff-list.html"; return; }

			const draft = TeamB.getDraft("staff-delete");
			if (!draft || String(draft.staffId) !== String(staff.staffId)) {
				location.href = "./staff-delete-confirm.html?id=" + encodeURIComponent(staff.staffId);
				return;
			}

			document.getElementById("v-id").textContent = staff.staffId;
			document.getElementById("v-name").textContent = staff.name || "";
			document.getElementById("v-jobType").textContent = staff.jobType || "";
			document.getElementById("v-authorityType").textContent = staff.authorityType || "";
			document.getElementById("v-email").textContent = staff.email || "";
			document.getElementById("backBtn").href = "./staff-delete-confirm.html?id=" + encodeURIComponent(staff.staffId);

			document.getElementById("deleteBtn").addEventListener("click", () => {
				location.href = "./staff-delete-done.html?id=" + encodeURIComponent(staff.staffId);
			});
		});
	</script>
</body>

</html>
