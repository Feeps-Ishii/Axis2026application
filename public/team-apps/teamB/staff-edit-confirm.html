<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>スタッフ情報編集確認</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Yu Gothic", "Meiryo", sans-serif; }
		body { background: #f4f7fb; color: #333; }
		header { background: #2f6fec; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
		header h1 { font-size: 26px; color: white; }
		.header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
		.header-btn { background: white; color: #2f6fec; text-decoration: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: inline-block; }
		.header-btn:hover { background: #e8efff; }
		.container { width: 95%; max-width: 1200px; margin: 36px auto; }
		.breadcrumb { font-size: 14px; color: #6b7280; margin-bottom: 22px; font-weight: bold; }
		.card { background: white; border-radius: 18px; padding: 30px; margin-bottom: 28px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06); }
		.section-title { font-size: 26px; color: #1f2937; margin-bottom: 12px; }
		.lead { font-size: 16px; color: #666; margin-bottom: 28px; }
		.confirm-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
		.confirm-table th, .confirm-table td { padding: 18px; text-align: left; vertical-align: top; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
		.confirm-table th:last-child, .confirm-table td:last-child { border-right: none; }
		.confirm-table tr:last-child th, .confirm-table tr:last-child td { border-bottom: none; }
		.confirm-table th { width: 260px; background: #edf3ff; color: #1e2937; font-weight: bold; }
		.button-area { display: flex; justify-content: center; gap: 16px; margin-top: 34px; flex-wrap: wrap; }
		.back-btn, .update-btn { border: none; padding: 14px 34px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; min-width: 220px; text-decoration: none; text-align: center; }
		.back-btn { background: white; color: #444; border: 1px solid #d1d5db; }
		.back-btn:hover { background: #dce3ec; border-color: #a0aec0; }
		.update-btn { background: #2f6fec; color: white; }
		.update-btn:hover { background: #1e5ad3; }
		@media (max-width: 768px) {
			header { padding: 16px; flex-direction: column; gap: 14px; align-items: flex-start; }
			.container { width: 100%; padding: 0 12px; }
			.card { padding: 24px; }
			.confirm-table th, .confirm-table td { display: block; width: 100%; }
			.confirm-table th { border-bottom: 1px solid #dbe4f1; }
			.button-area { flex-direction: column; }
			.back-btn, .update-btn { width: 100%; }
		}
		.changed { color: #2f6fec; font-weight: bold; }
	</style>
</head>

<body>
	<header>
		<h1>スタッフ情報編集確認</h1>
		<div class="header-right">
			<a href="./admin.html" class="header-btn">管理者TOP</a>
			<a href="#" class="header-btn" onclick="TeamB.logout();return false;">ログアウト</a>
		</div>
	</header>

	<div class="container">
		<div class="breadcrumb">管理者TOP ＞ スタッフ一覧 ＞ スタッフ詳細 ＞ スタッフ情報編集 ＞ 編集確認</div>

		<div class="card">
			<h2 class="section-title">編集内容の確認</h2>
			<p class="lead">以下の内容でスタッフ情報を更新します。内容に誤りがないか確認してください。</p>

			<table class="confirm-table">
				<tr><th>スタッフID</th><td id="v-id"></td></tr>
				<tr><th>氏名</th><td><span id="v-name"></span></td></tr>
				<tr><th>所属部署</th><td><span id="v-jobType"></span></td></tr>
				<tr><th>権限</th><td><span id="v-authorityType"></span></td></tr>
				<tr><th>メールアドレス</th><td><span id="v-email"></span></td></tr>
				<tr><th>備考</th><td><span id="v-memo"></span></td></tr>
			</table>

			<div class="button-area">
				<a href="#" id="backBtn" class="back-btn">編集画面へ戻る</a>
				<button type="button" id="updateBtn" class="update-btn">更新する</button>
			</div>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {
			TeamB.requireStaff();
			const draft = TeamB.getDraft("staff-edit");
			if (!draft) { location.href = "./staff-list.html"; return; }

			const original = TeamB.staff(draft.staffId);
			if (!original) { location.href = "./staff-list.html"; return; }

			document.getElementById("backBtn").href = "./staff-edit.html?id=" + encodeURIComponent(draft.staffId);

			const changed = TeamB.getChangedItems(original, draft, ["name", "jobType", "authorityType", "email", "memo"]);

			document.getElementById("v-id").textContent = draft.staffId;

			function set(id, field, value) {
				const span = document.getElementById(id);
				span.textContent = value;
				if (changed[field]) span.classList.add("changed");
			}
			set("v-name", "name", draft.name || "");
			set("v-jobType", "jobType", draft.jobType || "");
			set("v-authorityType", "authorityType", draft.authorityType || "");
			set("v-email", "email", draft.email || "");
			set("v-memo", "memo", (draft.memo != null && draft.memo !== "") ? draft.memo : "-");

			document.getElementById("updateBtn").addEventListener("click", () => {
				location.href = "./staff-edit-done.html";
			});
		});
	</script>
</body>

</html>
