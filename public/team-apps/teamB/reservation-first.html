<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>初診予約入力</title>
	<link rel="stylesheet" href="./css/rsv/user_reservation.css">
</head>

<body>

	<header>

		<h1>初診予約入力</h1>

		<nav>
			<a href="./reservationTop.html">
				予約・問診トップへ戻る
			</a>
		</nav>

	</header>

	<hr>

	<main>

		<section>

			<h2>予約情報入力</h2>


			<form id="reservationForm" method="post">

				<input type="hidden" name="reservationType" value="初診">

				<p>
					<label for="lastName">
						姓<span class="required">必須</span>
					</label>
					<input type="text" name="lastName" id="lastName" placeholder="例：山田" required
						maxlength="50">

					<label for="firstName">
						名<span class="required">必須</span>
					</label>
					<input type="text" name="firstName" id="firstName" placeholder="例：太郎"
						required maxlength="50">
				</p>

				<br>
				<br>

				<p>
					<label for="lastNameKana">
						セイ<span class="required">必須</span>
					</label>
					<input type="text" name="lastNameKana" id="lastNameKana"
						placeholder="例：ヤマダ" required maxlength="50">

					<label for="firstNameKana">
						メイ<span class="required">必須</span>
					</label>
					<input type="text" name="firstNameKana" id="firstNameKana"
						placeholder="例：タロウ" required maxlength="50">
				</p>

				<br>
				<br>

				<p>
					<label for="birthday">
						生年月日<span class="required">必須</span>
					</label>
				</p>

				<input type="date" name="birthday" id="birthday" required>

				<br>
				<br>
				<p>
					性別<span class="required">必須</span>
				</p>

				<input type="radio" name="gender" id="male" value="male" required>
				<label for="male">男性</label>

				&nbsp;&nbsp;&nbsp; <input type="radio" name="gender" id="female" value="female">
				<label for="female">女性</label>

				<br>
				<br>
				<p>
					<label for="address">
						住所<span class="required">必須</span>
					</label>
				</p>

				<input type="text" name="address" id="address" size="50" placeholder="東京都〇〇区〇〇"
					required maxlength="255">

				<br>
				<br>

				<p>
					<label for="phoneNumber">
						電話番号<span class="required">必須</span>
					</label>
				</p>

				<input type="tel" name="phoneNumber" id="phoneNumber"
					placeholder="09012345678" required maxlength="15" pattern="^[0-9\-]+$"
					title="半角数字とハイフンのみで入力してください。">

				<br>
				<br>

				<p>
					<label for="departmentId">
						受診科<span class="required">必須</span>
					</label>
				</p>

				<select name="departmentId" id="departmentId" required>

					<option value="">
						選択してください
					</option>

				</select>

				<br>
				<br>

				<p>
					<label for="symptom">
						症状<span class="required">必須</span>
					</label>
				</p>

				<select name="symptom" id="symptom">

					<option value="">
						選択してください
					</option>

					<option value="発熱">
						発熱
					</option>

					<option value="咳">
						咳
					</option>

					<option value="頭痛">
						頭痛
					</option>

					<option value="腹痛">
						腹痛
					</option>

					<option value="その他">
						その他
					</option>

				</select>

				<br>
				<br>

				<p>
					<label for="symptomDetail">
						症状詳細
					</label>
				</p>

				<textarea name="symptomDetail" id="symptomDetail" rows="5" cols="40"
					maxlength="500"></textarea>

				<br>
				<br>

				<p>
					マイナ保険証連携<span class="required">必須</span>
				</p>

				<input type="radio" name="insurance" id="linked" value="linked">

				<label for="linked">
					連携済み
				</label>

				<br>

				<input type="radio" name="insurance" id="notLinked" value="notLinked">

				<label for="notLinked">
					未連携
				</label>

				<br>
				<br>


				<p>
					<label for="vaccinationTime">
						予防接種希望時間
					</label>
				</p>

				<select name="vaccinationTime" id="vaccinationTime">

					<option value="">
						選択してください
					</option>

					<option value="09:00">
						09:00
					</option>

					<option value="10:00">
						10:00
					</option>

					<option value="11:00">
						11:00
					</option>

					<option value="15:00">
						15:00
					</option>

					<option value="16:00">
						16:00
					</option>

					<option value="17:00">
						17:00
					</option>

				</select>

				<br>
				<br>
				<p>
					<label for="remarks">
						備考
					</label>
				</p>

				<textarea name="remarks" id="remarks" rows="4" cols="40" placeholder="補足事項など"
					maxlength="500"></textarea>

				<br>
				<br>
				<input type="submit" value="予約確認へ進む">

			</form>

		</section>

	</main>

	<hr>

	<footer>

		<p>
			© 2026 さくら野診療所
		</p>

	</footer>

	<script src="./js/db.js"></script>
	<script>
		TeamB.init().then(() => {

			// 診療科プルダウン（有効な科のみ）
			const sel = document.getElementById("departmentId");
			TeamB.activeDepartments().forEach((d) => {
				const o = document.createElement("option");
				o.value = d.departmentId;
				o.textContent = d.departmentName;
				sel.appendChild(o);
			});

			// 入力値の復元（戻ってきた場合）
			const prev = TeamB.getDraft("reservation");
			if (prev && prev.reservationType === "初診") {
				["lastName", "firstName", "lastNameKana", "firstNameKana", "birthday",
					"address", "phoneNumber", "departmentId", "symptom", "symptomDetail",
					"vaccinationTime", "remarks"].forEach((k) => {
						const el = document.getElementById(k);
						if (el && prev[k] != null) el.value = prev[k];
					});
				if (prev.gender) {
					const g = document.querySelector(`input[name="gender"][value="${prev.gender}"]`);
					if (g) g.checked = true;
				}
				if (prev.insurance) {
					const i = document.querySelector(`input[name="insurance"][value="${prev.insurance}"]`);
					if (i) i.checked = true;
				}
			}

			document.getElementById("reservationForm").addEventListener("submit", (e) => {
				e.preventDefault();
				const f = e.target;
				const gender = (f.querySelector('input[name="gender"]:checked') || {}).value || "";
				const insurance = (f.querySelector('input[name="insurance"]:checked') || {}).value || "";
				const draft = {
					reservationType: "初診",
					reservationMethod: "Web",
					lastName: f.lastName.value.trim(),
					firstName: f.firstName.value.trim(),
					lastNameKana: f.lastNameKana.value.trim(),
					firstNameKana: f.firstNameKana.value.trim(),
					birthday: f.birthday.value,
					gender: gender,
					address: f.address.value.trim(),
					phoneNumber: f.phoneNumber.value.trim(),
					departmentId: f.departmentId.value,
					symptom: f.symptom.value,
					symptomDetail: f.symptomDetail.value.trim(),
					insurance: insurance,
					vaccinationTime: f.vaccinationTime.value,
					remarks: f.remarks.value.trim(),
				};
				TeamB.setDraft("reservation", draft);
				location.href = "./reservation-confirm.html";
			});

		});
	</script>

</body>

</html>
