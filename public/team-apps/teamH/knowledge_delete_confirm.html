<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>技能継承の削除（ステップ2/2）</title>

	<link rel="stylesheet" href="./css/common.css">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
			background: #f4f7fb;
			color: #1f2937;
		}

		a {
			text-decoration: none;
			color: inherit;
		}

		.main {
			flex: 1;
			padding: 32px;
		}

		/* ページタイトル */
		.page-title {
			font-size: 28px;
			font-weight: bold;
			color: #102a43;
			margin: 0 0 24px 0;
			display: flex;
			align-items: center;
		}

		.page-title::before {
			content: '';
			display: inline-block;
			width: 5px;
			height: 32px;
			background: #e53e3e;
			border-radius: 3px;
			margin-right: 12px;
		}

		/* 警告メッセージ */
		.warning {
			background: #fef2f2;
			border: 1px solid #fecaca;
			color: #991b1b;
			padding: 15px;
			border-radius: 8px;
			font-size: 14px;
			font-weight: bold;
			margin-bottom: 24px;
		}

		/* カード */
		.card {
			background: #fff;
			border: 1px solid #d9e2ec;
			border-radius: 14px;
			padding: 24px;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
		}

		.card-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			border-bottom: 2px solid #d9e2ec;
			padding-bottom: 12px;
			margin-bottom: 20px;
		}

		.card-header-title {
			font-size: 18px;
			font-weight: bold;
			color: #102a43;
		}

		.card-header-meta {
			text-align: right;
			font-size: 13px;
			color: #627d98;
			line-height: 1.6;
		}

		/* テーブル */
		table {
			width: 100%;
			border-collapse: collapse;
			margin-bottom: 20px;
		}

		th,
		td {
			border-bottom: 1px solid #e5eaf0;
			padding: 12px 14px;
			font-size: 14px;
			text-align: left;
			vertical-align: top;
		}

		th {
			background: #f0f4f8;
			color: #334e68;
			font-weight: bold;
			width: 20%;
		}

		/* 同意チェックボックスエリア */
		.agree-box {
			margin: 24px 0;
			padding: 14px;
			background: #fff5f5;
			border: 1px solid #fecaca;
			border-radius: 8px;
		}

		.agree-box label {
			cursor: pointer;
			display: flex;
			align-items: center;
			gap: 10px;
			font-weight: bold;
			color: #991b1b;
			font-size: 14px;
		}

		.agree-box input[type="checkbox"] {
			width: 18px;
			height: 18px;
			cursor: pointer;
		}

		/* ボタン */
		.button-area {
			display: flex;
			gap: 12px;
			margin-top: 24px;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 10px 20px;
			border-radius: 8px;
			border: 1px solid #bcccdc;
			background: #fff;
			color: #334e68;
			font-weight: bold;
			font-size: 14px;
			cursor: pointer;
			text-decoration: none;
			font-family: inherit;
		}

		.btn:hover {
			background: #f0f4f8;
		}

		.btn.danger {
			background: #b91c1c;
			color: #fff;
			border-color: #b91c1c;
			opacity: 0.5;
			pointer-events: none;
			cursor: not-allowed;
		}

		.btn.danger.active {
			opacity: 1;
			pointer-events: auto;
			cursor: pointer;
		}

		.btn.danger.active:hover {
			background: #991b1b;
		}
	</style>
</head>


<body>

	<div id="teamH-header"></div>

	<div class="layout">

		<div id="teamH-sidebar"></div>

		<main class="main">

			<h1 class="page-title">技能継承の削除（ステップ2/2）</h1>

			<div class="warning">
				⚠️ 警告：この操作は取り消せません。本当に以下のコンテンツを削除しますか？
			</div>

			<div class="card" id="card"></div>

		</main>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		const E = (s) => TeamH.esc(s);

		function toggleDeleteButton() {
			const checkbox = document.getElementById('delete-checkbox');
			const deleteBtn = document.getElementById('delete-btn');
			if (checkbox.checked) {
				deleteBtn.classList.add('active');
			} else {
				deleteBtn.classList.remove('active');
			}
		}

		TeamH.init().then(function () {
			const sess = TeamH.requireLogin();
			if (!sess) return;
			if (sess.role !== "admin") {
				location.href = "./no_permission.html?message=" + encodeURIComponent("技能継承を削除する権限がありません。") +
					"&backUrl=" + encodeURIComponent("./knowledge_list.html");
				return;
			}
			TeamHNav.render("knowledge");

			const id = new URLSearchParams(location.search).get("id");
			const skill = TeamH.skillContent(id);
			if (!skill) { location.href = "./knowledge_list.html"; return; }

			document.getElementById("card").innerHTML = `
				<div class="card-header">
					<div class="card-header-title">削除対象の技能継承概要</div>
					<div class="card-header-meta">
						<div>登録者：<span>${E(skill.registeredByName)}</span></div>
						<div>登録日時：<span>${E(TeamH.fmtDateTime(skill.createdAt))}</span></div>
					</div>
				</div>
				<table>
					<tr><th>タイトル</th><td>${E(skill.title)}</td></tr>
					<tr><th>対象部品</th><td>${E(skill.targetPart)}</td></tr>
					<tr><th>対象工程</th><td>${E(skill.targetProcess)}</td></tr>
					<tr><th>説明</th><td style="white-space: pre-wrap;">${E(skill.description)}</td></tr>
					<tr><th>作業内容</th><td style="white-space: pre-wrap;">${E(skill.workContent)}</td></tr>
					<tr><th>注意事項</th><td style="white-space: pre-wrap;">${E(skill.notes)}</td></tr>
				</table>
				<div class="agree-box">
					<label>
						<input type="checkbox" id="delete-checkbox" onchange="toggleDeleteButton()">
						上記のコンテンツを完全に削除することに同意します。
					</label>
				</div>
				<div class="button-area">
					<button type="button" id="delete-btn" class="btn danger">本当に削除する</button>
					<a class="btn" href="./knowledge_delete.html?id=${E(skill.skillContentsId)}">戻る</a>
				</div>`;

			document.getElementById("delete-btn").addEventListener("click", function () {
				TeamH.deleteSkillContent(id);
				location.href = "./complete.html?type=delete";
			});
		});
	</script>

</body>

</html>
