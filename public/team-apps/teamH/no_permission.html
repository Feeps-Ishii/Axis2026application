<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>権限エラー</title>

	<link rel="stylesheet" href="./css/common.css">

	<style>
		body {
			margin: 0;
			font-family: "Yu Gothic", Meiryo, sans-serif;
			background: #f4f7fb;
			color: #1f2937;
		}

		.error-layout {
			min-height: calc(100vh - 64px);
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.card {
			width: 520px;
			background: white;
			border: 1px solid #d9e2ec;
			border-radius: 14px;
			padding: 48px 36px;
			text-align: center;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
		}

		.error-icon { font-size: 48px; margin-bottom: 20px; }
		.title { font-size: 24px; font-weight: bold; color: #102a43; margin-bottom: 16px; }
		.message { color: #627d98; margin-bottom: 32px; line-height: 1.8; font-size: 14px; }

		.btn {
			display: inline-flex; align-items: center; gap: 6px;
			padding: 12px 24px; border-radius: 8px; background: #153e75;
			color: white; font-weight: bold; font-size: 14px;
			text-decoration: none; border: none; cursor: pointer;
		}
		.btn:hover { background: #102a43; }
	</style>
</head>

<body>

	<div id="teamH-header"></div>

	<div class="error-layout">
		<div class="card">
			<div class="error-icon">🚫</div>
			<div class="title">権限がありません</div>
			<p class="message" id="message">権限がないため、この画面には入れません。</p>
			<a class="btn" id="backLink" href="./knowledge_list.html">戻る</a>
		</div>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		TeamH.init().then(function () {
			const sess = TeamH.requireLogin();
			if (!sess) return;
			TeamHNav.render("");
			const params = new URLSearchParams(location.search);
			if (params.get("message")) document.getElementById("message").textContent = params.get("message");
			if (params.get("backUrl")) document.getElementById("backLink").href = params.get("backUrl");
		});
	</script>

</body>

</html>
