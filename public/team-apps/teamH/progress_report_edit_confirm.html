<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>進捗管理書編集確認</title>

	<link rel="stylesheet" href="./css/common.css">

	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
			background: #f0f4f8;
			color: #1f2937;
		}

		a {
			text-decoration: none;
			color: inherit;
		}

		.main {
			flex: 1;
			padding: 32px;
		}

		/* ページタイトル */
		.page-title {
			font-size: 28px;
			font-weight: bold;
			color: #102a43;
			margin: 0 0 24px 0;
			display: flex;
			align-items: center;
		}

		.page-title::before {
			content: '';
			display: inline-block;
			width: 5px;
			height: 32px;
			background: #153e75;
			border-radius: 3px;
			margin-right: 12px;
		}

		/* カード */
		.card {
			background: white;
			border-radius: 14px;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
			border: 1px solid #d9e2ec;
			padding: 24px;
			margin-bottom: 24px;
		}

		.card-title {
			font-size: 18px;
			font-weight: bold;
			color: #102a43;
			margin: 0 0 16px 0;
		}

		.form-row {
			display: flex;
			align-items: center;
			margin-bottom: 16px;
			gap: 16px;
		}

		.form-row label {
			width: 160px;
			font-size: 14px;
			font-weight: bold;
			color: #334e68;
			flex-shrink: 0;
		}

		.form-value {
			font-size: 14px;
			color: #1f2937;
			flex: 1;
			padding: 10px 12px;
			background: #f7fafc;
			border: 1px solid #d9e2ec;
			border-radius: 8px;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 10px 18px;
			border-radius: 8px;
			border: 1px solid #bcccdc;
			background: #fff;
			color: #334e68;
			font-weight: bold;
			font-size: 14px;
			cursor: pointer;
			font-family: inherit;
			text-decoration: none;
		}

		.btn:hover {
			background: #f0f4f8;
		}

		.btn.primary {
			background: #153e75;
			color: #fff;
			border-color: #153e75;
		}

		.btn.primary:hover {
			background: #102a43;
		}

		.button-area {
			margin-top: 24px;
			display: flex;
			gap: 12px;
		}
	</style>
</head>

<body>

	<div id="teamH-header"></div>

	<div class="layout">

		<div id="teamH-sidebar"></div>

		<main class="main">

			<h1 class="page-title">進捗管理書編集確認</h1>

			<div id="content"></div>

		</main>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		const E = (s) => TeamH.esc(s);
		const ST_LABEL = { not_started: "未着手", preparing: "段取り中", processing: "加工中", inspecting: "検査中", completed: "完了" };

		TeamH.init().then(function () {
			const sess = TeamH.requireLogin();
			if (!sess) return;
			if (sess.role !== "admin") { location.href = "./login.html?authError=true"; return; }
			TeamHNav.render("progress");

			const params = new URLSearchParams(location.search);
			const reportId = params.get("reportId");

			const draft = TeamH.getDraft("reportEdit");
			if (!draft) { location.href = "./progress_report_edit.html?reportId=" + reportId; return; }

			const report = TeamH.progressReport(reportId);
			const wo = report ? TeamH.workOrder(report.workOrderId) : null;
			const targetWork = (wo ? wo.orderNo : "") + "　" + (wo ? wo.partName : "");

			const au = TeamH.user(draft.assignedUserId);
			const assignedLabel = au ? (au.loginId + "　" + au.name) : "";
			const statusLabel = ST_LABEL[draft.progressStatus] || draft.progressStatus;

			document.getElementById("content").innerHTML = `
				<div class="card">
					<h2 class="card-title">以下の内容で更新します</h2>

					<div class="form-row">
						<label>対象作業</label>
						<span class="form-value">${E(targetWork)}</span>
					</div>

					<div class="form-row">
						<label>機械番号</label>
						<span class="form-value">${E(draft.machineNoActual)}</span>
					</div>

					<div class="form-row">
						<label>担当者</label>
						<span class="form-value">${E(assignedLabel)}</span>
					</div>

					<div class="form-row">
						<label>ステータス</label>
						<span class="form-value">${E(statusLabel)}</span>
					</div>

					<div class="form-row">
						<label>開始時刻</label>
						<span class="form-value">${E(draft.actualStart)}</span>
					</div>

					<div class="form-row">
						<label>完了予定時刻</label>
						<span class="form-value">${E(draft.progressStatus === "completed" ? draft.actualEnd : draft.expectedEndTime)}</span>
					</div>

					<div class="form-row">
						<label>引継ぎ予定時刻</label>
						<span class="form-value">${E(draft.handoverScheduledAt)}</span>
					</div>

					<div class="form-row">
						<label>引継ぎメモ</label>
						<span class="form-value">${E(draft.comment)}</span>
					</div>

					<div class="button-area">
						<button type="button" class="btn primary" id="confirmBtn">確定</button>
						<a class="btn" href="./progress_report_edit.html?reportId=${E(reportId)}">取り消し</a>
					</div>
				</div>`;

			document.getElementById("confirmBtn").addEventListener("click", function () {
				TeamH.reportUpdate(
					draft.prpId,
					draft.machineNoActual,
					draft.assignedUserId,
					draft.progressStatus,
					draft.actualStart,
					draft.expectedEndTime,
					draft.actualEnd,
					draft.handoverScheduledAt,
					draft.comment
				);
				TeamH.clearDraft("reportEdit");
				location.href = "./complete.html?type=update";
			});
		});
	</script>

</body>

</html>
