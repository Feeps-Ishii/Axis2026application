<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>作業指示書 登録確認</title>

	<link rel="stylesheet" href="./css/common.css">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
			background: #f4f7fb;
			color: #1f2937;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		.main {
			flex: 1;
			padding: 32px;
		}

		/* ページタイトル */
		.page-title {
			font-size: 28px;
			font-weight: bold;
			color: #102a43;
			margin: 0 0 24px 0;
			display: flex;
			align-items: center;
		}

		.page-title::before {
			content: '';
			display: inline-block;
			width: 5px;
			height: 32px;
			background: #153e75;
			border-radius: 3px;
			margin-right: 12px;
		}

		/* カード */
		.card {
			background: #fff;
			border: 1px solid #d9e2ec;
			border-radius: 14px;
			padding: 24px;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
		}

		/* 通知 */
		.alert-notice {
			background: #f0fdf4;
			border: 1px solid #bbf7d0;
			color: #166534;
			padding: 12px 16px;
			border-radius: 8px;
			font-size: 14px;
			margin-bottom: 24px;
		}

		/* 確認グループ */
		.confirm-group {
			margin-bottom: 16px;
			border-bottom: 1px solid #e5eaf0;
			padding-bottom: 12px;
			display: flex;
			align-items: center;
		}

		.confirm-label {
			width: 150px;
			font-weight: bold;
			color: #627d98;
			font-size: 14px;
			flex-shrink: 0;
		}

		.confirm-value {
			font-size: 14px;
			color: #102a43;
			flex: 1;
		}

		.confirm-value.deadline {
			color: #b91c1c;
			font-weight: bold;
		}

		/* 工程タイトル */
		.process-title {
			font-weight: bold;
			color: #153e75;
			margin: 20px 0 12px 0;
			font-size: 14px;
		}

		/* テーブル */
		.table {
			width: 100%;
			border-collapse: collapse;
			background: #fff;
		}

		.table th,
		.table td {
			border-bottom: 1px solid #e5eaf0;
			padding: 12px 10px;
			text-align: left;
			font-size: 14px;
		}

		.table th {
			background: #f0f4f8;
			color: #334e68;
			font-weight: bold;
		}

		/* バッジ */
		.badge {
			display: inline-flex;
			align-items: center;
			padding: 5px 12px;
			border-radius: 999px;
			font-size: 12px;
			font-weight: bold;
		}

		.badge.not-started {
			background: #e5e7eb;
			color: #374151;
		}

		.badge.setup {
			background: #fef3c7;
			color: #92400e;
		}

		.badge.working {
			background: #dbeafe;
			color: #1e40af;
		}

		.badge.inspecting {
			background: #ede9fe;
			color: #5b21b6;
		}

		.badge.done {
			background: #dcfce7;
			color: #166534;
		}

		/* ボタン */
		.button-area {
			display: flex;
			gap: 12px;
			margin-top: 24px;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 10px 18px;
			border-radius: 8px;
			border: 1px solid #bcccdc;
			background: #fff;
			color: #334e68;
			font-weight: bold;
			font-size: 14px;
			cursor: pointer;
			font-family: inherit;
			text-decoration: none;
		}

		.btn:hover {
			background: #f0f4f8;
		}

		.btn.primary {
			background: #153e75;
			color: #fff;
			border-color: #153e75;
		}

		.btn.primary:hover {
			background: #102a43;
		}
	</style>
</head>

<body>

	<div id="teamH-header"></div>

	<div class="layout">

		<div id="teamH-sidebar"></div>

		<main class="main">

			<h1 class="page-title">作業指示書 登録確認</h1>

			<div class="card">

				<div class="alert-notice">
					以下の内容で作業指示書を新規登録します。よろしければ「この内容で登録する」ボタンを押してください。
				</div>

				<div class="confirm-group">
					<div class="confirm-label">受注番号</div>
					<div class="confirm-value" id="cOrderNo"></div>
				</div>

				<div class="confirm-group">
					<div class="confirm-label">部品名</div>
					<div class="confirm-value" id="cPartName"></div>
				</div>

				<div class="confirm-group">
					<div class="confirm-label">数量</div>
					<div class="confirm-value" id="cQuantity"></div>
				</div>

				<div class="confirm-group">
					<div class="confirm-label">客先</div>
					<div class="confirm-value" id="cClientName"></div>
				</div>

				<div class="confirm-group">
					<div class="confirm-label">納期</div>
					<div class="confirm-value deadline" id="cDueDate"></div>
				</div>

				<div class="process-title">設定工程一覧</div>

				<table class="table">
					<thead>
						<tr>
							<th style="text-align: center; width: 60px;">No</th>
							<th>工程名</th>
							<th>機械番号</th>
							<th>担当者</th>
							<th>状態</th>
						</tr>
					</thead>
					<tbody id="processBody"></tbody>
				</table>

				<div class="button-area">
					<button type="button" class="btn primary" id="registerBtn">この内容で登録する</button>
					<a class="btn" href="./work_order_form.html">
						修正する
					</a>
				</div>

			</div>

		</main>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		const E = (s) => TeamH.esc(s);

		function statusBadge(st) {
			switch (st) {
				case "not_started": return '<span class="badge not-started">未着手</span>';
				case "preparing": return '<span class="badge setup">段取り中</span>';
				case "processing": return '<span class="badge working">加工中</span>';
				case "inspecting": return '<span class="badge inspecting">検査中</span>';
				case "completed": return '<span class="badge done">完了</span>';
				default: return E(st);
			}
		}

		TeamH.init().then(function () {
			const sess = TeamH.requireLogin();
			if (!sess) return;
			if (sess.role !== "admin") { location.href = "./login.html?authError=true"; return; }
			TeamHNav.render("workOrders");

			const draft = TeamH.getDraft("workOrder");
			if (!draft || !draft.form) { location.href = "./work_order_form.html"; return; }
			const form = draft.form;
			const processList = draft.processList || [];

			document.getElementById("cOrderNo").textContent = form.orderNo || "";
			document.getElementById("cPartName").textContent = form.partName || "";
			document.getElementById("cQuantity").textContent = form.quantity || "";
			document.getElementById("cClientName").textContent = form.clientName || "";
			document.getElementById("cDueDate").textContent = form.dueDate || "";

			document.getElementById("processBody").innerHTML = processList.map((p) => `<tr>
				<td style="text-align: center;">${E(p.processOrder)}</td>
				<td>${E(p.processName)}</td>
				<td>${E(TeamH.machineNo(p.machineId) || p.machineId)}</td>
				<td>${E(TeamH.userName(p.assignedUserId))}</td>
				<td>${statusBadge(p.processStatus)}</td>
			</tr>`).join("");

			document.getElementById("registerBtn").addEventListener("click", function () {
				TeamH.addWorkOrder(form, processList);
				TeamH.clearDraft("workOrder");
				location.href = "./complete.html?type=create";
			});
		});
	</script>

</body>

</html>
