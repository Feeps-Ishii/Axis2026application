<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>添付資料閲覧</title>

	<link rel="stylesheet" href="./css/common.css">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
			background: #f4f7fb;
			color: #1f2937;
		}

		a {
			text-decoration: none;
			color: inherit;
		}

		.main {
			flex: 1;
			padding: 32px;
		}

		/* ページヘッダー */
		.page-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 24px;
		}

		.page-title {
			font-size: 28px;
			font-weight: bold;
			color: #102a43;
			margin: 0;
			display: flex;
			align-items: center;
		}

		.page-title::before {
			content: '';
			display: inline-block;
			width: 5px;
			height: 32px;
			background: #153e75;
			border-radius: 3px;
			margin-right: 12px;
		}

		/* カード */
		.card {
			background: #fff;
			border: 1px solid #d9e2ec;
			border-radius: 14px;
			padding: 24px;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
			margin-bottom: 20px;
		}

		/* 情報グリッド */
		.info-grid {
			display: grid;
			grid-template-columns: 160px 1fr;
			border: 1px solid #d9e2ec;
			border-radius: 10px;
			overflow: hidden;
			margin-bottom: 20px;
		}

		.info-label {
			background: #f0f4f8;
			font-weight: bold;
			color: #334e68;
			padding: 13px;
			border-bottom: 1px solid #d9e2ec;
			font-size: 14px;
		}

		.info-value {
			padding: 13px;
			border-bottom: 1px solid #d9e2ec;
			word-break: break-all;
			font-size: 14px;
		}

		.info-label:last-of-type,
		.info-value:last-of-type {
			border-bottom: none;
		}

		/* プレビューエリア */
		.preview-area {
			background: #f8fafc;
			border: 1px solid #d9e2ec;
			border-radius: 12px;
			padding: 20px;
			min-height: 120px;
			font-size: 14px;
			color: #627d98;
		}

		/* ボタン */
		.button-area {
			display: flex;
			gap: 12px;
			margin-top: 20px;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 10px 18px;
			border-radius: 8px;
			border: 1px solid #bcccdc;
			background: #fff;
			color: #334e68;
			font-weight: bold;
			font-size: 14px;
			cursor: pointer;
			text-decoration: none;
		}

		.btn:hover {
			background: #f0f4f8;
		}

		.btn.primary {
			background: #153e75;
			color: #fff;
			border-color: #153e75;
		}

		.btn.primary:hover {
			background: #102a43;
		}
	</style>
</head>

<body>

	<div id="teamH-header"></div>

	<div class="layout">

		<div id="teamH-sidebar"></div>

		<main class="main">

			<div class="page-header">
				<h1 class="page-title">添付資料閲覧</h1>
				<a class="btn" href="./knowledge_list.html">一覧へ戻る</a>
			</div>

			<div class="card" id="card"></div>

		</main>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		const E = (s) => TeamH.esc(s);

		TeamH.init().then(function () {
			const sess = TeamH.requireLogin();
			if (!sess) return;
			TeamHNav.render("knowledge");

			const id = new URLSearchParams(location.search).get("id");
			const file = TeamH.skillFile(id);
			if (!file) { location.href = "./knowledge_list.html"; return; }

			document.getElementById("card").innerHTML = `
				<div class="info-grid">
					<div class="info-label">ファイル名</div>
					<div class="info-value">${E(file.fileName)}</div>
					<div class="info-label">ファイル形式</div>
					<div class="info-value">${E(file.fileType)}</div>
					<div class="info-label">保存先</div>
					<div class="info-value">${E(file.filePath)}</div>
				</div>
				<div class="preview-area">
					<p>下の「ファイルを開く」から添付資料を確認してください。</p>
					<div class="button-area">
						<a class="btn primary" href="#" onclick="return false;">ファイルを開く</a>
						<a class="btn" href="./knowledge_detail.html?id=${E(file.skillContentsId)}">コンテンツ詳細へ戻る</a>
					</div>
				</div>`;
		});
	</script>

</body>

</html>
