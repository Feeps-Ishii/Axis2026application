<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー登録確認</title>

    <link rel="stylesheet" href="./css/common.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            background: #f0f4f8;
            color: #1f2937;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .main {
            flex: 1;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            font-weight: bold;
            color: #102a43;
            margin: 0 0 24px 0;
            width: 800px;
        }

        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
            border: 1px solid #d9e2ec;
            padding: 24px;
            max-width: 800px;
            width: 100%;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #102a43;
            margin: 0 0 16px 0;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 16px;
        }

        .form-row label {
            width: 120px;
            font-size: 14px;
            font-weight: bold;
            color: #334e68;
            flex-shrink: 0;
        }

        .form-value {
            font-size: 14px;
            color: #1f2937;
            flex: 1;
            padding: 10px 12px;
            background: #f7fafc;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid #bcccdc;
            background: #fff;
            color: #334e68;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
        }

        .btn:hover {
            background: #f0f4f8;
        }

        .btn.primary {
            background: #153e75;
            color: #fff;
            border-color: #153e75;
        }

        .btn.primary:hover {
            background: #102a43;
        }

        .button-area {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }
    </style>
</head>

<body>

    <div id="teamH-header"></div>

    <div class="layout">

        <div id="teamH-sidebar"></div>

        <main class="main">

            <h1 class="page-title">ユーザー登録確認</h1>

            <div id="content"></div>

        </main>
    </div>

    <script src="./js/db.js"></script>
    <script src="./js/header.js"></script>
    <script>
        const E = (s) => TeamH.esc(s);
        const ROLE_LABEL = { admin: "管理者", craftsman: "職人", sales: "営業" };

        TeamH.init().then(function () {
            const sess = TeamH.requireLogin();
            if (!sess) return;
            if (sess.role !== "admin") { location.href = "./login.html?authError=true"; return; }
            TeamHNav.render("dashboard");

            const draft = TeamH.getDraft("registUser");
            if (!draft) { location.href = "./regist_user.html"; return; }

            const roleLabel = ROLE_LABEL[draft.role] || "";

            document.getElementById("content").innerHTML = `
                <div class="card">
                    <h2 class="card-title">以下の内容で登録します</h2>

                    <div class="form-row">
                        <label>氏名</label>
                        <span class="form-value">${E(draft.name)}</span>
                    </div>

                    <div class="form-row">
                        <label>社員ID</label>
                        <span class="form-value">${E(draft.loginId)}</span>
                    </div>

                    <div class="form-row">
                        <label>パスワード</label>
                        <span class="form-value">********</span>
                    </div>

                    <div class="form-row">
                        <label>権限</label>
                        <span class="form-value">${E(roleLabel)}</span>
                    </div>

                    <div class="button-area">
                        <button type="button" class="btn primary" id="confirmBtn">確定</button>
                        <a class="btn" id="cancelBtn" href="#">取り消し</a>
                    </div>
                </div>`;

            document.getElementById("confirmBtn").addEventListener("click", function () {
                try {
                    TeamH.addUser(draft.name, draft.loginId, draft.password, draft.role);
                } catch (err) {
                    alert(err.message || "この社員IDはすでに使用されています。");
                    location.href = "./regist_user.html";
                    return;
                }
                TeamH.clearDraft("registUser");
                location.href = "./complete.html?type=create";
            });

            document.getElementById("cancelBtn").addEventListener("click", function (e) {
                e.preventDefault();
                TeamH.clearDraft("registUser");
                location.href = "./regist_user.html";
            });
        });
    </script>

</body>

</html>
