<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>技能継承一覧</title>

	<link rel="stylesheet" href="./css/common.css">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
			background: #f4f7fb;
			color: #1f2937;
		}

		a {
			text-decoration: none;
			color: inherit;
		}

		.main {
			flex: 1;
			padding: 32px;
		}

		/* ページヘッダー */
		.page-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 24px;
		}

		.page-title {
			font-size: 28px;
			font-weight: bold;
			color: #102a43;
			margin: 0;
			display: flex;
			align-items: center;
		}

		.page-title::before {
			content: '';
			display: inline-block;
			width: 5px;
			height: 32px;
			background: #153e75;
			border-radius: 3px;
			margin-right: 12px;
		}

		/* 検索フォーム */
		.search-box {
			background: #fff;
			border: 1px solid #d9e2ec;
			border-radius: 14px;
			padding: 18px;
			margin-bottom: 24px;
			display: grid;
			grid-template-columns: 1fr 220px 120px;
			gap: 12px;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
		}

		input,
		select {
			width: 100%;
			padding: 11px 12px;
			border: 1px solid #bcccdc;
			border-radius: 8px;
			font-size: 14px;
			background: #fff;
			font-family: inherit;
		}

		input:focus,
		select:focus {
			border-color: #153e75;
			outline: none;
		}

		/* ボタン */
		.btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 10px 18px;
			border-radius: 8px;
			border: 1px solid #bcccdc;
			background: #fff;
			color: #334e68;
			font-weight: bold;
			font-size: 14px;
			cursor: pointer;
			font-family: inherit;
			text-decoration: none;
			text-align: center;
			justify-content: center;
		}

		.btn:hover {
			background: #f0f4f8;
		}

		.btn.primary {
			background: #153e75;
			color: #fff;
			border-color: #153e75;
		}

		.btn.primary:hover {
			background: #102a43;
		}

		/* カードグリッド */
		.knowledge-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 22px;
		}

		.knowledge-card {
			background: #fff;
			border: 1px solid #d9e2ec;
			border-radius: 14px;
			overflow: hidden;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
			cursor: pointer;
			transition: 0.2s;
		}

		.knowledge-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 10px 24px rgba(16, 42, 67, 0.12);
		}

		.thumbnail {
			height: 150px;
			background: linear-gradient(135deg, #e0ecff, #f8fafc);
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.thumbnail img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.thumb-video,
		.thumb-pdf {
			width: 100%;
			height: 100%;
			border: none;
			object-fit: cover;
			background: #111827;
			pointer-events: none;
		}

		.thumb-video {
			object-fit: cover;
		}

		.file-icon {
			font-size: 48px;
		}

		.file-badge {
			position: absolute;
			top: 12px;
			left: 12px;
			background: #153e75;
			color: #fff;
			font-size: 12px;
			font-weight: bold;
			padding: 6px 10px;
			border-radius: 999px;
		}

		.knowledge-body {
			padding: 18px;
		}

		.knowledge-body h2 {
			margin: 0 0 10px;
			font-size: 17px;
			color: #102a43;
			line-height: 1.4;
		}

		.description {
			font-size: 13px;
			color: #52606d;
			line-height: 1.6;
			height: 42px;
			overflow: hidden;
			margin-bottom: 14px;
		}

		.meta {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 14px;
		}

		.meta span {
			background: #f0f4f8;
			color: #334e68;
			font-size: 12px;
			padding: 6px 9px;
			border-radius: 999px;
		}

		.footer {
			display: flex;
			justify-content: space-between;
			font-size: 13px;
			color: #627d98;
			border-top: 1px solid #e5eaf0;
			padding-top: 12px;
		}

		.empty-card {
			grid-column: 1 / -1;
			background: #fff;
			border: 1px solid #d9e2ec;
			border-radius: 14px;
			padding: 28px;
			text-align: center;
			color: #627d98;
		}

		.process-section {
			margin-bottom: 34px;
		}

		.process-section-title {
			display: flex;
			align-items: center;
			justify-content: space-between;
			background: #153e75;
			color: white;
			font-size: 20px;
			font-weight: bold;
			padding: 14px 18px;
			border-radius: 12px;
			margin-bottom: 16px;
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.12);
		}

		.process-count {
			background: white;
			color: #153e75;
			font-size: 13px;
			padding: 5px 12px;
			border-radius: 999px;
		}

		@media (max-width: 1100px) {
			.knowledge-grid {
				grid-template-columns: repeat(2, 1fr);
			}
		}

		@media (max-width: 700px) {
			.knowledge-grid {
				grid-template-columns: 1fr;
			}
		}

		@media (max-width: 900px) {
			.layout {
				flex-direction: column;
			}

			.sidebar {
				width: 100%;
			}

			.search-box {
				grid-template-columns: 1fr;
			}

			.page-header {
				flex-direction: column;
				align-items: flex-start;
				gap: 12px;
			}
		}
	</style>
</head>

<body>

	<div id="teamH-header"></div>

	<div class="layout">

		<div id="teamH-sidebar"></div>

		<main class="main">
			<h1 class="page-title">技能継承一覧</h1>

			<a id="registerBtn" href="./knowledge_form.html" class="floating-register-btn" style="display:none;">
				<span>登録</span>
			</a>

			<form class="search-box" method="get" id="searchForm">
				<input type="text" name="keyword" id="keyword" placeholder="タイトル・対象部品で検索">
				<select name="targetProcess" id="targetProcess">
					<option value="">すべての工程</option>
					<option value="旋盤加工">旋盤加工</option>
					<option value="マシニング加工">マシニング加工</option>
					<option value="検査">検査</option>
					<option value="段取り替え">段取り替え</option>
				</select>
				<button type="submit" class="btn primary">検索</button>
			</form>

			<div id="sections"></div>

		</main>
	</div>

	<script src="./js/db.js"></script>
	<script src="./js/header.js"></script>
	<script>
		const E = (s) => TeamH.esc(s);

		function fileIconHtml(card) {
			let icon;
			if (card.previewType === "text") icon = "📝";
			else if (card.previewType === "none") icon = "📚";
			else icon = "📎";
			return `<div class="file-icon">${icon}</div><span class="file-badge">${E(card.fileLabel)}</span>`;
		}

		TeamH.init().then(function () {
			const sess = TeamH.requireLogin();
			if (!sess) return;
			TeamHNav.render("knowledge");

			const role = sess.role;
			const canEditKnowledge = role === "admin" || role === "craftsman";

			const params = new URLSearchParams(location.search);
			const keyword = params.get("keyword") || "";
			const targetProcess = params.get("targetProcess") || "";
			document.getElementById("keyword").value = keyword;
			document.getElementById("targetProcess").value = targetProcess;

			if (canEditKnowledge) document.getElementById("registerBtn").style.display = "";

			document.getElementById("searchForm").addEventListener("submit", function (e) {
				e.preventDefault();
				const q = new URLSearchParams();
				const kw = document.getElementById("keyword").value.trim();
				const tp = document.getElementById("targetProcess").value;
				if (kw) q.set("keyword", kw);
				if (tp) q.set("targetProcess", tp);
				location.href = "./knowledge_list.html" + (q.toString() ? "?" + q.toString() : "");
			});

			const uid = role === "craftsman" ? sess.loginUser.userId : null;
			const cards = TeamH.searchSkillCards(keyword, targetProcess, uid);
			const grouped = TeamH.groupSkillCards(cards);

			if (!grouped.size) {
				document.getElementById("sections").innerHTML =
					'<div class="empty-card">登録されている技能継承コンテンツはありません。</div>';
				return;
			}

			let html = "";
			grouped.forEach(function (list, key) {
				const cardsHtml = list.map(function (skill) {
					return `<div class="knowledge-card" onclick="location.href='./knowledge_detail.html?id=${E(skill.skillContentsId)}'">
						<div class="thumbnail">
							${fileIconHtml(skill)}
						</div>
						<div class="knowledge-body">
							<h2>${E(skill.title)}</h2>
							<p class="description">${E(skill.description)}</p>
							<div class="meta">
								<span>${E(skill.targetPart)}</span>
								<span>${E(skill.targetProcess)}</span>
							</div>
							<div class="footer">
								<span>登録者：${E(skill.registeredByName)}</span>
								<span>詳細へ</span>
							</div>
						</div>
					</div>`;
				}).join("");
				html += `<div class="process-section">
					<div class="process-section-title">
						<span>${E(key)}</span>
						<span class="process-count">${list.length}件</span>
					</div>
					<div class="knowledge-grid">${cardsHtml}</div>
				</div>`;
			});
			document.getElementById("sections").innerHTML = html;
		});
	</script>

</body>

</html>
