<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業指示書 削除確認</title>

    <link rel="stylesheet" href="./css/common.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .main {
            flex: 1;
            padding: 32px;
        }

        /* ページタイトル */
        .page-title {
            font-size: 28px;
            font-weight: bold;
            color: #102a43;
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
        }

        .page-title::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 32px;
            background: #b91c1c;
            border-radius: 3px;
            margin-right: 12px;
        }

        .page-lead {
            color: #b91c1c;
            font-weight: bold;
            font-size: 14px;
            margin: 0 0 20px 0;
        }

        /* カード */
        .card {
            background: white;
            border: 1px solid #d9e2ec;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 4px 12px rgba(16, 42, 67, 0.06);
            border-top: 4px solid #b91c1c;
        }

        /* カードヘッダー */
        .wo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d9e2ec;
            padding-bottom: 14px;
            margin-bottom: 20px;
        }

        .wo-title {
            font-size: 20px;
            font-weight: bold;
            color: #b91c1c;
        }

        .wo-sub {
            text-align: right;
            font-size: 13px;
            color: #627d98;
            line-height: 1.6;
        }

        /* セクションタイトル */
        .wo-section-title {
            font-size: 15px;
            font-weight: bold;
            color: #102a43;
            margin: 20px 0 10px 0;
            padding-left: 10px;
            border-left: 3px solid #153e75;
        }

        /* テーブル */
        .wo-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .wo-table th,
        .wo-table td {
            border-bottom: 1px solid #e5eaf0;
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
        }

        .wo-table th {
            background: #f0f4f8;
            color: #334e68;
            font-weight: bold;
            width: 160px;
        }

        /* 同意チェックボックス */
        .agree-box {
            margin: 24px 0;
            padding: 16px;
            background: #fff5f5;
            border: 1px solid #fecaca;
            border-radius: 8px;
        }

        .agree-box label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #b91c1c;
            font-size: 14px;
        }

        .agree-box input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* ボタン */
        .button-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid #bcccdc;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            color: #334e68;
        }

        .btn:hover {
            background: #f0f4f8;
        }

        .btn.danger {
            background: #b91c1c;
            border-color: #b91c1c;
            color: white;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.danger.active {
            opacity: 1;
            cursor: pointer;
        }

        .btn.danger.active:hover {
            background: #991b1b;
        }
    </style>
</head>

<body>

    <div id="teamH-header"></div>

    <div class="layout">

        <div id="teamH-sidebar"></div>

        <main class="main">

            <h1 class="page-title">作業指示書の削除確認</h1>
            <p class="page-lead">⚠️ 警告：この操作は取り消せません。本当にこの作業指示書を完全に削除しますか？</p>

            <div class="card">

                <div class="wo-header">
                    <div class="wo-title">【削除対象】作業指示書</div>
                    <div class="wo-sub">
                        <div>マルセイ精密工業株式会社</div>
                        <div>2026/05/26</div>
                    </div>
                </div>

                <!-- ① 基本情報 -->
                <div class="wo-section-title">① 基本情報</div>
                <table class="wo-table">
                    <tr>
                        <th>受注番号</th>
                        <th>部品名</th>
                        <th>数量</th>
                    </tr>
                    <tr>
                        <td id="bOrderNo"></td>
                        <td id="bPartName"></td>
                        <td id="bQuantity"></td>
                    </tr>
                    <tr>
                        <th colspan="2">客先</th>
                        <th>納期</th>
                    </tr>
                    <tr>
                        <td colspan="2" id="bClientName"></td>
                        <td id="bDueDate"></td>
                    </tr>
                </table>

				<!-- ② 工程 -->
				<div class="wo-section-title">② 工程</div>
				<table class="wo-table">
					<tr>
						<th>順序</th>
						<th>工程</th>
						<th>機械番号</th>
						<th>状態</th>
						<th>担当者</th>
					</tr>
					<tbody id="processBody"></tbody>
				</table>

				<!-- ③ 作業実績 -->
				<div class="wo-section-title">③ 作業実績</div>
				<table class="wo-table">
					<tr>
						<th>工程</th>
						<th>担当職人</th>
						<th>開始時刻</th>
						<th>完了時刻</th>
						<th>コメント</th>
					</tr>
					<tbody id="reportBody"></tbody>
				</table>

				<!-- 同意チェックボックス -->
				<div class="agree-box">
					<label>
						<input type="checkbox" id="delete-checkbox" onchange="toggleDeleteButton()">
						上記の作業指示書（実績データ含む）を完全に削除することに同意します。
					</label>
				</div>

				<div class="button-area">
					<button type="button" class="btn danger" id="delete-btn" disabled>
						完全に削除する
					</button>

					<a class="btn" href="./work_orders.html">
						キャンセルして一覧に戻る
					</a>
				</div>

            </div>

        </main>
    </div>

    <script src="./js/db.js"></script>
    <script src="./js/header.js"></script>
    <script>
        const E = (s) => TeamH.esc(s);

        function toggleDeleteButton() {
            const checkbox = document.getElementById('delete-checkbox');
            const deleteBtn = document.getElementById('delete-btn');
            if (checkbox.checked) {
                deleteBtn.classList.add('active');
                deleteBtn.disabled = false;
            } else {
                deleteBtn.classList.remove('active');
                deleteBtn.disabled = true;
            }
        }

        function statusText(st) {
            switch (st) {
                case "not_started": return "未着手";
                case "preparing": return "段取り中";
                case "processing": return "加工中";
                case "inspecting": return "検査中";
                case "completed": return "完了";
                default: return "-";
            }
        }

        TeamH.init().then(function () {
            const sess = TeamH.requireLogin();
            if (!sess) return;
            if (sess.role !== "admin") { location.href = "./login.html?authError=true"; return; }
            TeamHNav.render("workOrders");

            const id = new URLSearchParams(location.search).get("id");
            const data = TeamH.workOrderDeleteData(id);
            if (!data) { location.href = "./work_orders.html"; return; }
            const wo = data.workOrder;

            document.getElementById("bOrderNo").textContent = wo.orderNo || "";
            document.getElementById("bPartName").textContent = wo.partName || "";
            document.getElementById("bQuantity").textContent = (wo.quantity != null ? wo.quantity : "") + " 個";
            document.getElementById("bClientName").textContent = wo.clientName || "";
            document.getElementById("bDueDate").textContent = TeamH.fmtDate(wo.dueDate);

            document.getElementById("processBody").innerHTML = (data.processes || []).map((p) => `<tr>
                <td>${E(p.processOrder)}</td>
                <td>${E(p.processName)}</td>
                <td>${E(p.machine ? p.machine.machineNo : "-")}</td>
                <td>${E(statusText(p.currentStatus))}</td>
                <td>${E(p.assignedUser ? p.assignedUser.name : "-")}</td>
            </tr>`).join("");

            const reports = data.reports || [];
            if (!reports.length) {
                document.getElementById("reportBody").innerHTML =
                    '<tr><td colspan="5" style="text-align:center; color:#627d98;">作業実績はありません。</td></tr>';
            } else {
                document.getElementById("reportBody").innerHTML = reports.map((r) => {
                    const wop = r.workOrderProcess;
                    const proc = wop ? `${E(wop.processOrder)}. ${E(wop.processName)}` : "-";
                    const au = r.assignedUser ? `${E(r.assignedUser.userId)} ${E(r.assignedUser.name)}` : "-";
                    return `<tr>
                        <td>${proc}</td>
                        <td>${au}</td>
                        <td>${r.actualStart ? E(TeamH.fmtDateTime(r.actualStart)) : "－"}</td>
                        <td>${r.actualEnd ? E(TeamH.fmtDateTime(r.actualEnd)) : "－"}</td>
                        <td>${E(r.comment == null ? "" : r.comment)}</td>
                    </tr>`;
                }).join("");
            }

            document.getElementById("delete-btn").addEventListener("click", function () {
                if (this.disabled) return;
                TeamH.deleteWorkOrder(id);
                location.href = "./complete.html?type=delete";
            });
        });
    </script>

</body>

</html>
