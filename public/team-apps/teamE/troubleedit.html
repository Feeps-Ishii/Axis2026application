<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>トラブル編集</title>
	<link rel="stylesheet" href="./css/trouble/troubleedit.css" />
</head>

<body>

	<header>
		<div class="header-top">
			<div class="logo-area">
				<a id="homeLink"><img src="./images/icon.png" alt="ロゴ" class="logo-img"></a>
				<div class="site-system-name">トラブル編集</div>
			</div>
			<div class="user-area">
				<div><span id="userName">ゲスト</span> さん</div>
				<form id="logoutForm"><button type="submit" class="logout-btn">ログアウト</button></form>
			</div>
		</div>
		<div class="page-title-bar"></div>
	</header>

	<div class="container" id="container"></div>

	<script src="./js/db.js"></script>
	<script>
		TeamE.init().then(() => {
			const s = TeamE.requireLogin();
			if (!s) return;
			const roll = s.user.roll;
			// roll==2（閲覧）は編集不可
			if (roll === 2) { location.href = "./home.html"; return; }
			document.getElementById("userName").textContent = s.user.userName;
			document.getElementById("homeLink").href = roll === 0 ? "./list.html" : "./home.html";

			const params = new URLSearchParams(location.search);
			const id = Number(params.get("id"));
			const restore = params.get("restore") === "1";

			const trouble = TeamE.troubleById(id);
			if (!trouble) { location.href = "./troublelist.html"; return; }

			// 初期値：restore時はpending.data、無ければレコード
			let init = trouble;
			if (restore) {
				const p = TeamE.getPending("trouble");
				if (p && p.mode === "edit" && p.id === id && p.data) init = p.data;
			}

			const E = TeamE.esc;
			const sel = (v, x) => Number(v) === x ? "selected" : "";

			// role==1（現場）：トラブル内容＋現場対応メモを編集 / role==0（本社）：本社対応メモのみ編集
			const editField = (cur) => {
				if (roll === 1) {
					return `
						<div class="item">
							<div class="label">緊急度</div>
							<select name="priority">
								<option value="3" ${sel(cur.priority, 3)}>高</option>
								<option value="2" ${sel(cur.priority, 2)}>中</option>
								<option value="1" ${sel(cur.priority, 1)}>低</option>
							</select>
						</div>
						<div class="item">
							<div class="label">トラブル種別</div>
							<select name="troubleType">
								<option value="1" ${sel(cur.troubleType, 1)}>事故</option>
								<option value="2" ${sel(cur.troubleType, 2)}>資材不足</option>
								<option value="3" ${sel(cur.troubleType, 3)}>納品遅れ</option>
								<option value="4" ${sel(cur.troubleType, 4)}>工程遅延</option>
								<option value="5" ${sel(cur.troubleType, 5)}>その他</option>
							</select>
						</div>`;
				}
				return `
					<div class="item">
						<div class="label">緊急度</div>
						<div class="value">${E(TeamE.label.PRIORITY[cur.priority] || "")}</div>
					</div>
					<div class="item">
						<div class="label">トラブル種別</div>
						<div class="value">${E(TeamE.label.TROUBLE_TYPE[cur.troubleType] || "")}</div>
					</div>`;
			};

			const overviewField = (cur) => roll === 1
				? `<input type="text" name="overview" maxlength="100" value="${E(cur.overview)}">`
				: `<div class="value">${E(cur.overview)}</div>`;
			const detailField = (cur) => roll === 1
				? `<textarea name="detail" maxlength="500">${E(cur.detail)}</textarea>`
				: `<div class="value">${E(cur.detail)}</div>`;
			const siteMemoField = (cur) => roll === 1
				? `<textarea name="siteMemo">${E(cur.siteMemo)}</textarea>`
				: `<div class="value">${E(cur.siteMemo)}</div>`;
			const hqMemoField = (cur) => roll === 0
				? `<textarea name="hqMemo">${E(cur.hqMemo)}</textarea>`
				: `<div class="value">${E(cur.hqMemo)}</div>`;

			document.getElementById("container").innerHTML = `
				<div class="section">
					<div class="section-title">編集内容サマリー</div>
					<div class="summary-box">
						登録済みのトラブル内容を編集できます。<br>
						内容確認後、「保存」を押してください。
					</div>
				</div>

				<form id="form">
					<div class="section">
						<div class="section-title">トラブル内容編集</div>
						<div class="grid-2">
							${editField(init)}
						</div>
						<div class="item">
							<div class="label">一言で表す</div>
							${overviewField(init)}
						</div>
					</div>

					<div class="section">
						<div class="section-title">詳細内容</div>
						<div class="item">
							${detailField(init)}
						</div>
					</div>

					<div class="section">
						<div class="item">
							<div class="label">現場対応メモ</div>
							${siteMemoField(init)}
						</div>
						<div class="item">
							<div class="label">本社対応メモ</div>
							${hqMemoField(init)}
						</div>
					</div>

					<div class="btn-area">
						<button type="button" class="btn btn-gray" id="cancelBtn">キャンセル</button>
						<button type="submit" class="btn">保存</button>
					</div>
				</form>
			`;

			document.getElementById("cancelBtn").addEventListener("click", () => {
				location.href = "./troubledetail.html?id=" + id;
			});

			document.getElementById("form").addEventListener("submit", e => {
				e.preventDefault();
				const f = e.target;
				// 編集対象外フィールドは元レコードの値を保持
				const data = {
					priority: roll === 1 ? Number(f.priority.value) : trouble.priority,
					troubleType: roll === 1 ? Number(f.troubleType.value) : trouble.troubleType,
					overview: roll === 1 ? f.overview.value : trouble.overview,
					detail: roll === 1 ? f.detail.value : trouble.detail,
					siteMemo: roll === 1 ? f.siteMemo.value : trouble.siteMemo,
					hqMemo: roll === 0 ? f.hqMemo.value : trouble.hqMemo,
				};
				TeamE.setPending("trouble", { mode: "edit", id: id, data: data });
				location.href = "./troubleeditcheck.html";
			});

			document.getElementById("logoutForm").addEventListener("submit", e => {
				e.preventDefault(); TeamE.logout(); location.href = "./login.html";
			});
		});
	</script>

</body>
</html>
