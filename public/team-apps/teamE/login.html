<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン | Sample Corporation</title>
    <link rel="stylesheet" href="css/login.css" />
</head>

<body>

    <div class="login-container">
        <div class="login-box">

            <div class="logo-area">
                <img src="./images/icon.png" alt="会社ロゴ" class="company-logo">
                <div class="system-name">
                    システム ログイン
                </div>
            </div>

            <!-- ログインフォーム（擬似：JSで認証） -->
            <form id="loginForm">

                <div class="input-group">
                    <label for="userid">ID</label>
                    <input type="number" id="userid" name="userid" placeholder="IDを入力" required pattern="[0-9]+"
                        title="半角数字のみ入力してください">
                </div>

                <div class="input-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" placeholder="パスワードを入力" required minlength="8"
                        maxlength="15" pattern="[A-Za-z0-9]+" title="8〜15文字の半角英数字のみ入力してください">
                </div>

                <button type="submit" class="login-btn">
                    ログイン
                </button>

            </form>

            <!-- モック用：テストアカウント案内 -->
            <div class="footer-text" style="line-height:1.8;">
                <strong>デモ用アカウント</strong><br>
                本社: ID <code>1</code> / pass1234<br>
                現場担当: ID <code>2</code> / pass2345<br>
                閲覧: ID <code>3</code> / pass3456
            </div>

            <div class="footer-text">
                © 2026 NISHIKIGI CORPORATION
            </div>

        </div>
    </div>

    <script src="./js/db.js"></script>
    <script>
        TeamE.init().then(() => {
            document.getElementById("loginForm").addEventListener("submit", function (e) {
                e.preventDefault();
                const userid = document.getElementById("userid").value;
                const password = document.getElementById("password").value;
                const user = TeamE.login(userid, password);
                if (!user) {
                    alert("IDまたはパスワードが違います");
                    return;
                }
                // 権限により遷移先を変更（roll 0=本社, それ以外=現場）
                if (user.roll === 0) {
                    location.href = "./list.html";
                } else {
                    location.href = "./home.html";
                }
            });
        });
    </script>

</body>

</html>
