<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>安全点検作成</title>
	<link rel="stylesheet" href="./css/safety/safetycheckdetail.css">
	<style>
		.check-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid #eef; gap:12px; }
		.check-row .nm { font-weight:bold; }
		.check-row label { margin-left:10px; font-size:14px; }
	</style>
</head>

<body>

	<header>
		<div class="header-top">
			<div class="logo-area">
				<a href="./home.html"><img src="./images/icon.png" alt="ロゴ" class="logo-img"></a>
				<div class="pageTitle" id="pageTitle">安全点検作成</div>
			</div>
			<div class="user-area">
				<div><span id="userName">ゲスト</span> さん</div>
				<form id="logoutForm"><button type="submit" class="logout-btn">ログアウト</button></form>
			</div>
		</div>
		<div class="page-title-bar"></div>
	</header>

	<div class="container">
		<form id="form">
			<div class="section">
				<div class="section-title">点検情報</div>
				<div class="summary-box">現場名：<span id="siteName"></span></div>
			</div>
			<div class="section">
				<div class="section-title">点検項目（良好 / 不備）</div>
				<div class="check-list" id="checkList"></div>
			</div>
			<div class="btn-area" style="display:flex;gap:15px;">
				<a href="./safetylist.html" class="btn-gray">一覧へ戻る</a>
				<button type="submit" class="btn">保存</button>
			</div>
		</form>
	</div>

	<script src="./js/db.js"></script>
	<script>
		TeamE.init().then(() => {
			const s = TeamE.requireLogin();
			if (!s) return;
			if (s.user.roll === 2) { location.href = "./home.html"; return; }
			document.getElementById("userName").textContent = s.user.userName;
			const site = TeamE.site(s.siteId);
			document.getElementById("siteName").textContent = site ? site.siteName : "";

			const id = Number(new URLSearchParams(location.search).get("id"));
			const editing = id && TeamE.safeties().find(x => x.safetyId === id);
			if (editing) document.getElementById("pageTitle").textContent = "安全点検編集";

			const list = document.getElementById("checkList");
			list.innerHTML = TeamE.label.SAFETY_ITEMS.map(it => {
				const v = editing ? editing[it.key] : 0;
				return `<div class="check-row">
					<span class="nm">${it.label}</span>
					<span>
						<label><input type="radio" name="${it.key}" value="0" ${v === 0 ? "checked" : ""}> 良好</label>
						<label><input type="radio" name="${it.key}" value="1" ${v === 1 ? "checked" : ""}> 不備</label>
					</span>
				</div>`;
			}).join("");

			const f = document.getElementById("form");
			f.addEventListener("submit", e => {
				e.preventDefault();
				const data = { siteId: s.siteId, photo: null };
				TeamE.label.SAFETY_ITEMS.forEach(it => {
					data[it.key] = Number(f[it.key].value);
				});
				if (editing) {
					const arr = TeamE.safeties();
					const idx = arr.findIndex(x => x.safetyId === id);
					arr[idx] = Object.assign(arr[idx], data);
					localStorage.setItem("teamE:safeties", JSON.stringify(arr));
				} else {
					TeamE.addSafety(data);
				}
				alert("保存しました");
				location.href = "./safetylist.html";
			});

			document.getElementById("logoutForm").addEventListener("submit", e => {
				e.preventDefault(); TeamE.logout(); location.href = "./login.html";
			});
		});
	</script>

</body>
</html>
