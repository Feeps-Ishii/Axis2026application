<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>安全点検登録</title>
	<link rel="stylesheet" href="./css/safety/safetycheck.css">
</head>

<body>

	<header>
		<div class="header-top">
			<div class="logo-area">
				<a href="./home.html"><img src="./images/icon.png" alt="ロゴ" class="logo-img"></a>
				<div class="pageTitle">安全点検登録</div>
			</div>
			<div class="user-area">
				<div><span id="userName">ゲスト</span> さん</div>
				<form id="logoutForm"><button type="submit" class="logout-btn">ログアウト</button></form>
			</div>
		</div>
		<div class="page-title-bar"></div>
	</header>

	<form class="container" id="form">
		<div class="section">
			<div class="section-title">点検項目</div>
			<div id="checkList"></div>
		</div>

		<div class="btn-area">
			<button type="button" class="btn btn-gray" onclick="location.href='./home.html'">戻る</button>
			<button class="btn" type="submit">確認</button>
		</div>
	</form>

	<script src="./js/db.js"></script>
	<script>
		TeamE.init().then(() => {
			const s = TeamE.requireLogin();
			if (!s) return;
			if (s.user.roll !== 1) { location.href = "./home.html"; return; }
			document.getElementById("userName").textContent = s.user.userName;

			// 初期化（stale prefill 防止）
			const params = new URLSearchParams(location.search);
			let prefill = null;
			if (params.get("restore")) {
				const pending = TeamE.getPending("safety");
				if (pending && pending.data) prefill = pending.data;
			} else {
				TeamE.clearPending("safety");
			}

			const list = document.getElementById("checkList");
			list.innerHTML = TeamE.label.SAFETY_ITEMS.map(it => {
				const v = prefill ? prefill[it.key] : "";
				return `<div class="check-item">
					<label>${it.label}</label>
					<select name="${it.key}" required>
						<option value="">選択してください</option>
						<option value="0" ${v === 0 ? "selected" : ""}>良好</option>
						<option value="1" ${v === 1 ? "selected" : ""}>不備</option>
					</select>
				</div>`;
			}).join("");

			const f = document.getElementById("form");
			f.addEventListener("submit", e => {
				e.preventDefault();
				const data = { siteId: s.siteId, photo: null };
				TeamE.label.SAFETY_ITEMS.forEach(it => {
					data[it.key] = Number(f[it.key].value);
				});
				TeamE.setPending("safety", { mode: "create", data });
				location.href = "./safetycheckcheck.html";
			});

			document.getElementById("logoutForm").addEventListener("submit", e => {
				e.preventDefault(); TeamE.logout(); location.href = "./login.html";
			});
		});
	</script>

</body>
</html>
